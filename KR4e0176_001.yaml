body:
  text: 雲村集卷一明許相卿撰賦蘿補堂賦有序蘿補堂者從吾董翁所自名其居也祈余賦之詞曰矗談嶺之亢峙眇澉湖之澄涵孤城值其秀爽而隱居卜於其間菅茅上覆泥堵周環恆雨暘之淋炙缺苫蓋於東南主人仰屋太息曰狡兔三窟鷦鷯一枝咸克禦外侮而圖寧居矧吾將幹前蠱燕後昆顧無所庇吾廬乎爰躊躇其搆思又般礴以殫慮衷若天啓謀與神㑹繄樛木之長蘿方下縈而上延彼徒贅於有餘我則病夫不完爾乃解自樹杪援之簷端補此罅隙紓彼紏纒意祖少陵之詠巧奪媧皇之權老幹繫諸橈棟密蔓勻於疏椽柔枝盤旋以重復修條縷絡而夤緣初蕭森兮扶疏久蒙密兮隂沉旁翳薈兮紛敷上盤紆兮擁閼逺睇兮矯龍首而鶱鳯翼迫視兮儼黃琮之間蒼玉春薦芳蕊可方杞菊夏布清隂弗讓修竹冬雪積而玉蛟結蟠秋風振而氷絃斷續晨則雲表之露下零宵而書檠之焰上燭殆造化有意育兹堂之秀滌世氛之俗者也客有造堂下而進說曰上棟下宇中古盛制子獨矯情因陋仍廢夫瑣瑣數椽革而創之曾不費子下筯之需潤筆之賄也主人囅然而笑適然而興顧謂客曰昔嘗議斯役矣圖厥新恐彰先陋而兢俗侈葺以故懼蹈前愆而貽後纍又嘗博觀今昔之變矣耽耽巨厦巍巍崇宫拔地千尺在天半空計其壯麗悠永將與金石者同亡何勢窮理復化為塵蒙而已矣而此堂特借蘿以補茆任造化之經營役隂陽以刻雕潛德培其本餘澤潤其標吾聚族處於中也寒露不吾凄赫日不吾驕雷電不吾震撼風雨不吾飄颻容與委蛇其樂陶陶矧其易故增新我財不靡巧構密架人力不勞惟歷嵗之愈久則維持之益牢蓋造物者輟其功則斯堂方就圮也而子得無以吾論為過髙乎方將結陋巷為芳鄰追巢居於太古味道德之腴狎詩酒之侣摽俗子而出諸户髙卧濶視藐富兒之土木齪齪鼠壤蟻垤無足數也言未既客謝曰命之矣逡巡而退毖齊賦有序東藩憲使原博查公榜其燕居所曰毖齊屬豫賦之於維美人之修嫭兮時兢兢以自防胡伊今之乃然兮童而習之以為常繄淵源其有自兮馴充養以成章親肇鍚以嘉名兮曰約乎吾知爾之鮮失也師又傳之要㫖兮曰慎哉授子以豫所自得也赫吾君仍寵綏兮曰惟毖焉豫女嘉欽重巽之既申兮圖顧諟於不遐絢書紳之被躬兮顧曵婁其有時盤觴几牖為之銘兮懼造次之或違惟退食有常所兮爰髙揭於楹楣時仰止以斂袵兮俯而凝神以覃思警心目於旦旦兮昭面命而申耳提大哉王言兮厥義兼乎父師矢畢此生其無負兮毖為守身一字之符奉以周還而弗之墜失兮紛昌披以躑躅恣睢逞逸莫之檢制兮肆決繩而踰墨倏犯患以冒災兮嗟噬臍其安及旋名敗而親辱兮迄喪躬而危族惟昭鑒以痛懲兮彌惓惓而自朂羌何以躋於明兮匪前修焉所程出門儼如賓兮使民肅大祭之承凛燕居其猶齊兮承事畏於奉盈出往游衍嚴昊天日鑒兮矧夫立朝任使遐不惴惴於春氷抑聞無隱弗顯兮必慎屋漏而布於明廷無微弗巨兮能勤小物而大患以平無邇焉其弗逺兮決吾心之善利而千里之外萬世之後有徵毖將若此庶幾其無憾兮功以純而用以宏曷啻有辭於父師兮而君賜以稱闖然聖賢户閾兮豈惟表於周行辭曰猗與毖兮德之載兮敬惟輿兮轍則義兮於不已兮由聖軌兮吾與子同逝兮哀逝水賦哀哉水之為物也浩浩乎窮四海而委形混混乎歷萬川而流行繄蒙泉之始發兮或檻出而旁通洎靈液之啓祕兮亦壑赴而科從上無髙之不自兮泝銀潢而為蹤下無深之不入兮渺溟涬而為宫載四游以為極兮涵九提而為封浴兩曜而出入兮吞列宿而渾融瀰三湘而漫七澤兮蕩垕靈而浥太空若乃時雨驟集潢汙橫流八埏伊阻平賦悠悠黃河逆上地軸橫抽沮洳成淵絶巘成丘禹功莫展丹績奚收及夫青娥告令白收秉權洞庭葉下吳渚楓妍潢歸潦縮澤枯隰堅海斂而崎露磧江收而渚呈壖其往奚歸其泄何宣吾但見其亘古今繼日夜而東馳而日益長往而不舍指虞淵以為途兮迅方壺而遐征去益逺而返無由兮何西歸之可憑謂尾閭之復宣兮氣益充而滀渟遂蒸蓊而上下兮爰循環而相仍噫有是哉天地之生賴氣以成輕清上浮重濁下凝浮凝定位乾坤以名流峙羅列二氣之餘維斯水也一六之符氣入而盈氣縮而虗窮邃古而一軌豈斯今之可疑鑒斯流之不返撫人生之胡為羌朝露之易晞慨夕槿之就萎目眷眷兮若存魂飄飄兮如馳豈夫人之愆殃兮將修與短固有定數數固有之兮吾且信其必由理而寓理既宰斯兮諒惟善之是留胡於今之不然兮乃背馳而殊路兹既執欵誠而履柔淑兮獨中道而顛仆將修正之來咎兮抑此數適因時而畀賦每撫膺而浩歎兮涕橫墜而莫禦噫噓欷閨門掩兮夜寥寂香徑空兮杳無迹青鸞沒兮金鏡塵寶猊冷兮沈煙息中饋空兮伏雌在蘋藻芳兮寧復采哀招九復兮魂不來白日忽兮掩藹渺深情於溟漠寄逝波於東海托汍瀾而通勤瀝余衷而莫悔觸余目而增欷攬豫心之芥帶水濺濺兮東馳日杳杳兮西飛送𡨕鴻兮三太息夫人一去兮何時歸雲村集卷一
