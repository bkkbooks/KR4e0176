蟬兜牟浪軒輊物何與吾吾亦空星涯寒影炯秋水蘿石吟魂開我衷晴郊吟㺯無長物頂頂作伴靈鳩笻半酣濯髮挂林杪祇恐吾家習氣不耐顚風播㺯聒聒鳴長松懶習卧痾嵗強半懶習乃成性巾屨不時御散髮還髙詠避世迹盡掃懷古心獨競經旬未下堂花鳥苦相迎登山俯周行吾道終諍諍秋晚晨光動林薄水竹炯清佳寒日射水中萬竹走龍蛇美人秋雲東相望眇天涯招招踏澄江來把芙蓉花古意朱夏忽云謝西原凛秋色流光驚電駃我心悚以惻生也信有涯漆園真逹識勢利誇毗子去道逺已極優哉復優哉𡨕心任通塞南城樓集坐瞰重溟八千尺悵望蓬丘桃已核飄飄直欲淩紫煙何物虛名論赫奕指揮如意按悲歌徙倚女墻扶瘦腋咄哉世事覆更翻老矣夕郎𤣥尚白習池峴首今蒿萊轉眼兹遊雪鴻迹林缺長虹浙河暝鳥外殘陽越山夕童冠薰風笑詠歸三年病懷聊一適掀髯清嘯動海壖豪宕從來曽此客贈姚楊江黑頭使君俄挂冠出在人後歸在先盛世勳名太早計半生林壑有閒緣蠻煙瘴霧驚餘夢髙笠長鑱終百年過客東溪問津處掉頭野水棹漁船廣薤露歌諱日自詠薤露聲那復歌有生歸盡定不易苦調哀切將奈何齊橫漢季等黃土曵紼之徒祇合歌樂送我歸山阿哀樂於吾兩何有逹者玩世生死造化昧端倪乃今獨解衆悟理則那雲村集卷二
