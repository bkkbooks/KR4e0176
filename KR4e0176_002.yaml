body:
  text: 雲村集卷二明許相卿撰詩五言律詩晚晴苦雨連旬日初晴一振衣殘雲依海嶠新水到柴扉僻性嫌山淺塵緣與世微斜陽疏樹裏清影日邉歸暝色暝色狹斜路幽懷長短吟殘虹猶薄海髙鳥漸依林去住從吾道艱虞熱壯心燕雲愁直北望斷欲霑襟霽色霽色林廬晚愁吟野水灣斷雲虹外雨殘日鳥邉山海宇堪流涕朝班祇強顔獨嗟身世拙早見鬢毛斑江上天塹東南限神功混沌餘波濤來楚蜀雲雨被揚徐旅泊水村寺霸圖煙草墟親庭眇何許倚望獨躊躇秋熱秋空驕剩暑客舍困炎曦簷鼠時呈技淵龍或守雌山雲瞥眼度江月近人宜趺坐晚風榻焚香了化機久雨兀兀憑誰語悠悠祇獨棲雨深山更靜溪漲岸全低日月書生老風塵世路迷新晴散孤悶村酒正堪携鄉思目極南雲逈時驚北候新栩然青瑣夢尚爾白綸巾恐負平生學常懷寂寞濱潞河秋水永何處是歸津夜坐獨坐憂思集悲歌夜色遼疏林明逺火靜院急寒潮戎壘江南遍天閽冀北遙秋空穿病眼何日遣嫖姚又八月望夜玉帶湖泛月良夜不可負歸人還自留天閒多病客月占兩中秋逺水疑通漢輕風穩送舟露華清到骨寒意問羊裘送蔡天鍚鄉國來何晚風塵别更難天空落木外路逈朔雲端意氣時看劒悲歌幾控鞍春風消息好為報浙河干夜過前峯僧舍病客迷津舫清宵古寺門燈明深樹閣僧住逺人村煙月自良夜江湖多放言雲泉有舊約投老欲終焉雪行和鄧士魯雪意已彌望馬蹄還復行歸心先鴈逺病眼獨山明落落同塵迹悠悠和古聲撩人奈佳句孤燭守寒更宿石門山房塵土三年夢雲林勝日遊小招聊擬賦多難獨憑樓月色千山午江光滿意秋心期應共汝投老白蘋洲瓶山小築不逺市髙情還傍山塵緣甕天外風味麴生間瓦枕乾坤夢籜冠煙霧顔因君懷舊隱海上紫雲灣贈何山人愛酒何山子經年事逺遊雲煙幾兩屐湖海一扁舟白眼無遺勝青囊有祕搜更休談望氣那復問封侯章廣文夜至孤燭十年别清尊今夕同宦游談歷歷衰病閔忡忡稅駕逢身健移家得嵗豐浮生能幾㑹搔首歎萍蓬夕泛有懷幽意忽有屬呼尊上小舠乾坤新化理湖海眇逋逃水混秋空逺山留夕景髙平生携手好嵗晚隔風濤睡起假寐憑殘易瞢騰過晚鐘斗旋秋氣肅山應嵗占豐潛躍從吾道暄凉自候蟲腐儒經世業多病已成翁大雪携鶴觀瀑初雪壓髙帽羸驂揚逺鞭玉龍僵欲死白鶴舞爭妍山僻地無主骨清吾欲仙長吟雜孤唳歸路晚翩翩晚晴嵗晏田家隙晚晴山日溫幽人神獨往古意俗誰論陳迹雲霄路閒身造化恩風檐髙士傳曠代有知言再遊蘇臯祠路憶秋風舊時逢燈事殘林深天忽暝春淺午猶寒畫壁蛛絲縵苔碑鳥篆刓自憐踪迹野到處得盤桓晏起晏起曝衡宇初春風物幽晴巒澄野旭融雪漲寒流謝俗飽閒味逃名疏貴游仙人眇何許吾亦擅丹丘元日雲村又元日春意亦閒門國事支頥笏年光落手尊客携僧入社鄰賀鶴生孫邈矣孤山老神交百世論試杖雲徑初扶杖江城欲罷燈書生全謝客行藥偶逢僧候鴈將辭澤遊鯈已負氷湖山春意動遊興日鶱騰周氏别業周郎結屋處風物畫中論晏坐泉圍榻昏鐘斗掛門山光明繞屋海氣逈埋村望望吾廬近時來共一尊董純卿至我慙揚子宅君棹問竒舟今古談能劇髙閒意自投春禽從聒聒道況只悠悠相望牛鳴地過從信去留禦兒廟霽色秋移舫晴雲午過壇廣川浮野動深樾到門寒麟閣心空在鷯枝迹已安髙談入揮麈返棹見歸翰南樓幽興屬遐眺憑髙散餘醺徘徊出海日解后還山雲度鳥江天永斷峯吳越分超然俯清曠何處有塵氛西湖遲徐郎不至獨往林處士墓勝㑹應空負幽懷亦自聊舟移六橋永衣振兩峯髙簫鼓春遊競鳶魚野興豪孤山有𡨕契獨往薦溪毛漸翁夜過山中寒夜平生友星江百里船風煙猶逺色虹月更新妍十載話通昔一真思入𤣥分携秋水岸悵詠白雲篇張橫浦讀書臺舊題次韻古臺全草沒閒户半雲扃往哲猶生氣狂夫欲乞靈蝸書隂蘚碧鳥破晚煙青髙節存遺傳閒來讀舊銘越人詩謁次韻避俗雲村逺經秋客鬢新寒燈閒自喜殘卷閣還親往事悲歌永西風酒力淳明朝山雨歇曵屐訪天紳或誦施西亭暮春之句凄然感懷追武其韻石磴閒髙眺溪鄉豁俯臨晴巒多爽氣春事已繁隂潮帶虹邉雨雲連鳥外林美人遺妙語惆悵細悲吟兩翁來㑹前峯精舍一别嵗云改多病㑹常難天值清和景人來野水干庭空藉芳草林缺認遙巒趺坐談方外吾生得大觀春雨卧病朱陳兩翁至山雨連村暗蘭舟二仲來過逢老多阻愁痡鬱初開緑樹春將謝紅塵夢久回髙秋蘇病骨還約共登臺夏日雨後二首村莊住山麓長薄帶晴川荷鍤通新水携壺餉逺田鳩聲時亂聒龍骨晚髙懸好雨連宵永家家同晏眠返照收殘雨幽懷步廣川對山哦得句坐樹課畦田嶺缺江光逈林疏日腳懸前村晚歸牧豐草散牛眠廬山斜日匡廬道生綃水墨圖勝難長句寫深稱列仙都雲失開先寺天連彭蠡湖遙聞栗里近慚愧擁車徒夏日重遊雲巖寺老去勝懷在重過支遁房亂藤當午暝深澗襲秋凉客路逢蒲節僧忩酌桂漿煙墟莽吳苑殘照醉歌長董化卿尹宜興水落嵗云暮樓船發廣川春濃陽羡茗化接武城弦雲表鵬程逈江濆鷺社便善權巖洞好慰我逺遊篇周二丈文弼挽辭功名大槐夢冠劒一抔封清白髙標在豪華此路同愁雲迷斷鴈衰草泣寒蛩一掬斯文淚飄隨宰相風野泊遲朱陳兩翁孤舟泊已暮二老來何遲深樹共寒意東流渺風漪閒閒僧話續悄悄客懷羈返照長霞外容輝宛在斯雲濤莊雪夜江村堪老我寒夜更宜詩縞嶼歸禽訝𤣥機厚蟄知氷潭清數石雪路漫多岐若箇孤山宅逋翁得擅竒元日紀歷初更嵗氷霜未放春年華東去水世事後來薪海宇風塵滿鷗鳬保社新壯圖難著手寬計作閒人客詩問疾次韻習懶仍兼病巖扉日日關心神猶紫禁嗅味奈青山世意同雲薄松隂伴鶴閒樓頭孤嶂近時得盡危攀竹亭曽聞居要竹今傍竹安亭寒意耿相對秋聲飽獨聽閒情數歷歷晏坐圍青青興到誰賓主柴門且莫扃次韻范栗齊讀徐蘇傳髙人同厄運龍卧得身存矻矻賃舂日勞勞抱甕園墅夫惟勝韻幽思寄清尊惆望堪誰語思君佇石根和答西臯郵筒忽落手展誦菊花前快意病魔逺通神詩力𤣥林昏風過野霜淨月臨田感子如蘭語興懷伐木篇暮春雨後至孟家瀑空林宿雨歇近郭曙鐘寒亂水斜吞徑殘雲弱傍灘泉聲人語細山氣客裘單老我足幽勝後誰應感歎哭內二首束髮良嬿婉半途長别離浮生忽夢破浪迹尚塵縻寒杼遺殘織空巢守伏雌繐帷風雨夜怕誦扊扅詩偕老舊盟廢半生清影單好名吾獨纍分謗子能賢淚咽垂髫女吞聲執手言間關句曲路地名憶著便􅏰然五言絶句晚渡壓水雲欲墮吞江虹未收野人聊自適吹笛滿滄洲春雨霢霂林皋暗低迷草樹平春膏浹南野吾欲偶鄰耕七言律詩通濟橋秋夕雨過都門秋意多憑䦨慷慨酒微酡壯懷端與長江誓偉事猶聞故老歌清禁樓臺涵月逈九衢燈火共星羅江東留滯青年晚顧影滄波奈爾何客夜敝裘十載風煙客落木滿郊燈火村吳岫白雲家逺近瓦瓶濁酒自寒溫山靈有約慙移檄世路多岐欲斷魂惆悵嵗華今向晚擁衾豪思欲騰鶱江泊寄金山僧曽憶髙樓紫翠間孤舟今夜隔沙灣詩留吞海誰應護名刻朝陽石未刓三度長裾空禁掖百年清夢此江山驅馳尚冷東岡約不待移文已厚顔彭城萍蹤今日又彭城寒吹蕭蕭舞敝纓汴泗蛟鼉爭險壯濠梁煙月遞昏明東風苑陌春襟動午夜星河劒氣橫曠代獨憐陳正字心期應不負平生鄉思鄉夢初殘曉禁鐘客懷無那轉忡忡丹心許國有如日病骨未秋先怯風空谷移文慚怨鶴長雲搔首羡𡨕鴻封章欲乞閒身去九杞泉頭理釣筒趙村夜泊經嵗重來舊逰路荒郊殘日下髙梧千艘燈火河成市五夜殷憂病獨癯新月隨人書屋近朔雲回首玉樓孤腐儒通籍慙何補自合歸山問芋區澉墅莫歸殘日東風澉墅回輕雷挾雨馬頭催青山有約羈塵網四海多虞負酒杯寂寂野芳春事晚茫茫天運杞人哀燈前試拾新詩草滿紙憂吟取次裁卧病長夏寒氊擁病魔捲簾疏雨動髙歌紛紜末俗矜兒劇突兀孤懷倚太阿榻上光隂詩草亂山中籌算藥爐多新晴擬散頑腰腳遊興翩翩繞薜蘿獨往興到海濱成獨往千林風日淨姢姢寒山病骨晚爭瘦白鷺蒼波秋可憐天地閒愁塵夢醒煙霞勝事草堂偏斜陽深徑魚樵盡弄影蕭蕭石上泉五畝山集用杜韻桂樹青青賦小山棲遲我亦數公閒鷗鳬野水尋初約虎豹秋風擁九關采藥雲林聊寄迹請纓天闕尚強顔王孫一飯終身意况復虛名國士班懷玉驛十載黃埃走病身憑茵驚見萬嶙峋逺人鳥語有真意過雨風光如暮春白日此心寧宦逹青山與我故情親雲濤舊業應無恙猿鶴時來見夢頻黃鶴樓公宴二首樓臺仙迹古城隅尊俎英僚勝㑹初全楚雄圖歸指顧清湘幽憤入躊蹰江光蜿蜿晴虹逈沙渚姢姢野日虛客子自多雲水意扁舟却羡洞庭漁一雨江城五月凉重樓危檻俯蒼茫煙蕪七澤浮元氣晴樹千村動夕陽競挽龍舟懷正則遙思綵扇出明光髙堂此日還蒲艾遊子尊前憶故鄉多病多病倦遊聊作計負山臨壑結茆堂釣竿入手江湖逺書卷蒙頭日月長春服初乘沂水興午風時度藥畦香漫勞過客談經濟習懶年來樂睡鄉春日泛湖望海雨閣春雲遲客遊荻灘桃浪信輕舟病身祇合伴孤鶴健語猶堪回萬牛隴樹隂成悲宿土煙蕪影斷見浮丘沙棠擬續招尋興更泛蓬萊清淺流雨夜客至曲几團蒲午夢殘鶴聲報客小橋灣翠屏寒映萬銀竹絳蠟秋酣兩玉山道意自慙違俗纍酒船真負問竒還紫萸黃菊重陽近突兀星崖擬再攀髙卧病夫髙卧星崖上野情幽事靜相宜晚山如揖抗塵表晴雲有時來坐隅閒人日月衣裳懶勝地禽魚造化私汗青尚論百世士栗里蘇門我得師石門西村勾溪至野人淪放紫雲谷勝友連翩根竺村古渡晚寒初艤棹萬峯秋靜獨開門歷探幽壑尋三秀深話清鐙卧兩尊不厭山家淡風物還來茆屋負朝暄徐襄陽過訪草堂野情於世自蜩鵬一壑蓬蒿手自營昭曠觀游心獨領狹斜岐路夢還驚柴門反鎖封秋蘚畫舫深維探晚英滿意對牀泉石話三年剛得此懷傾元日卧病瘦骨棲遲榻欲穿春風被野獨髙眠紛紛過眼人疑夢兀兀支頥象入𤣥如願漫陳兒女語履端遙祝華嵩年冥冥元化吾誰詰深擁臯比理絶編𤣥覽亭小坐懷白鶴山人逺寺疏鐘送夕陽危䦨獨憑放歌長髙鴻望逈暮天碧野蝶愁牽霜葉黃對影作雙真自愛百年强半尚須忙深踪懶性過從斷猶憶清吟舊楚狂次韻鍾西臯雨中述懷苦雨經旬淹淑景早雷十日驗餘寒庭梅寂寂簾前落湖草青青鏡裏看深谷鶯花全冷淡浮家雲水尚盤桓殷憂無賴誰堪話搔首斜陽獨倚䦨應容菴書至使者贄詩私覿病中和答寒林斜日動柴門一舸遙遙入海村七字通名孤解后尺書欹枕得溫存京華消息關心逺野戍風煙望眼昏萬里江湖分終老平生贈處欲重論次韻黃東河春日有懷老我乾坤七十年雲林强半有閒緣紛紜野史乖麟筆次第山忩理蠧編倚杖松根哦落景據梧石上譜飛泉長安赫赫乘軒子應笑空齊守太𤣥劉海村詩問次韻感歎壺頭念少游危蹤到處浪淹留青山食力荒三徑白首携家訪十洲夏半梅黃憐節物雨深苔翠上衣裘四郊戰骨縈芳草斜日孤城怯憑樓入春避地澉水秋盡還山西臯詩慰次韻寄迹荒城似謫居還家病骨戀箯輿病股三年雙足不能履地山橫雨翠秋容淨林缺霜紅野眺舒憂國多虞懷耿耿信天定分意如如獨憐萬卷成焦土遺恨連艘失載書分酒遺董漢陽依謝韻滿城風雨怕開門狼籍春泥少更分緗帙散陳閒晝晷山廬在