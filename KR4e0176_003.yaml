body:
  text: 雲村集卷三明許相卿撰封事論內侍納銀贖死題為信初命誅凶孽以慰神人事臣聞令出惟行弗惟反又聞曰有功不賞有罪不刑堯舜不能以為治信然哉則臣於今日斷獄不能無惑焉而職司獻納是謂得言遭逢聖明是謂可言於此默默臣無所逃罪故敢陳其愚忠幸陛下裁納竊照犯人某等罪惡臣不能遍以疏舉其屢訊而具服者載於刑書渙於綸音炳如也有一於此罪不容誅衆惡畢彰百死莫贖又何議乎方其憑寵靈擅威柄毒流怨積以致神器幾危逆藩乘隙先帝憂勞崩逝厲階禍本實自羣凶臣意孝廟神靈之震怒兩宫慈愛之痛忿天下臣子之悼恨而舉欲甘心焉者殆皆鬱積磅礴無所於逞臣又意興獻帝之在潛藩憂本根之將顛思休戚之與共切齒憤悶何以為情陛下旦夕視膳蓋嘗經於睹記矣乃者登極首逮凶邪列聖格歆薄海恱服端始於此而數月以來天誅尚逋明旨中革元姦巨憝許之減死贖金斯言一傳羣望大駭詎意正始渙號遽已棄信失刑神怒紓而再鬱人怨解而復結不知陛下何以對越孝廟何以承顔慈夀何以上慰興獻帝之靈何以布大信於天下臣民是以前日人心庶幾孝皇太平之望比來識者慮有正德紛紜之漸矣先帝已誤陛下豈容再誤耶且昔者不察而墮姦法固在也今也獄成而聽贖并與法而亡之矣祖宗勞神逺慮立法為千萬世之防陛下祇博數十萬金以廢之豈不甚可惜哉政以賄成法由近格臣恐自今人皆不復畏法惟務積金有金而罪無不免以必免之計肆無涯之心臣又恐將來禍亂不但頃嵗之幾危而已然羣凶得肆於昔所謂非一朝一夕之故猶可説也彼於陛下無糞除之勤無阿保之舊而亦欲僥幸以釋愆釁以續要領果何術也恃左右者先為之容也左右之為此度已異日之將出於此故力為之地所以自為地也臣以為若人亦可誅也不獨若人也刑部尚書某都察院右都御史某操三尺法司天下命古臯陶之任也干紀羣凶不能亟議早決故爾遷延曲為比附雜然衆犯概以大辟原其意非欲援輕以入重乃欲推重以附輕俾得徐肆夤緣巧惑聰聽矧大獄未竟堅疏乞歸不圖始終不聞執奏避事保身殊非大臣守職任怨之義臣聞春秋治惡必先黨與某等尤可罪也如蒙乞敕法司將某等首惡悉照原擬明正典刑其餘某等殛竄放逐并左右先容者連坐黨惡以謝天下仍黜某等以為舞法利姦之戒宗社幸甚天下幸甚論內侍義男廕官題為裁幸恩以伸公論事臣聞爵人於朝與衆共之刑人於市與衆棄之衆則論公公則民服故刑賞者人主所得専而不得私也頃者欽凖廕授太監張欽義男李賢錦衣衛世襲指揮同知一時騰物議乖舊章纍新政有必不可者兵部尚書彭澤肇言之兵科給事中許復禮等又言之工科左給事中安盤又言之人三為衆人不啻三論亦公矣而陛下初諭曰已有成命了再諭日已有旨了三諭日該衙門知道是必欲私之也夫朝廷之政公則一致私則萬殊恐中外貪競小人自此乘隙躡踵有非分無厭之求許之名器黷濫何以成朝廷不許則是業已啓之而何以阻之臣聞故兵部尚書于謙再造社稷官其子冕為錦衣千户今兵部尚書王守仁克平汀贑官其子正憲為錦衣百户賢非欽之子欽之𨽻耳欽非二臣比而賢官崇於冕與正憲是忠勳大臣之子曽不若近幸中人之奴天下徇國死事之臣其誰不解體然則欽為亂國經澤等為失官守臣等為負言責陛下守祖宗之法亦似少失初意矣陛下念欽使令之適服役之久寵以賜金優以加俸識者猶曰非德賞也而濫恩如此人言如此陛下尚吝而持之豈欽甘言媚謁有蠱奪寵靈之巧而衆方蛇盤蚓結隂伺曲贊又將藉為他日之地者乎陛下重違內豎而輕拒士大夫也董仲舒曰天人相與之際甚可畏也嘉靖建元以來冬無積雪春多霾風意者刑縱賞濫號令失常之應陛下亦嘗槩於中而求其端矣乎臣為是懼伏望寢前命禠賢官以重爵賞以回天意亦以塞小人非望之圖成清朝無私之政臣不勝惓惓論政權題為體剛德操政權以折姦防亂事臣惟天下政權必出於一一則治二三則亂上操則治下擅則亂賢公卿大夫士衛翼奉行之則治匪人僭干之則亂臣嘗稽往迹參近事以此推之百不失一故於今日誦詔令窺政權切慮深疑殷憂大懼繼之涕泣不能自己凡在有位義當亟聞臣待罪言官若更隱忍死不償責是以冒昧言之伏惟仁聖察愚忠而裁其罪竊睹陛下入繼大統御席未寧登用耆德嘉納忠讜申敕法守裁抑僥幸竄殛凶邪不旬月間盡復祖宗之舊可謂明也已矣可謂剛也已矣海內欣欣引領屈指以期治平曽未再期偏聽私撓秕政乖令日以益甚殆陛下明少蔽乎剛少懦乎操權未得其術而隂伺巧移以謀矯竊者居中似有人乎臣恐自今漸實生習習實生常他日矯以疏大臣矯以逐諌士矯以徵玩好矯以興土木矯以事邊功矯以私刑賞將來之禍不可稱諱雖有智者亦無以善其後矣臣為是懼請得舍其細論其大者崔某左道罔上輔臣懇懇為言漫以知道答之言官交章勿論也羅洪載守職逮繫祕獄大小臣工疏十七上而説不行近又庇崔某之奴奪法司之守罪林俊以違旨怒言官之奏擾矣其他事涉中人曲降溫旨於法有礙則曰免提問於罪難贖則曰送司禮監奏請發落無功乞廕則曰與做錦衣衛百户然則昔登用者今播棄昔嘉納者今拂逆昔申敕者今沮撓昔裁抑者今批復此與正德之初何異而明哲剛亷之士雖欲盡節竭忠勢可得乎臣聞俊將為去計矣俊士望也俊去而俊之類臣知其不能留矣中間或有懷祿強顔依阿隱忍與近習私人相表裏以偷嵗月之安幸禍之萬分一於不吾逮者其猷為識趣臣以為非直非俊之伍是亦私人近習而已矣然則陛下將與近習私人共理天下乎天下且帖然乎臣又知其必不能一日安也夫今日之天下寧堪此輩再敗壞耶譬之人身在昔病已阽危傷生縱欲有旦夕不救之虞然元氣猶壯一劑適中可以立起武宗承孝廟之澤是已於今病雖稍蘇元氣憊甚不必酒色七情百毒之攻之也溫涼忒節食飲不時遂至長已陛下承武宗之禍是已故勵精圖治舍已從人庶幾可以已亂而况羣小竊權紊政以趣之哉伏願陛下憬然覺悟收還威柄法大舜勿疑之勇奮齊威烹阿之斷取㺯權干政尤無良如崔某者敕送法司處之重典以塞人心以警其類然後務學親政逺色去讒綏留故老延訪忠言詳察民隱宫府一體上下一心則德可堯舜治可商周功可祖宗陛下享無疆之祚羣臣與弼諧之榮近習私人亦得以同樂和平矣否則人心將去天命難諶實陛下之憂亦羣臣之羞而近習私人固非便身之圖也臣實畏之論朝覲考察題為明肅政體以作新吏治事臣聞天下治亂在庶官欲庶官各舉其職以登於治則惟賞罰當而勸懲之道昭焉爾周官之法太宰會羣吏之治詔王嵗終廢置三嵗誅賞我朝三年朝覲考察蓋用周制而加嚴焉臣竊聞髙皇以逮憲皇孝皇之世贓墨之譴至於大辟逺配賢能之褒錫以綵幣羊酒此祖宗之治所以吏稱民安方駕前古也行之既久玩弛姑息漸失初意照得近年朝覲官員吏部考察畢日該科道等官於御前面劾不才請旨拿問蓋未聞分别等第應否也或聖恩饒免則其問不肖者為幸國法遂行是其間賢者為誣而况考察之後不才黜去者多不與待罪之列賢能留用者顧皆在被劾之科其又有治行出衆應得褒嘉者槩受屈辱尤非所以核事情公賞罰而昭懲勸也祖宗之法豈端使然哉是在政體事勢固當振舉之時而俗壞弊極宜動深長之慮恐難因循姑息如前之為矣竊思十數年來賞罰大權凶邪竊㺯非特無章幾於倒置雖違世特立不為沮勸者不敢厚誣天下為無人而中人之資隨時風靡往往而是故士人心術壞而亷節虧矣亷節虧而民病亟矣民病亟而愁苦怨咨干逆隂陽淪胥盜賊職此而已陛下膺運中興勵精復古今日大計誅賞之始斯民一新觀聽之時正周官所謂宜用重典董仲舒所謂必變而更化者也伏乞陛下逺稽周官上繩祖武大奮明斷敕下吏部惟以萬姓為心罔恤一家之哭嚴汰不職匪才勿拘常格故事本部該司仍將考察過天下官員貪酷闒茸名迹顯著者數人治行亷能聲實卓異者亦數人各寫手本至説事日期預先於東闕門下會同科道等官知會候至御前將不才者指名面劾請旨拿問賢者能者指名面奏請旨褒異或賜筵宴或錫金帛餘者量為戒飭其布按二司府州縣佐二官并各正官以事不在任者行令巡按御史嚴核賢否得實劾奏轉行提問擬罪發落奏報仍敕吏部將應該考察官員預先案仰該城取具歇家結狀務聽説事面紏以昭賞罰以示勸懲方聽其去如此庶幾大典不為具文足以鼓舞人心丕變士習慰塞民望弼成至理矣論罰言者題為宥敢言罰失職以昭懲勸事臣抱疾私居伏讀邸報吏科都給事中李學曽論比來賞罰命令不當者數事禮科給事中章僑劾東厰太監芮景賢罪狀有六户部主事林應驄認罪回話遂及優禮大臣俱奉欽依各罰俸有差臣不覺歎息自恨奉職無狀愧服三臣之忠鯁深惜陛下氣驕志怠逈異初心甘蹈過舉也書曰從諌則聖詩曰詢于芻蕘夫有諌而從不待諌而詢往哲虛心舍己以求合乎天下之公每如此今陛下不惟不詢且不能從又加罰焉恐非所謂與治同道者也夫使三臣者言或未當尚兾優容以勸來者况頃來戚宦私人破格之恩權豪近幸骫法之宥言官章疏咈違之批答謂學曽言之不當恐不可也郭九臯四品守臣為一郡父母師帥某據其部民一面之詞奏行逮捕千里之外傳所謂父子皆獄是無上下也不然某何親於某何仇於景賢特為朝廷惜此事體耳謂僑言之不當可不可也陛下初政延用故老溫綸異數鄭重優隆蓋將賴以共安社稷凡所建白未能盡見施行乃復詰責其字畫差謬若祇使之奉行文書然者諸臣何以安其位而行其志應驄之言似尤不宜謂之不可也然則三臣者陛下果何意而罰之俸臣未遑援引舊聞姑請以覩記聖政質之嘉靖改元以來陛下批答言者始曰這所言有理蓋深嘉之繼曰知道了尚漫應之又曰已有旨了似已厭之又曰如何這等來説則怒之矣今者直罰之耳又曰本當查究然則又將有甚於此者矣陛下一人之身再期之間從違如此夫豈羣臣遽皆變移狂惑莫能將順德美抑或陛下深居髙拱親宦官宫妾之時多接賢士大夫之時少樂諂媚之言恃盈成之業逸欲日勝驕怠漸生也晉武帝以平吳怠隋文帝以平陳驕信史記之至今陋之陛下睿質聖志天下想望上希堯舜三王而顧乃下同二君豈不大失中外之望也哉況今東師蠢動北敵狼顧潢池㺯兵之赤子所在蜂起官軍俸糧缺支動十數月計數動十百萬邊倉儲蓄不給周嵗南都旱疫方數千里近者威茂又以地震告矣人心皇皇正仁聖憫懼延訪亟圖所以消弭拯綏之時匹夫有言宜若重於泰山而三臣相繼因言得罪殆陛下未嘗少加聖心乎風旨所布盂水隨形臣恐自今大小臣工以言為諱朝政闕遺生民困厄中外姦欺莫得上聞陛下孤立蔽欺之中顧倚近習私人共圖社稷至計岌岌乎危哉臣誠懼大患義愧敢言懷不容已非敢黨三臣以自為地也若臣者少嘗有志長不如人陛下擢司言責已再閲嵗曽無忠言嘉謨上悟聖心少禆時政方恥素餐而學曽等乃以言罰俸比肩同列臣實厚顔如蒙收回學曽等三臣罰俸前旨仍罰臣俸以懲失職更乞以學曽等建白一一敕付該衙門議擬施行庶有得於不逺復之義而陛下無損納諌之明臣亦少免尸祿之愧且俾失職如臣者戒敢言如三臣者勵賞罰當懲勸昭人心奮忠益畢陳闕廷無壅禍亂可防治平易致矣臣不勝惓惓乞恩送幼子奏為乞恩送幼子事臣伏覩大明會典一欵凡官吏監生妻故送幼子還鄉行勘是實具奏送順天府給引照回欽此臣原籍浙江杭州府海寧縣人由進士選授前職妻子隨任方誓披瀝以圖補報奈何命途多舛私故相撓臣妻李氏以嘉靖二年八月十一日病故遺下幼女僅周七嵗前妻幼男一十五嵗未周女又逺在家鄉四千里外幽明隔世嬰孺異鄉誠可憫惻臣之父母聞訃驚慟又不知其何以為情熏心憂患臣實以之雖欲勉強在公而情牽內顧安能展布奮勵盡心事事為是萬不得已援例陳請伏乞聖慈矜憐特敕吏部行勘令臣照例給假還籍慰藉臣親安集臣子依限前來供職感恩益深圖報益切矣乞恩養病奏為乞恩養病事臣原籍浙江杭州府海寧縣人由進士選授今職嘉靖二年八月十一日臣妻李氏病故奏乞照例送幼子還鄉吏部覆奏送順天府給引照回至嘉靖三年三月間舊患便血痰火等病復發變成癃閉等證病勢轉增限期將及於四月十三日具奏乞恩養病令義男某齎抱赴京及今已五越月屈指過時不知消息畏途萬里髙天九重豈其遂淪風波不覩天日薄命厄會或當有之臣偃伏待命以日為年望久而疑且憂憂深而病益劇臣恐溘逝未及聞命則長逝魂魄亦將私恨無窮臣欲奔斃道路則死於溝瀆等耳又將姑待的實音信再行陳乞則愈致稽違自速誅譴臣前却狼狽輾轉憂惶身無所容病益深痼萬不獲已忍死陳情復干天聽如蒙乞敕吏部移文原籍官司勘臣患病是實容臣在家調理不幸且死得明命以瞑目幸而視息少延氣血旋復即當奔赴禁垣批鱗碎首為臣死所無復遺憾是臣進退死生秋毫皆陛下力也乞恩致仕報籍奏為乞恩致仕報籍事臣見年六十六嵗浙江杭州府海寧縣人由正德十二年進士選任兵科給事中嘉靖二年九月十六日給假送幼子還鄉隨患便血痰火等證嘉靖三年四月十三日具奏乞恩養病嘉靖五年十二月初六日臣繼母居氏病故次年五月二十五日臣父某繼復病故積禍熏心竒痛刻骨前病因之時時間發日事醫藥有加無瘳氣血兩虧齒髮倐變沈綿既久平復愈難不意衰病跧伏之人濫得過情不虞之譽纍經撫按并京堂科道等衙門薦舉節蒙吏部移咨都察院勘合劄付浙江巡按御史轉行布政司府縣催取敦逼赴部已具病因告鳴外嘉靖十八年五月內本部題奉欽依補禮科給事中本年八月內舍人李茂春齎到本部劄付令臣到任管事伏惟聖明當天羣物快覩海內才智之士與時俱奮幽側覬獲明揚間散轉圖華要下至卑冗披能亦思服役禁近以分霑霈澤與被光榮臣雖性資暗劣至于知覺利害猶夫人也忍獨甘老山林終萎蓬藋上千違命之誅下速近名之謗以自絶于生成哉惟臣子之于君父事無不欲盡者心也時有不容強者力也臣早因多病孱羸乘以殷憂摧割精漸銷亡病益深痼同里交親絶迹慶弔殆已十五六年比來年踰六十有如七十許人體力不勝衣冠朝晡半在牀蓐絲絲殘息難望久延不幸臣子早夭臣孫年未成童勉屬後事令其服田海鹽山村改籍鮑郎場竈户以供課養生臣遲速俟時委填溝壑伏望皇上察臣願忠愚悃憫臣垂老宿疾乞敕吏部容臣原籍致仕儻得死正丘首臣瞑目長逝銜恩九地永永無極矣臣下情無任戰栗待罪候恩懇欵哀祈之至雲村集卷三
