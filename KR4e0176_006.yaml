body:
  text: 雲村集巻六明許相卿撰書簡與胡梅林都憲嘗聞蘇子瞻曰時方有事則匹夫之言重於泰山斯言自昔有徴矣今日海冦弄兵首尾三年躪蹂八郡焚刦殘毁江南無完土殲遺竄逃百姓無固志寜可謂無事乎某至愚無識非敢自以其言為重也竊謂於一時一事或至切而甚要焉夫澉浦一城懸絶海岸隔離衞所縣邑逺者七八十里近者猶四五十里孤特獨立四無人煙如傾巢之繫危枝有兵猶僅自保人少特一空戍耳去歲五月海冦數百白書猝來攻城時有統兵徐指揮公差李典史恊奮乘城牌石滚木沸油毒箭交墜如雨賊衆救死扶傷亟遁自是以來賊凡五六過城下聞鼔疾走不復敢近蓋懲前失利也然識者以為賊所必由熟路不可一日無備而又以兵少糧不繼為憂近乃掣去統兵并湖處兵徃乍浦存畱老弱數百城中無不自危故昔者鄉民日有千百扶攜入城冀免死亡今則城中日有十數商議出城别尋活路矣使賊陸行猶倚衞兵先捍使其舟至城邊可泊者不下三四處維杙到城直三四百步競進疾攻欲禦無人求援無路賊將為刀俎人盡為魚肉矣執事雖甚憂而欲拯之其將能乎徐行健者不知其素然統兵於澉二年却能守法亦知持亷士心頗皆畏服故今急乞鈞裁復調徐統原兵更益兵千數守澉則地利素諳兵將相習不特澉為可保且聲氣連絡海寜亦自増氣執事可無南顧之憂矣若只如今空城餌㓂或入據之則列屯䘮氣省城亦為寒心禍患未知所弭今某室燬肢殘然亦有水邨僻境緩急倚為三窟實非全恃澉城為全身保家室謀而為此嘵嘵也誠目覩千萬生靈不忍坐視其阽危故不惴沈淪之陋罔顧嚴重之威而獻其迂議於執事又况執事敬承簡㧞專制方面寜忍謂彈丸之地非王土創殘之民非赤子耶仁人必不然矣伏惟少畱意焉與薛方山提學某病老巖栖與歲増劇無繇趨候下風執事過聽先施逺命校師貶書臨問嘉歎亟稱自顧何有離次却立不敢當書刻敢不拜嘉果幣牢醴義不敢受顧惟執事加意沈淪感藏何可為喻伏承下問犯難諸人仄聞縉紳諸老先生各為論撰野人窮谷深蹤又多以病謝客無緣訪借所偶得者俚雅雜襲名姓未真爵里無證始末可考見者僅僅十半中閒紀述體裁亦有未脫科舉習氣似出褚少孫下尚逺恐難網羅備史闕文耳應命一仍傳寫之舊伏伺契勘釐正訖事惠識無任祈望與阮函峯宗師某槁廢餘生謬辱殊遇惟古卿大夫禮下幽側必稔知其賢執事顧驟施於未傾蓋之士是豈某所敢當抑小子蒙弱濫被甄奬越於意外百倍雖大造不自為德受恩者寜敢忘自力以不辱門墻為報耶仄聞晉陟方嶽由兹洊入臺省某老病奉候難期執鞭絏以承下風當責之豎子耳是某之願非所敢望也扶憊布區區不任鄉徃瞻戀之至與仰齋胡子中大尹六首下車興革良愜輿望歎服歎服某逺迹族黨移家深谷林廬十數楹山田四五頃一子備博士諸生一力執里長役病軀抱膝詠歌聊可卒歲為漁樵侣聖朝之賜執事之庇殆已踰涯矣市無生息一廛門無交親俗子一迹世故蔑之與聞也德政發軔病劣不能仰贊所敢以其私妄冀執事有所左右以累公明者有如日恐有矯以藉口也是以敢豫言之伏承禮祭過隆敬令兒子某攝謝病力不堪束帶耳下問事宜野人何知辱念承乏禁掖之舊比於同官抑亦虚襟弗可祗辱妄條一二以備采擇以自附於君大夫問而告之之義非敢必可行也秋暑共惟台候清勝某之欲遷籍良為就家近墓逺豪右便迂疎耳舉事在半歲前直以里父老勉畱冊事未有適主延待今日煩執事耳伏思邑民謁其所欲法茍無礙仁人亦必閔然從之以便其私乞推仁民餘意遂某之僻山澤行吟亦將詠歌雅賜也九日從俗登髙適惠酒至野興十倍謹具詩謝宜我堂費金敢辭念某殷憂劇病力不酬志為清時巨蠧躬耕食力猶懼愆尤執事顧輟俸餘惠養之於明公為盛節在某為増戾矣昔傳欽之知陳無已貧懷金贈之不果世兩賢之某逺愧無已而執事欽之其人也必蒙見察以成區區之諒所有不情以負髙明者有如日遙企門屏悚仄無已伏聞干旌將枉衡宇獻歲屬此淫霖滓淖載塗安可辱候吏况山人潦泉溪毛亦未能出戸采汲也敢辭嘉命之辱日徐生銳來比去少露髙情似欲游揚某於薦剡者感刻知已之愛為至苐病質劣才自處頗審某自知之執事或未之盡諒也嘗自為贊語中間有云生而進如讓退如蟄没而碑不文墓不封使後來博雅者莫能物色丹青者難為形容於穆一元吾其大同敢誦以為知已復與柴仲和某結髮知學見流俗所為私謂古之聖賢必不出此仰而求之無從也出與一二同志講習之稍知鄉方漸欲從事而闇弱孤陋物誘奪之衆議咻之荏苒及今猶夫人也徃歲薄遊成均定交汝白因知台有仲和之賢蚤莫過從聞之益稔未遂良覿而溫厚誠朴之風想像中得十五矣風便輒以書先與畱克全太守側聞命下棨㦸重臨千里士民幸同慈錫非某獨私忻賴也適此茂陽百蟄齊奮萬彚向榮皁蓋班春彌衍舊澤某亦受賜中一人不意夙疾錮而畱之無繇陪從郊迎賓吏之下陳咫尺不任向徃與徐伯和考功某苫塊殘息久不與知人世事頃歲王子揚自江右道杭逺承貶教副以南華口義記存之勤感歎何極旋復傳聞拂衣極目髙旻黯爾神徃僕求友於海内如兄恬厚和毅安可多許跡地雖阻神魂殊密長風巨浪何時一葦以從憂病彌年形毁神奪秋薦禫事於几筵將乞身泉石以武髙致惜當軸者不敢冀其如兄疇昔之曲愛相成耳與鳳林王承吉日承視祭李大崖文并下學用力得力處切實精審所以幸教某者甚厚顧恐迂愚無以仰副旅中弗謹致疾又為執事憂拜命之辱小愈即趨侍教邦升將歸受室汝白卜鄰敝館矣冀都一別三年疎劣須於矩正如燔待濡向徃之懷奚啻十倍恒情耶共惟綵侍多暇舊學諒益邃密僕釁積於躬天奪其耦冗累増劇學殖可知執事不遺疇昔當為憫然與嚴玉山栗夫三首某病伏巖穴遙聞屬吏下車宜從父兄共候郊外積痾憊甚扶曵不前謹手狀告不敏羸軀弱腕筆札莫能周慎然弗敢不親也某野跡深藏世嫌易致不敢一布其私以溷閽吏計䝉知照其非簡耳嘗聞教徃哲君子志於逺業大道固與時委蛇期不爽吾彀率而已今時何時耶奉候因布千一之愚伏幸采察冒暑迂途逺承下問已甚不堪及物之儀開誠之諭復爾隆篤衰劣何以仰承但増愧汗山中日聞善政方為邦人賀入覲即已戒程奈何教至督文賢守遺愛於石固當但郡有諸老先生則僭病力弗任則彊迂謬不文無以傳信尤冒忝耳與汪玉方太守徃歲都城王應時坐上望見德人睂宇躁妄爽然䘮我烈禍餘生屏遯荒野自分為世不祥人顧辱貶惠書幣詞意諄諄何敢當何敢當愷悌之澤滲漉於越波潤鄰壤顧計承轄之徴伊邇旦夕方切私沮耳與李一之都閫春和共惟鈞候多福葉上舎來致顓貺福蘭虎刺風致清逺頓令野興恍然神遊茂林豐草之間公閫寄專劇乃爾作意向山水中人曠度髙情感謝安可盡言與陳魯南編修違闊無任瞻企季明德來惠寄妙染冠以古風山廬頓爾增重感刻僕赴限至潤舊疾大作家人奏請事下當路兄假一言之贊俾就醫藥不勝至望伏枕涉筆乞恕潦草與陳希齋方伯某沈痾殘息屏跡俟命親交忽遺亦云久矣執事過屈崇嚴旁問幽逖誨函束帛洊至自分非所宜蒙苐深感惕伏承執事貞惠一德膏沐千里枯槁夙以漸涵餘潤愛戴中心藏之不敢為佞耳與瓶山項秉仁少卿阻闊無任瞻企共惟仕學交資聲績並茂良慰某病卧歲餘再疏得請料理殘骸徃事如夢然都城雅愛其何能忘息壤弗踐天實為之顧道義之好曷假婚媾願終不遺要以世講耳未申千萬加愛以佇驛召與東滙吕從野主事某病廢堊堵殘息僅爾蠕動執事不遺惠問勤辱如昔人嗜昌歜羊棗弗可致詰感刻徃窺器業已竊驚歎頃因陳君私淑道誼為多衰病屢驚企踵良覿冗結裁報春寒伏冀强飯加愛以崇大業不次與林以乘都憲二首徃寓都城獲侍德範懦夫憬爾増氣多病旋即去歸邃谷青雲何啻相懸九萬里心神搖搖猶日想像顔辭也伏惟執事風節震海宇望實孚中外起任台司以蘇凋瘵正惟其時尚爾盤桓水石間野人所未喻耳朱君慶來共領誨尺扇帊惠愛已優兼以雅律盥薔薇露而三復之磵戸竹窗盡驚金石奏也與中離薛尚謙二首端陽後一日坐石松行中忽得名帖不知自何許來把玩書跡恍恍故人對面夢耶非耶形神壯衰肥瘠劇欲親覿神爽飛越矣但疑信叅半病體復不能强亟令人徃省城問候何如春中一緘托德化祝司訓附去達否匆遽不盡伏聞逺道辛苦良用酸愴病卧無由把手慰唁奈何惟舊學日益精邃如金出烈火無任歆尚謹使問安白粲山殽聊致歲寒之意寒沍千萬珍重與林石海大巡某卧病海島若干年伏臘不齒于里社久矣執事髙義不遺舊故寵錫殊禮顯列之章逢世講彌文光動巖穴欣戴無量顧惟西日末光須於物者無幾其敢以嘉德等委溝壑謹封達縣繳辭企望霜威無任悚仄與祝思謩主事信使歸領書惠諗福履良慰某羸憊支吾恃藥力耳里閈末俗日入於薄力不能挽徒深愧痛吾弟為政恐亦宜先急此似是循良本領何如千萬為親為民厚自愛與石涇陸元望參政邂逅納謁獲聞誨論皆經濟逺猷敬服敬服小兒走謝不敏伏辱筵俎之盛躐進孺子於賓復辱使存多儀豐縟但増慚感枉諭令姪從師事宜力圖以告屬有先墓之役冗次弗能一一伏惟貸察不宣與夏惟明大尹某病伏巖栖病與懶習竿牘之問不獲時溷閽人然齒屋漁樵不聞疾呼急步之擾病夫得與之共適於水澨山椒抑敢忘惠殽核不腆小書侑之致野人鄉徃之私伏惟鑒納不宣與張通守某病伏海濱飫聞君侯宜民甚盛伏承符召許福實某僕人訟盜舟者某移家就墓四三年行義範俗愧王彦方長厚掩惡愧姜伯淮乃至訐盜以煩刑書中夜循省良自愧恨兹願棄舟與盜不復申理成仁人不罰之化紓薄劣不若古人之羞敢告與汪汝梁少參徃承勤誨進以良知之學殊感輔仁厚愛阻越不能報謝為罪比想兄體認日益精確施於有政與時賢自别况當表儀方嶽同志彚興大昌此道甚盛向熱千萬為時自愛與金文甫令尹驥淹劇任聲績日隆顧今政紏民殘昔人所謂能寛一分民受一分之賜者願兄不惜多畱意耳敝邑博士侯安甫歸便附布區區安甫謙慎而文且雅善僕兄幸一推情禮遇之俾寒氊有溫意僕與受寵嘉矣不宣與林鐵齋伏聞命下試尹靖江喜不能寐非為執事轉官喜為靖江之民喜得執事也旬月初政諒已改觀更願髙明審察其俗所宜張弛深孚而徐動之何如昔人謂矯時救弊猶行舟當漸靡而徃以向所趨乃克有濟此執事素蘊非今日矣王仲淹曰古之仕者為人今之仕者為已拭目以觀執事為人之政以信儒効以挽穨風快甚因風布區區無任愛助之懇與歐思濟博士霖潦移月廨舍完好否薪米足支食指否某屏逺闊問多罪髙標苦操徒勤企想耳茄盞奉備吾伊之餘一酌不訝輶瀆為幸與王遠吉參政某湛伏憂病如與世隔於兄通家雅愛不能只尺自達愧悼愧悼仄聞鳳林老兄大拜旋又不祿為位長慟天於斯文何以殞此梁棟兄手足至愛痛割又當何如令姪學已升堂諸父撫教諒當大就為慰貴屬南豐宰祝繼臯僕表弟也誣枉祈昭雪於明執法渠家教有素僕知其奉職承教可幸無罪故為之先與孫博之大尹二首唐上舍來承惠教良荷不遺所諭近政甚善大郡亦已知之古人謂仁可過義不可過某邦人也更何以他為助但覺慈煦中似不妨略加分别斷制耳是亦太府意也某於此殊未有補無夕不夢故山茆屋也風便千萬遺教以督之未間千萬為吾民自愛不宣某承乏諌寮未有寸補强顔負其平生公辱愛何以助之古之有志天下者議論事功茍可及物不必其盡出諸已執事諒同此懷某當敬承也與溫憲統大尹伏聞命下天錫慈母於杭人千里幸甚惟我邑人久離懐袵而重獲怙冒歡幸何如又况某獨被隆禮殊遇者尚安所容言耶顧惟湛廢空谷達途天迥親知且絶還徃無繇一致私衷於左右惓焉懷感時切寤言非敢蒙恥自欺以為佞也某日困病魔擁榻俟命孤孫顓侗弱子方抱埏埴良窳一任大鈞無所妄顓於世以重困餘生矣淛江東西歲比不登入春疫殄復大乘之而官事日益迫時勢日益難疲民顒顒罔知攸措似非執事鳴琴帥正時比尤望遄駕以神回斡無任懇禱不宣與汪瑤川大尹日枉臨存病伏不能謁謝殊極慚悚共聞覲行憊力不能候送顧辱加禮腆縟義曷敢當對使拜辭桂州齒牙之及意者執事謬譽啓之耳抑或垂意布衣賢公卿下士盛心但賤貴遼絶山人自合揆分執事過從光範門下燕語餘論萬一儻及沈淪但乞為道某待盡殘息不復能修敬上記幸甚不宣與劉推府某邑東鄙陳人也進無立朝風節退慚範俗行義乞骸故丘方以負國為罪執事濫齒之於賓惠之珍筵重以神惠汗顔登拜悚荷無似與顧天祐某學不適於用進無以事吾君天降烈禍退而吾親忽不待養創割痛弗可忍旦夕祈死下從於九原那復知有人世事足下手尺先我規誨甚善髙格麗藻亦少槩見矣多難殷憂州閭佳士久負良覿益自悼歎夫筦庫晨門潛光玩世昔賢猶然廼以𨽻於吏籍自少似為足下淺之山栖深寂夜舟遂克乘興某將扶杖質禮所疑哀病無次與吕貞夫徃承教牘禮摯病廢久不裁報惟古之有道君子不得於時而食於術如君平子真之流咸髙尚絕世晦迹一㕓而風動百代及今猶可想見某慕之甚劇安得起之九原與之一堂上下其論也今將庶幾身見之吾子何如何如與查近川給舍入夏共惟台候百福某病廢屏居多歴年所平生親舊殆已忽亡如隔世人執事顧獨作意沈淪曲庇逺問已極感刻邇從京師來者或傳執事時以不祥名姓揄揚薦紳間實非陳人所敢當竊念量能度分混迹漁樵無所利於物而幸或不罹其害以茍全餘生先民有言優哉游哉聊以卒歲不佞僭嘗誦法之况兹衰殘敢藉過私徼名達黨無寜實爽以虧頴鑒抑恐造物者亦將忌不我容耳漫吐肝膈惟冀加察更勿復道是執事知我之惠深於愛我倍百矣風便勒狀布區區未間千萬為國厚自愛不宣復董碩甫知縣六首逺枉使問文簟揀芽并辱作意簿牒堆中良感勤厚徃聞足下得漢陽累月惋歎如身遇怫鬰乃今勞習政成前途應大有受用處慰喜更倍耳嘗聞半山老人見涪翁一詩知非奔走吏亟改清秩以足下之才困於劇任所遭有幸不幸又可奈何某多病殷憂老痿一榻手閱四集恨知子之晩喜甚過望儻未即丘首駟車過家當歴叩所未喻徃寓諸集驚歎失子比得二作皆出憂鬱中尤訝驟進殆窮愁著書固當爾耶石羊記是小說佳者白世重傳立名近而當切而雅古人無以易也玩弄已甚衷憤不免索露意表但世俗間抵死徇利情狀更著一二險語如老吏深文何如然勿犯貨殖舊套尤善有作見教吾將屢驚焉不一再而已老草知照夏中為别忽近中秋衰暮能堪幾别耶諗歸使知旅次康豫慰喜五月下旬劇㓂兩過山廬館榖湯沐者再宿盡室席巻存空居耳跼處孤城載半餘矣金革日喧楚氛甚惡未知所稅駕奈何昔授顧令君巻聊傚頌聲已寄賢東汗筆裁報老草千萬貸察不宣荒城廢圃庳屋雅稱志士之廬慨然想見閔仲叔王仲孺髙風令人有廣厦曲池之適嘗思人情不同乃有好貧賤者某是也恐吾子或未釋然聊以廣子之志云爾枉問志事老誖疎劣吾子習知比方病甚搦筆重於舉杵何以能應夫史難在志要當立例簡嚴事覈辭省耳詩文亦恐不必多載但因類時挂一二妙語參差隠暎其餘似不勝書斯愈不可測矣何如何如竊嘗妄意志體難主故常以事為經以文緯之歸於言約事該鑿鑿傳信斯無不利矣今諸郡邑乘之鮮見久傳無亦循襲多而濫雜可厭耶殆不啻張先生所謂言無體要而已至夫臧否去畱則我明府淵見之審足下直筆之任予邑人也恂恂似不能言守此律令而已憊甚縷縷無次來諭深見傾瀝知已之愛但懸平天冠大市中正恐無買主耳退之所謂不可時施祗以自嬉自昔已然疥卵文狀物於難言游意於無象結語尤雋永其寺孟之未發者乎但以文為戯恐不可常將漸入禆官家矣何如何如相見更劇論之忽猝謾言照察與蔡松野大尹其聞之導民變俗之道莫深於教莫先於倡倡則教易行俗易成矣語曰一人善射百夫決拾倡也今之末俗敝極更僕未能歴數也姑以男女言之近自島夷作難突起猝乘習安之民魄禠魂散逃死無所寜復庇其室家於是膻穢汙染十家而伍偶賊還家效尤成例有靦面目無復慙顔淪胥角鬛矣故百萬民命民財姑未暇論而此辱到骨無可湔滌也某素尚關繫綱常事獨不敢茍見聞所遇必心存筆記之惟恐其無傳也吕詢妻事見之真録之實但文不工耳藏去有年頃值執事大修邑志褒貶勸懲此正可以倡貞風還美俗禆善治蓋今日修志第一義也敢以舊所為吕詢妻墓石志上惟執事采而存之與鄭壺陽大尹某不幸殘毁親肢茍生無賴意外乘以惡冦焚掠鮮遺十五固皆天下之物莫足留念顧族婣死徙無相見期獨為痛結伏惟執事雄算敏圖立退劇虜保障一方生聚乃復逺念沈淪恤其阨困重以溫存且謬進之使受㕓郭内得與安全厚德思以為報銜結烏稱形容耶夫誠感孺子氣作三軍執事一倡而士人皆為死士以是耳彼誠虧於平日氣奪於臨事先戰而後求勝百舉百不當也執事可以益自信矣借陳末議得毋訝溺人多笑乎僻寓少便老草與王沂川舉人比承教函奬與浮實曷敢承僕病血稽謝共惟德業與時俱茂僕生闇劣不自知量結髪宦學恥混流俗人崇長意氣妄以自豪適淪於俠知悔則已長大亟從二三師友相淑為道義君子之歸穨肆荏苒老失故我倀倀無所於依又為流俗人所羞稱悲歎窮廬將何及矣執事傑特果介當屈古之志士與相上下僕衰鈍累十駟瞠乎安敢望逸塵耶執事倘不終棄槁廢矜惠末議以振之俾更尋繹舊學或千一得成為知恥自重之士以不辱俊乂則又幸矣珍集遺教奥僻恠竒棘不可得句駭歎駭歎某久病廢言晴林炙背時與樵牧詠歌年豐耳烏足語此執事掄魁畫繡試過山中凭雕軾而俯聽之將無訝元聲至文顧在南鄙深谷中耶復吕雪塘塾師某少長惰廢老復病痿惛懵今也僵榻如尸櫛􅀈服食類悉仰成於人其於生人事都無所知無可應矣執事謬齒之人下問之何以為對皇恐皇恐然嚴委不敢祇辱勉一卒業首篇造詣邃見解微下語沈著經義至此無餘技矣某憶舊從事時質鈍教嚴師規凜凛如束濕薪度旬如歲不敏今亦欲以此繩束吾兒吾兒質似又劣也然斯時却無驟進師甚憤勞逮後游衍優游似如暗室漸覩隙光因思杜襄陽曰優而柔之使自求之厭而飫之使自得之若江河之浸膏澤之潤渙然氷釋怡然理順愚或偶中此耶記曰藏修息游夫學止四者而輟業半焉亦可見矣蘇子瞻曰有意而言意盡而止又曰行乎其所當行止乎其所不得不止遂妄意此學不必求之過苦也乎執事以為何如僭議命吾兒端拜以獻聊以報隆禮耳屬筆書傭老草罪過不宣與吳公路侍御二首仄聞執事遭此不淑九萬程六月之息大展少須之耳某扶病奔騖皮骨空存而比増病噎甚殆不知奉顔辭有日否萬物自然之理坐以待之何悔小孫仰承惠澤甚渥荀罃歸晉而感為謀未成者如實出已况執事親舉手力援之耶病力疲薾不布百一伏惟照察不宣志士得路敢為吾道賀但一入風波中須將舊日尊信儒先陳語世人訕笑所謂不消得如此者益自立定脚跟不少動搖由此向上儘有進歩處空囊無長物舉此話頭為贐與黄懷邦疎問復荷軫念病體久藥彌憊如遂獲從先人當屈子與訣一七或靈仲夏之交寒淙深樾子其索我於孟家瀑前頭耶與趙子雨秀才西湖勝遊形羈神徃豈惟足下恠地主之闕供湖山之靈亦將瞥眼鄙夫之寒盟耶秋闈得雋共濟有期尚圖把手盡之與徐子方秀才左辱多簡賢者幸以山人老懶不足致意中文字之役病鄉惡熱北窗清風尚猶汗喘須及新涼徐近筆硯以應勤委但迂放語言無能當意從違罪也可若何與沈秀夫内弟共問太夫人萬福内兄弟各安好僕病未任束帶供職諸想泊然惟歸思頗濃耳進退一也初無戀著曾解悟到此否途次老草與徐仲孚兄弟伏念近俗徇外忘内時藝大昌而此學遂為世之長物士習視古昏明何啻夜旦乃今昆玉拔興競爽竊窺儀觀風旨必欲反求在我以追前修私衷良慶吾道之有人矣幸益鼔勇深造不為利疚威惕自身而家施於有政以此始終道望西陲風動四境吾邦將為小鄒魯門下始衰殘願少須臾無死身覩聞之為快與五弟舟仲春來德業俱新榻上病夫惟日望之今日所當自盡祇是人事若期必得是昔人所謂大惑也斯蓋同行異情能審自處得夫之際可以釋然而凡人事亦不容不自力矣與七弟春事無多親年喜懼素業未精便是人事有未盡便是執事不敬便不可謂孝不知以為然否與諸生處恐須於舉子課程中存得些慕古力行意思庶幾人己無負然却須由中著實做出若有一毫强飾徒長虚驕彼我俱䘮耳盛暑為吾門强飯力學自愛六字聊致溫存并厲清苦和什雖佳非我意也宋人誓到河朔暢飲今日戒詩恐當例此耳與壻徐仲年舉人深谷少便無繇數相問得書良慰龍井揀芽渴吻所須㪺靈泉燃瓦鐺小沸長啜神飄飄便欲仙去侯鯖禁臠都不屑斷齶矣與壻董汝立某先長子之子敦儉年及成人擇嗣月某日加布於其首議所以教之者唯足下少孤求立小子不幸遇患適同誨勵允宜感興差易至期早過成禮老夫感悅無量與諸壻某到都幸安好苐吾兒輩失教未知婦道為憂惟諸生各勉率之耳朱親家董親家各襄大事有失執紼沈生所凂作贊冗甚無須臾暇待角巾南海上了此宿逋也聞徐生已易師嘗聞心為嚴師弟子方有益不然明師亦無如之何矣以告諸生諸生以為何如與朱倫仲舉人迂叟平生於舉業本無解處近來時格尤所未喻但謂文以氣為主之一言即孔子所謂辭達孟子所謂說大人則藐之之遺意舉世狎為腐爛常談不知其實乃不易之至論也比來從事舉業者徃徃似乎本之則無而刻意悉力搜剜洗錬務欲眩巧逞竒不知却已耗意卒亦未嘗竒也是故所欲忠告於子者更少進焉恬虚以澄其神静專以一其志精明以致其思廣覽以博其趣範古以𢎞其體宛轉以暢其勢峻潔以莊其辭沈著以確其語時時遊息以達其生意凡皆所以充吾氣也而又勿雜於異物勿奪於左見勿惕於得䘮有承蜩之專有貫風之巧有解牛之神於是胷中文思混浩流動勃勃欲吐角藝之場鼔勇操銛而進無有司於其上無羣士於其旁無呵呼叱咤於左右矢口肆筆滚滚百千萬言似不經意而體製章法句法自然動中矩矱其間鋒鍔光芒望之可畏究之不可測隠然長江大河一瀉千里而灧澦龍門時時激發竒壯極天下之偉觀渾雅寓夫精良險巖忽若夷坦如太行九折之坂造父飛轡越之猶行空然又如公輸子聖於巧而自不屑為雕蟲末技也斯稱能言已乎具眼主司得之必將擊節歎賞夫洞心駭目之觀也已然上之儘有可論子如更端大叩迂叟雖病彊當扶憊攝衣更僕授几一一為子陳之與子聞過論試今兹有司試吾省之士者何藝也曷為以藝藝道之寓也然則試非藝也固道爾矣道曷為試士所得粹焉駁焉深焉淺焉口耳焉身心焉利焉義焉得於已徼於時宜於今戾於古焉皆將自其人而布之天下者扶植人極潤澤生民吾君吾國永有賴焉者也而否者亦以負吾君病吾國是故有司試士弗敢不肅也士之應試弗可不慎也試曷為慎而所學於古訓而所督於父師而所聞於先生長者有畔於道焉而告者鮮矣而其持是以徃定吾志昌吾氣達吾辭有司叩以應之問以對之不知者闕如也毋勦說毋詭談毋雷同毋迎合粹然沛然一於道不惕於威不疚於利不撼於得䘮則藝也進於道矣由是舉焉人已皆得否亦失之人而我得也斯之謂君國永有賴焉者也如其齪齪卑卑校短長商工拙擬殿最規規焉必揚揚焉矜斯之謂藝而類於俳已由是舉若否人已皆䘮有不為曲技異學所鄙笑者幾希寓錢塘東郭鄒子者吾友也而以弟子禮質焉雲邨集巻六
