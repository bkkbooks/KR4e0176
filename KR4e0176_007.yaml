body:
  text: 雲村集卷七明許相卿撰序革朝志序於乎建文之末諸臣忠於所事者衆矣遭時多故處死亦非一途要之自盡其心以不負其君則同歸云爾仰稽我文皇秉鉞靖難之際一時文武才智知幾達權決擇所事去故就新䇿勲佐命勒彛鼎而誓河山惟良丕顯哉乃有固懐主私罔識天授悍抗憤攖上干赫怒前既灰骨沈宗後罔或懲而繼之彌厲參夷武屬乃猶競慕而勸趨焉於乎其愚不可及也夫而天常人極乃以之存終古世道之攸繫也顧不大與嗟夫是或一道也已夫曠代相感百世猶興尚徳之衷古今一也壬午内難逮兹百四十年諸先正狥國之烈故老私載時時槩於見聞毅色危辭凛猶並世予未嘗不三復流涕也感興云爾乎是故沐浴文武之澤而不能不義夷齊云往者紀錄不倫遂將紊遺失實爰類裒而序述之得百有六人又聞諸老先生言文皇師入都城之夕郎御史給舍相與縋城逸去者四十餘人詰朝覺察者以聞後来邃谷窮山人徃徃遇識之傭販禪寂中於戯盛哉夫國運廢興事之所必有也而建文死國之臣一時累百三代革命罕前聞矣兩漢以還勿論也殆自天地剖判肇有君臣以来而創見於斯焉於戯盛哉其皆天地精英之萃聖祖功化之神書之足以樹貞風光信史震耀竒偉於宇宙間屹為千萬世委質臣人而懐二心者防誠不可以莫之傳也已於是人之為傳巻類為五難作而死於中死於外者曰死難任事不幸而以死自靖者曰死事不與難不與事而其心必不茍生而死者曰死志義不變面易辭而甘流離屏逺艱迹苦身之死而不貳者曰死遁于時未即引決而知生不若死之安也而卒死之其與死難死事死志死遁似有間矣然亦可謂有耻而庶幾不逺之復者曰死終論次為五忠傳具列於篇志義之士得以考徴焉若夫所見異辭所傳聞異辭所紀載異辭則姑次其名族而世行爵里闕焉以俟夫篤古多聞者云女教補序女教十篇作者宋方澄孫氏吾友蔡希淵廣之為十三篇合若干言示於某曰子宜序而梓之則卒讀曰唯唯予惟先王之教非獨行於大夫士也至于女子子皆立之師焉教之熄也學士大夫難於完徳况乎女子生長中冓教之不聞學之不知湛俗狥已而幾其動中於善也不尤難哉中間天資近道樹節炳炳與烈丈夫爭不朽名者亦時有之然累千萬得一顧非幸與而其不幸者蓋可勝道哉蒙仲氏編所為作吾希淵所以廣之者也或曰劉子正列女傳曹大家女誡至今存也教女不以多乎曰二書之言奥而文故二公欲反諸質質則近情近情則適俗適俗則易知而易從于以相漸相觀率而趨之不難也猶之膏粱疏食均可以養文綺大布均可以溫然得有難易用有左便而及物之廣狹殊然則是編惡可少也抑某讀易家人而知教女之本之有在也有家者知其本之在我而身以刑之書以徵之教斯成矣人人知教則天下之家正而天下平予故樂序而傳焉漸齋詩草序夫聲發於性情中律而成文之謂詩詩也者人之精蘊也是故古之人由詩以考其世知其人隆汚升降興替否臧猶鑒縣表植當年曠世靡爽忒焉其見於詩也深哉予於詩無解也往從海内大夫士遊賢其人則徵諸其詩人品心聲殆多類應億之而中幾於大半矣若我漸齋趙先生者予始而語合久而心親兄事師資之今五十年安所事夫徵諸其詩以加信耶近畀予詩草縱觀之非詩之為徴而飢渴晤言得如面語也以為快夫其見髙物表而語𤣥曠時寫衷素而語易朗情屬誼舊而語溫雅脱畧聲利而語超拔分安止足而語寛適根極理學而語閒暢松隂細詠欵叙平生矣翁髙格逸調混迹流俗獨懐勝情才美醖藉操履峻潔不少挾以自多坦如也恬如也方嶽崇階舉步臺省未老去歸若蜕裘葛特先凉溫無吝情焉方今勢競利趨穨波日下乃兹卓哉危標壮節砥柱浙河之間翁其表東海矣夫直詩草之傳也云爾乎悌弟紀序予讀阮子學令舋舋齗齗累千言首列五典末簡及藝文焉猗與今之文哉洋洋乎衿佩溢委巷誦説誇孺子盈宇内皆是物也為教後之而典是先何與既而得厥考愛雲翁弟弟紀觀之作而曰蓋有是哉固阮子之所學以為教者也夫五典在人如兩曜麗天疇能斯須違之故文也者以飾典也典亡已文安傳耶今之人之於五典不盡其分者多矣而長幼之道乖悖有甚焉間有令兄弟讓千金爭死命者載籍亦時見之然或邂逅感慨於一旦而其庸行果皆然否耶賢哉愛雲翁也以若而兄常事之周謹虐使之順承苦劇瀕於死無怨言已而分與取其薄既死恤其孤沒身無改操焉於戯是豈暫焉矯而為茍難者殆由賦受良充養素性行成故變罹困極而懿親順徳不少易其常云卓哉至行古之道今之師也抗弟道與忠孝並近自愛雲翁始至於致休祥啓後賢阮子方承上命督學以身教先浙士則翁弟弟之錫類彌逺矣悔言序夫辭尚體要簡尺之體惟真而盡達吾意焉止爾否雖文非體矣夫羅獵理亂稽證古始而以辯博悟上上書陳事之忠也鋪比蔚贍賦之則也白發事理往復究盡論議之制也語焰談鋒張皇撼動説士捭闔之術也擷葩萃英采錯爛如詞人之習也領徳贊功誇諛浮實佞人利口容悦之態也摉隠窮奥哳吻棘喉務異求勝敦銘冢簡之竒也警意麗詞逞新衒巧經生誇藝攫雋之餌也至如㫖易辭艱以深飾淺壯夫羞稱焉然以之投世耳目亦多快意動容蔵去為玩然皆非其體何也去真逺耳餖飣支離尚奚簡為予生野性朴資任真信古或妄一言面頳背汗若不自容所著薶文肝膈可見使得師資有道即未妄希上達萬分一與進於論篤君子臆亦可乎而同塵流俗罔所適從閱宋季佞人手尺遂沾沾自喜漸習於浮淺矯誕而不自知郷有正學端人見之能不鄙予為尚口不情者幾希晩適有知亟將抹摋駟莫之追矣嗟夫吾自賊其資而自安於佞也久矣乎愧憤懊悔奈何哉此存家集正以為戒欲後之人勿復墮此蹊徑以再蹈予之後悔焉爾吾嘗觀歐陽蘇黄發口吐辭和雅暢潔良非淺夫矜飾者可同日語又觀江左以還章逢辭氣記載尺牘類皆直而簡恬而曠暢達而逺即方言而和易見於俚近著家人語而暱昵懇欵慰愛藹如言在帶下目前意自悠𤣥雋永斯簡之得已矣後来工言者盡意摹襲了不能似蓋難乎真焉耳蘇子瞻曰有意而言意盡而止天下之至言也豈非真之謂耶是故簡尺以真不以文然而真未嘗不文也故曰晉人言語用以為文當妙絶今古何耶真故耳其然乎其然乎吾弗及已序悔言汪氏近徵録序近徵録者歙汪道𢎞氏之編也汪氏望歙逺自越公華起隋唐間遡而上江左宋有軍司馬漢有龍驤將軍又遡而上秦有徹侯魯有死郎之戰童彌逺已矣逺故源不易究而其流漫然不易究則疑漫然則愛罔克專而戚疏莫可為等孝子順孫宜弗之能安已是故近徴録作焉夫汪氏故有足徵録逺自得姓以来詳矣兹録則近始道𢎞九世祖宋方壺居士叔耕厯傳至風雪道人克逺是為道𢎞之父系次繩繩貫如爾秩如爾叔耕所遺晦菴朱子西山真公與當時顯者往復諸書乃後奕世備載累朝名公卿記志諸作徵諸文獻不已炳然切而覈也哉于是奉先立愛始親孝之則也于是敦族恩紀不紊仁之序也抑夫近徵云者非忘逺也篤而舉之之義耳夫君子於天下將皆用恩焉况其宗耶然疏戚後先固弗可以槩視而混施者禮本乎情則然耳道𢎞斯録殆亦率夫情而義起焉者君子曰禮也友竹詩集序予誦朱翁友竹集慨然想見故老之風而歎吾土之風之日以下也以吾土而意天下之風殆皆爾矣天下吾末之與吾力已吾寧詎能遂忘吾土耶是故昔聞父兄一事一語崇厚先讓者恒三復之以風時子弟若有不容已雖未即挽俗而上或猶障其流之亟下趨云翁生不識訟庭語及人過瘖如也居里中以朴鈍不如人自處今其集中語循分優游無外至者以供喜怖不欿然於卑居而羡夫有位者之為華視今日吾土之風不迥然遼也夫使吾土而今皆若而人也天下又皆若而人也比屋愿民庶幾哉有以承上化躋至理而治世之音可作矣夫孔子序詩里巷民俗之謡與殷周廟朝之樂並陳何哉蓋殊者聲辭而縁情敦質致一焉耳是故為經而世訓之然則詩之道固因其質而賁飾之以諧聲成文者乎今夫俗之文其諸非古之文而翁惟其質也而古之意存吾故序而布之郷人廣故老之遺風焉紫雲宗乗序相卿讀許氏族譜泣數行下已而喟然歎曰先古逮今吾之得姓傳世不逺已乎而許氏僅而始提督公譜耶夫自宋之南也金元之亂極矣民罔土著士鮮完室許氏盖猶幸而譜提督公始也然而撰述者鄙哉於是采先世之載譜靈泉許氏之族之世云然予紫雲之肇家也厥有不獲已焉耳矣夫予先君嗣適始遷他邦禮稱别子者是與非邪别子為祖繼别為宗宜别有紀使後之人知靈泉有許始提督公紫雲有許始予而宗子之法迺可以世篤而人守已乎於是詳吾之所自出及事之所當紀者又為紫雲許氏宗乗云語曰萬物本乎天人本乎祖二者蓋一氣爾天言夫大祖言夫親也是故子孫而不録其先人則是鄙悖之民蹶根棄本之行也然而今之人之或録之也殆異乎予所云不知務徳自樹丕顯前人即紀實傳信而百世足徵已顧多求勝眩俗妄附往哲以為名髙斯其與不知録者有不同歸於忘本也幾希予特恥焉爰述夫灼然足徵者次于編使凡所由以出者咸知其本知本則重親重親則勸睦蘇氏所謂分而塗人其初一人也者將自喻而漸敦矣不然異形爾汝耰鋤父借徳色經慮况夫族之合也否也吾獨且奈何哉家則序吾幼志于學長從陽明先生游暨海内志義之士過從磨厲垂三十年憂病莫晩志猶罔甘自阻又有望于後之人於是作家則及觀浦江鄭氏家範尤若廣而宻要而不遺慮逺而防豫吾則所未逮也然攷其編次前既録之後又録之續又録之閲三世厯數十年而後範成蓋俗流日以巧法因漸以詳埶固宜爾也今吾閲厯淺意見踈而後来運化推移殆未可涯欲恃僅僅數十百言預待日新無窮之世變烏可乎哉吾後之人逺猷卓識順時保家於事之通變宜民而不畔于道者詳酌精思續為之則又進而廣善志參鄭範以成合族共家之義百世其將訓之奚啻于吾有光而已耶學則序夫所謂學者學為人焉爾學至於聖斯人之至者矣而道則所由以入聖之路也故學致其道之謂學人志於聖之謂人非然者茍而已矣今定規條斯意特先云受讀此編者當知聖人之學初非性分外邊有所增益只是復得吾所固有者焉爾故能卓立此志反求諸心循後之規强勉不息以上達於髙明而為成人也斯真吾子矣祠則序惟古王者廟祀先王逮于諸侯大夫士咸得祀其先以廟制由等降有差世適主之宗法其端于斯乎然諸侯不敢祖天子大夫曷敢祖諸侯乃有宗子之法别子為祖繼别為宗百世不遷統族姓敦世徳以遵王度而守宗祧是則古先哲王聮屬天下之道家有官政人修士行而不犯于有司也故曰宗子有君道焉自夫封建廢而宗子之法亡世不復見先王之治昉於是矣吾儒有識者謂夫古今不同者時而飾情起義以為禮未始不同也無寧直以古之必不可復而但已耶故議今始去其鄉及始任於朝者擬古别子稱祖而繼别稱宗得禮意矣吾許氏世家海寧之袁花先府君初命相卿舉進士官諫垣無何府君棄養予不幸遭家之變而求自全吾常遂去袁花適茶磨家焉茶磨嘉興海鹽山也去郷越境筮仕升朝兩始自予擬予别子惟允而嗣予之適百世為宗夫復何議於是卜宅甫定而立大宗祠於堂左室鑱家則之石于祠以詔我後之人相傳糾族培徳以世吾家庶幾古者宗法之宏規長計云墓則序夫墓曷為則也為則以詔夫墓於山者之後之人纘緒承祀於無疆也吾許故家靈泉平原豐衍水縈如織秀矣封丘若堂松楸在望便矣易稱上古葬之中野有徵矣舎是而山之墓者何聞諸老人吾先嘗墓染涇兩河之間崇封茂植鬱若屯雲宋南兵興鞠為夷陸乃今斷碑殘甕罔所物色也已傳戒五患信然哉是以過懲焉而必于山以永奠焉夫海州守而下墓山多矣則肇於吾父母何親親于所自出者始也夫有形歸畫遺骸猶蜕耳增山錮泉要已非知蔵以安之而復則以傳之何誕矣乎斯放而為達者也夫予之則之嚴後防逺先澤廣孝思斯常經也於是作墓則先兆域次居守次贍業終常祀例凡四文于碑送葛惟吉序傳曰學然後知不足教然後知困予迺今有味於斯言也自予勝衣為進士學成童而益冠而能通于時賢子弟之以名求予而昧其實者或妄推之予遂抗顔為之師已而漸自覺孟浪者之無與於身心且悔其謬自足而不知困也今年春葛惟吉氏重繭日百舍至杭投謁於予館人日再至風雨不廢凡三日而後見之致辭甚勤執禮甚卑委幣甚恭蓋如昔者二三子之求予而誠有加焉予固與之抗主客之禮既乃告之曰子知遊乎少年邁往發軔之謀弗詳往往饑渴困踣于中途晚始知難將有千里之適必三月聚糧而後取道予之於子猶是爾矣故昔之以易求予而應之不難今子謁予甚難而予不易狥子也矧夫子之好學不矜鋭敏而文于干時好也何有尚安所取以重困予乎吾子行矣雖然吾之不敢師子不但已也願因子而益求所以舒吾困子盍亦因我而彌不自足庶幾有得於言語文字之外則將悔其今日之非所以求我而由是以進于髙明也其有餘師哉然則子之来也雖予不敢自任夫一日之長抑不敢謂子之徒歸也吾子行矣聞子始来太守喬公實勸相之誦吾説歸報喬公以為何如也送陸生序正徳丙子秋八月王子之門人吳江陸希旦就郷舉于南畿弗如志治任將歸王子以生来謁曰夫人也植之天甚良其諸人之所以培溉之者有未盡也是行也得無揺其中而渝于其初予私憂之子盍左右我相之於道曰子舟歸乎請以舟喻方其浮大江亂京口絶具區廣不可以目極永與天際而深叵不測風雨變怪將復乗之舟於水則漚也信天下之至險矣夫然而長風順流崇朝百舍滯通逺達天下之至順莫加焉何也夫惟其舟之足恃也是故材木猶吾質也取諸朴厚朴厚則足以盡吾刳斲工帆吾氣也取諸大以完完大則藉力於風者壯檣吾心也取諸有恒而直縝以不蠧有恒而直縝且不蠧則危懸重繫倉卒震撼傾側不能為虞柁吾志也取諸正且廣常操而善運操正運廣而水勢委曲相得波弗吾蕩風弗吾靡篙若㯭棹吾才也取諸剡取諸直取諸長而鎩備是而運掉進退下上夷險如意至於欞檻闌楯雕鎪藻繢猶吾文也有之無之不為舟之虧成然亦必取諸盡制成章而觀美斯具夫是之謂成舟然其用之也天時有順人事有工弗順弗工猶無舟也是故取道于風持以審慎應以練習而又率之以無怠然後天與人一人與舟一舟與水一致精入神而利渉之體用備是以人相勸往如平陸而天下無險道矣悲夫世之强濟以要利者弗畏于天弗習于人敝舟苦械日招招於江濆覆人之愛子竒器于横流而并其舟以亡者尾相銜也悲夫孰與夫善其舟究其技深􅍻固維以俟時之順乎生其以予言為知津矣乎盍觀天下之勢其於長江具區何如耶吾所以濟此者亦既具也耶而遑以時之淹速介然于懐耶王子作而曰許子之言君子哉吾告希旦末以加於此矣小子識之送都諫吳公參政四川序天子更化正始攘殛凶邪柄用耆徳逮于方岳擇惟其良於是東吳吳公自工科都給事中參政四川行且屬某曰予兹萬里别凡在遊好擇言贈我子吾僚也顧愛言哉則謹告之曰君子居其位必思善其官公官昔曰諫今曰政名以制異職以事殊位以地别然陳力匪躬臣道一也矧夫諫者固欲其措諸政云爾已矣吾知今而覈公政者將不稽諸其諫乎昔聞公諫者將不責諸其政乎公其得曰吾頃姑云云爾也抑公日在諫垣時與志忤勢與道違讒譏殃咎戮辱放殺之虞固非君子所以累其胷中而惴惴焉悔于厥心羞于厥黨獲戾于千萬世公議是懼能須臾寧邪兹往也時得志行貳岳伯制方面守令丞尉坐趨指使於前監司命使可以唯諾成議也朝有欲革夕報罷矣夕有欲興朝奉行矣昔徒言之而難今專行之而易公其優於政哉然諫難矣難不盡由於我將或諒焉政易矣而贏縮弛張惟我之從或後戾其前行違其言人將以為口實曰諫者誠姑云云爾也咎有彌不可諉者公其慎於政哉某又聞之蜀産之饒古稱陸海今尚爾邪營建徵發岷峨赭然任輓負擔數千里間赤子僵僨者相屬也重以兇逆貪殘屠剝蠶漁之餘而樂國墟矣公之政其尤慎於保障哉他日全蜀富强光復舊觀固國西門以捍疆圉而當宁寛右顧之憂果然必公也某將獲齒於知言矣送運使董公參政四川序兩浙都轉運使董公被命參政于蜀我郡守留侯合其僚往餞之祖道宜有言也以屬某吾聞董公今之剛者也易曰天行健君子以自强不息剛之謂與天下事夫豈巽輭隨靡者所能勝哉而世常親彼而仇此也然君子曷嘗前却於斯抑將因而取資焉是故楩柟杞梓材矣必飫陽和淩隂沍綿嵗時然後棟梁桷􅍻輪輿輻輹巨細短長無不勝任昆吾之金良矣火不鍛水不淬石不錯頑然礦耳是謂禍之而福損之而益者耶公以名臣子登甲科厯郎署守大邦雅操勁氣屹然律已而未嘗俛以隨人故所如不合排捐於大吏低徊於散局有年矣休休之度在彼何如而於公適皆增益磨冶之地也公乃今其益自信矣夫兹往也貳岳伯當方面全蜀數千里户口泉穀征科考閲理㫁輸作軍供國計吏敝民隠皆得控制罷行之以宣布天子及下之仁顧若轉運使一㑹計有司之任哉昔也公為鬱衆望今則衆且厚望於公焉公將益修其平生堅其守𢎞其施俾剛之功用白於天下而慕者慰忌者沮乎斯我留侯愛助之意某述以諗焉鈍菴邢公七十壽序司馬子長傳張釋之宦業為漢名臣及其子長公官至大夫免歸不能取容當世故終身不仕是非父子異趣殆異所遇邪遇不如志與其䘮已以徼時寧適意完名而全其天之愈也故至于今髙長公亦多釋之有後後之士役役求仕仕焉如歸志溺已䘮道方屈辱而尸寵弗顧投老無期雖或踐華要握柄樞名勢榮利赫然一時至求可名後世如張氏父子者何少哉然仕以行道也懐其道受其名以老亦士之不得已於世者與自予居京師與晉之賢士大夫遊往往聞前國子祭酒少宗伯襄陵邢先生立朝之風及其子鈍菴公第進士自中書舍人為庫部郎中亦以介特忤時貴出為長蘆都轉運使時謂冗汙地不以處時望公往三閱月不自意得解印綬去人故溷公而公飄飄然鶱騰雲表矣歸則治園榭亭沼與故人遺老燕遊詩酒其中泊然若未嘗有名位者進退以道日見休裕化行於婣黨信孚於郷人河東一時有大老之望焉然則雖不究于時既受其名又受其樂以全其天錫光宗伯追髙長公為自重之士倡又以為教雖曰非公之志非公之道與借公枉尺直尋今則致位卿佐止耳况或時左勢撓全者虧譽者毁若是而備福致壽謂無歉然能乎其可願而賀者於今日何如也嘉靖建元之年公歸十有六年壽登七袠矣其甥李廷玉將歸稱觴祝公謁予言以侑之作邢鈍菴壽序送盧君之河曲大尹序盧君起諸生丞海寧九閲嵗家不支伏臘囊不給裘葛釡盎屢空孑然故諸生也今年春遷晉之河曲長民甚宜之而難其去徐生禾寔来謁予序吾父兄子弟噫惜不夷之情夫盧君之所以得民非一端也而端於廉今夫廉不同矣太上安之其次利之其次强之爾强而廉也人共難焉廉而有恒又加難焉廉而有恒貧而不悔而又歉弗有也將天下難焉盧君暮晚滯淹貞白卓偉君子以為難而民方歎咨之聲歌之象繪之又圖尸祝之未已也君顧無幾微矜衒之意動於色辭泊如爾晏如爾寧復以名位震耀歆豔於中神鬼恐喝要遮其前而姑爾矯厲為也謂之廉而安者非邪彼哉今之從政者也夫貪墨以敗官諉曰地卑直倒行而暴施故士恥其行低汙以来詬諉曰俗訐顧誓天而詛神故民憤其誣吾於盧君之吏海寧而知官不于其地于其人于其人而士之恥雪矣吾於盧君之去海寧而知訐不由於民由於吏由於吏而民之誣白矣盧君行矣懋之哉夫世運消息非天司之人為之也今天子崇化更始燭炳致理之原詔太宰選舉中外臣工毋資地限自今貢士與進士埓盧君其有遭乎行矣懋之哉夫執政者之斯舉也固將風厲海内之士爭自濯磨祇承徳意一士習貞吏治而還之古殆端于君矣盧君行矣懋之哉壽朱陳兩翁序予少遊海上遇老人為我言天下清謐休暢今百三十餘年故邑之墟天地委和合氣於山海特厚民生其間將必有壽而康者乎子姑識之既而西村朱氏石門浮屠氏勾溪陳氏咸以詩問予予誦而復復而樂也則相與賡為唱和之什時三人方壯予尚少迨予舉於有司從金馬門之役旋復歸耕紫雲忽忽垂四十許年石門化去予善病早衰而西村今已壽登八秩勾溪七十又六矣齒髮無改於中年視聴良察嬉遊登眺舉步仡仡恒捷先予恍然追惟往事昔云壽而康者夫乃翁是應也夫憶嘗序勾溪父竹齋翁壽記石門許泉亭書西村曾王母懐節之堂論其世知其人固矣抑自其往還從予於湖山間壯以逮老觴咏談諧文墨之餘聲利不關其聴怖羨不入其懐當世末俗之疵瑕一不挂其牙頰也其渾然長厚者與澹然物外者與善稱於郷無訾議者與故夫恬曠以凝神容黙以遠怨嘔吟以養性情召和致壽培其本者不已厚乎詩曰瑟彼玉瓚黄流在中豈弟君子福祿攸降其斯之謂與故石門壽終六十予嘗以其不幸為憾而兩翁康强難老巍然如魯靈光逍遥閒曠咏歎貞符駸駸躋於期頥上壽而稱人瑞未艾也海上老人望氣之占信而有徵矣乎送醫呂生序予抱病入山垂二十年長林邃谷却掃深扃僵卧如蟄非行藥不出户非看山對月未嘗一鈎吾簾也周行搢紳之士惟平生金石交迂蓋聮榻信宿而去然嵗不一見城市之人雖親舊月不一見日或與接者同業之農圃樵牧而已有事之卜醫詩酒者而已然樂善懐賢之衷猶耿耿焉弗以病沮也夫唐虞之隆乃有巢許兩漢之治厥有君平伯休唐宋之盛亦有杜生篾叟妄意聖世獨將盡羅英賢於巖廊官使而野無一遺乎哉心存神往庶幾卜醫樵牧之間萬一遇之嘉靖丙申之秋呂貞夫氏訪予山中其貌退然其言訥然與之講學論醫及其郷之故則白雲以上丹溪以還其中汩汩然而未涯也斯殆學不售而隠於醫韓退之所謂有托而逃焉者非與然其醫以先根本後標末為要與時之急功罔利者殊科以是知而求之者亦鮮而貞夫將返其郷矣夫學不售而托之醫醫復非時所識而不售也吾是以悲末俗之難諧而重歎貞夫之窮已夫予迂拙無似學成無所於用藝復無可托焉而誤為時所指目咎往追来寧甘畢世卑卑但已乎貞夫行矣吾聞姑蔑之墟山水竒奥仙靈所隩異人有道者之所常隠也子歸探煙雲窮縹緲而邂逅焉為我語之曰海上紫雲山中許某者一杖一笠將從尚平抗迹遠影於五嶽名山其毋俯睨我也哉送韓僉事序淛江按察僉事苑洛韓公執法不便於用事者狀聞移江西按察僉事三司之寮列郡之守若令與大夫士暨于吏民其志同於公者與恃公以行其志者與諸隠詘之以公直者與以義直公者與偉公壯節而大望於其終者所在相與語曰韓公行矣韓公行矣嗟何淛之民之不若江西之民之幸也公惟不私便其身圖而圖吾民以有此行江流如虹我懐與東惟公之榮伊民之窮皆歎有泣者又曰公知法不知時以疏遠抗貴近遭天子明聖䕶全之吳越豫章等善地耳寵任舊秩加令名焉公幸多矣抑天下事猶浙也彼前知公之不我容而為地以徯公公則竒貨之在羿彀中耳前事彀率曷其少更疇能語公憂心如酲又曰公官以執法名安民而衛之為法奉法而行之為利利以及民為仁仁徳之懿也道之大也公幼學於父師者能或加於此乎出當一面寄紀綱方岳之政夫豈芥蔕區區旋踵而易其平日之所操者哉使公進而司天下之法法又有大於是不便者又將多於是利害又將不可涯於是無寧與時上下委舊學壯節於弁髦使吾黨之士氣奪語塞而異論藉之為口實公必不爾為也夫固持之以矜不以爭應之以理不以氣動之以誠不以術焉爾矣不然巻舒機軸公自司之誰則知之海寧尹曹廷獻恃公以行其志者方戚於去公而樂聞斯言也曰孰能文以贈公俾取衷焉於是某序之諸為詩歌者繼之贈張先生序予聞之古我先正名家子弟處天下之至易而亦處天下之至不易夫能勉焉自立而少異於衆人必得因縁馮藉以立功名茍為不然他人未必得咎而已為清議所不容矣金陵玉亭張君曾大父以文學行能至大官君負穎資承家學自其童時肄里塾有英聲長遊京學有雋聲五試京闈連不得志於有司以嵗序貢春官則慨然曰丈夫寧必以捷一科第榮此生耶顧為之在我者何如耳則俛焉就天官選来司海寧教落落無握齱態行不茍于同于其介教不屑于細于其大徜徉文墨觴咏之間以遠者大者自期且期其徒其徒愛而譽之監司聞而奬之夫監司勢與我懸奬或可以冒致諸生情與我迫非真有以感其衷則其愛我也安可以襲取幸得之哉夫地卑者勢陵局散者情緩職司於是常為尊要者之所賤簡勢則然矣夫彼挾其要且尊以臨我我復自居若長物然以自輕所以自樹者其存幾何夫惟正色端範凝然自重而無或可以取輕彼且失其尊與貴而積弛之師道舉世非所緩急之斯文將不由是少振已乎今天子鋭精致理知賢才之必所資而不可後也又知科之未盡得才貢之未盡不得才也詔銓司用人進士與貢士等此雋豪馳騖之時而有志者之秋也張君勉其所以處天下之至易慎其所以處天下之至不易行將陟華躋要以光文僖公之烈繼御史大夫之志而與伯氏嚴亭按察廕亭郡侯競爽江東使人頌王國之斯皇也不亦休哉廉泉高大尹奬勸序南郡廉泉高公以進士起家令海寧未二年所巡浙御史李君董君嘉其治狀僉檄所司備禮合樂奨勵褒表之以風動列邑為人牧者少尹巙府呉君率諸僚吏士民稱賀而来屬余言予臥病萬山中幾三十年世無所與吾力而繫其情矣惟令得賢澤沛四百里許而其餘潤稿瘁幸漸焉所禱而占也是誠余所樂聞抑司風紀者之斯奨也將浸達于朝矣庸復求諸野乎矧余病未能也請三四不置爰作而誦其所嘗見聞云邑人為余言廉泉之至也先明而作後晦而息賔謁無留門者酌羣言集衆思興民利則䟽渠陂虞民害則籍暴惡桀驁梗治懲之使馴柔愿負抑植之使伸兩税之徵以信庶獄之聴以情貨法影税宂深術祕之奸蔓索而根窮之無遺力焉愛民之誠不啻一二見矣未幾廉泉逺迹訪予巖居望其眉宇虚已欿然下物退然接其詞氣肝腑洞然無匿情也古所謂豈弟君子平易近民者非邪御史之奬邑人之稱余一見而孚又奚庸於贊抑將自附於忠告可乎余少有當世之志嘗請於諸老先生而竊識之分定而不容貶者道也日降而不可挽者時也故聖人能不失時不能違時世益下風益卑聲漸氣嘘人異情事異宜道如時何哉故君子出為世用必先定其志而以時委蛇其間志定于先則道不終枉委蛇權乎時則與俗不大相戾而吾志之達於政者違道不逺矣譬之行舟漸靡而往以向所趨不以亂流為勇而以終濟為期守道宜時之權蓋如是然權之為用其端㣲其究殊以道權時時可從道以時權道道將狥時矣狥時枉道郷吾之志若斷梗之逐湍流裂瓦之淪深淵徵諸素不亦繆逺矣哉此枉尺直尋功利之遺禍焚溺人心甚於水火而不復知禮義進退為吾孔氏家法也廉泉邁往之志堅正之操超然皭然不靡靡為同不棘棘為異其於道也庶乎業已遇知於時兆足以行矣願持其始者勉終焉宜民之利將無未盡舉者乎蠧民之害將無未盡去者乎桀驁之梗將無未盡復者乎柔愿之抑將無未盡舒者乎徵求之限將無迫而莫措者乎聴㫁之敏將無忽而或枉者乎貨法影税宂深術秘之奸將無抹摋吏牘而跋扈憲綱者乎一一盡洗而更新之斯愛為真愛誠為至誠矣鄒孟氏曰至誠而不動者未之有也夫命相試以民事守宰入為公卿古今則有然者方今急賢登俊之㑹廉泉持其素蓄已試之道趨巖廊立柱下總天下之圖書承明王之顧問應答如響畫地成圖而與諸賢弼成至理余方為天下賀矣南溟鄭大尹奬勵序錫山鄭侯以進士起家来尹海寧人意其甲科掄才致逺未涯將養望游優蔵器待用以時措之建安攘而溥康濟海宇民社安所事事適坐鎮耳侯不然又意其志鋭氣豪才識自廣宰制數百里猶庭宇掃除將廢革典常立法更制易民觀聴與之為始侯不然又意其左輔樂國之産狎見奢麗土芥貨財將揮霍靡費私親故結貴要盛厨饌供張金帛饋遺輿馬音樂送迎之儀侯復不然日澡手束帯而朝吏民雍容委蛇奉職循理不靡靡以為同不棘棘以為異務持大體而一主於愛民聴訟決獄恂恂如與家人言惟得其情不事刑威於紛更而去其甚者減供億省禁令慎追逮薄徭賦罷宴遊弛諸彌文浮費皆民所不便也其言曰令猶牧也不擾其畜則生息遂孳育繁矣故其愛民猶以休息不擾為尚夫擊㫁不測可以駭威神鉤摘隠門可以凛神明表建竒勝可以樹名績征輸期㑹可以稱幹敏為政者類多出此侯一不屑意以煩民也今兹夏秋島夷猝犯海徼其勢張甚監司欲以糧勸民侯持不可曰貧民尚逋常賦則罄已廩資以給之欲以兵授民侯又持不可曰不忍驅白徒以膏夷兵且食於民者軍足用也至以利害恐之而侯屹不為動故夷兵再臨境上邑人晏然不知行陣之勞餽饟之費也夷冦海鹽海鹽去邑不百里而其民百千老弱要領殱焉焚刼廬舍赤地數十百家雖地當害師無紀律致之然使為之上者盡氣委命如捄其子將不十半獲存乎君子所以哀民而疾其上之戾于仁也而我父兄子弟偃仰袵席侯之徳於民其可以津涯哉抑聞吏民之稱侯也其性静其奉約其守正其性静故其政簡其奉約故其用物儉其守正故其援於上寡矣比者侍御代巡林君清戎胡君廵鹽霍君一時交檄奨勵之夫三君居風紀之司當激揚之任固皆知人能得士稱上任使者耶漢法吏有治效異等輒降璽書勉勵復增秩賜金復賜爵闗内侯復進為公卿所以重為吏勸也方時尚煩苛操切之風而侯獨持簡易寛平之政昔人所謂其政悶悶者與然侯不以日計小得而易嵗計之有餘此漢吏之治王政之遺也聖明方興堯舜之治三王之功宜有取於循良以備輔弼侯其自此升矣是故使者之交奨少尹伍君求言以為贈也雖然夜光之璧不藉以地錦無事於飾耳侯𢎞逺之志堅正之操政由是作政由是成顯聞榮名将與黄次公朱仲卿異代相望流光竹帛以傳無窮夫寧于兹褒揚贊述而已乎雲村集巻七
