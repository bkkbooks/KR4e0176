body:
  text: 雲村集卷十明許相卿撰頌顧令君頌有序夫世惟難集者事人所難諶者天自昔然矣前元顧令君海鹽之政抑何異矣哉夫海鹽國也潮不防而國其海矣令君倡建石堤三千丈書于郡志今數百里元元奠居安土誰之力耶于時天久不雨民且凛凛溝中瘠矣令君禱籲于天龍降雨浹如持券責償嵗則大稔意其為人忠慈慤䖍説以使民誠以格天天人與令孚應感通有素故天可諶而事易集也傳曰禦大患捍大災者秩在祀典令君信其人乎而尸祝蔑如典非大闕與遺思在民尚論其世爰作頌焉頌曰汴流泱泱厥産惟良来司民社身與存亡老若憑怒氣吞百里限防弗樹民其魚矣令建長堤丈石三千聿空西山移峙海壖旱魃殃民藴隆如焚四野龜拆民沸鼎鱗令瀝丹悃控籲于帝神龍降庭沛洽甘㴻惟昔旱民誰續爾命維今有衆孰奠爾境禱應昊天目睫紓死堤屹海涯惠存不世胥橋一杯累然蓬顆昔等泰華百萬憑妥遺愛無疆白渠甘棠永兹頌聲無斁無忘銘雙節門銘有序門雙節者詔旌故汀守張先生之妾高氏李氏也初張先生難子多内既卒家不贏而高氏李氏年特少地故卑是故室老議行髙氏李氏髙氏李氏誓靡他適然懼弗但已也則屏而合謀㫁髮明志遂以節終許子聞之喟然曰夫家有不以教貞者也夫教有不自身始者也夫予少從大父如張先生所聞其論説覩其儀刑固心識之迺今斯典之及其門也則重歎夫先正躬修範家之肅矣夫婦貞先於節節于卑者難地劣容自重焉爾婦節完於終終于少者加難時莫或久持焉爾髙氏李氏及笄矢節髮種種罔渝志皭然矣地安所云然而愛鍾則專故節鮮不以情厲矣昵稔則重故情鮮不以久篤矣張先生方御髙氏李氏時年幾七十矣不四三年而捐之死情於何有乃皆競節終其身雖質性殊絶固表則感興焉予故重歎夫先正躬修範家之肅也越若干年張先生諸孫張嘉秀舉進士郎秋官乃始圖永家懿昭上恩則来請銘銘曰孰門市衢伉如翼如傑觀麗飾絶于㕓居蛟龍攫蟠鱗而擁楣金鋪碧映王言大書寔旌二媛儷節罔愆自童而嫗共殉一天聯璧方瑩兩鋩爭寒聲聞閶闔光燭海壖惟初撼扤義形於色白刃青鬟下報窀穸髠顱今霜雅操惟昔烈氣英聲蟬嫣鬱律貞惟婦恒一門少雙彼美君子刑于孔臧閫閾漸洳胥嚴禮防竒節交厲二竇于光帝匪濫施以翊化機樹之風聲隂教是維砥屹山峙天衷民彛軒兹者式視我刻辭霜鐘琴銘有序維明嘉靖三年月正元日台仲父琴成過請識于越左右詒許宗伯世永寳用銘曰於龍尾桐宋元嘉中柱室惟鍾於鳳岡梓唐元和嵗鍾室惟柱天合神藏工律而臧曠代少雙大音𤣥穆洪金粹玉巻懐星谷尚遺来昆奏諧韶鈞還䆳古淳七雝杯銘有序予昆弟祖樗翁者七人燕叙有杯列而七合而一命之曰七雝遂作銘曰一氣攸鍾曷其七兮維七而雝七迺一兮楚石和尚鉢銘有序國初天寧僧楚石琦公持律好文服其徒聞于時後為佛學者莫敢望焉遺鉢今傳石門秀秀傳夢石志志欲繼今信傳而嚴守之也奉以謁銘銘曰西教来東蔓于近古曹溪悟絶鉢傳者寡法本無物滯器或假浮屠氏琦覺慧能伍幻器寓法作祖自我是中空洞受世巨瓚屬饜萬口便便腹果繄無盡藏孰窮薪火銘燦摩尼走鉢顆顆養浩齋銘有序秦谿黄翁汝溫生作起家課諸子經咸有專業晚復名其燕居所曰養浩之齋翁没若干年翁之孫三錫好文而與予游間請予言以詔後人俾毋忘先懿則為之銘銘曰盈天地間夫孰非氣曷主張是惟一理懿民受以生同體罔貳惟習斯梏惟欲斯昧理日澌盡氣斯餒而如卒無帥横潰莫司聖賢之學立志為始義集有恒理全氣裕充塞兩間浩然無涘洵美黄翁好古逺慕養浩顔齋弗阻遲暮亞聖之養勿忘勿助遺訓炳如具存節度後昆繼志遥遥上遡贊自贊二首昂七尺而中空空酣羣籍而理夢夢志將身挽一世風還前古而力莫之從若夫攘攘霑霑費辭喜事餘子較身後之名也厚靳全慵生而進如讓退如蟄尚薦辟乎何有没而碑不文墓不封况社祝兮奚庸士論安所物色畫史若為形容於穆一元吾其大同少也英英長也稜稜壯也錚錚衰以耄也蟄坯鷇哺遺身世而瞢騰惟進而昧夫時之不可挽也幾難免乎世退而遊於物之所不能役也聊復得此生已夫沈一之像贊視弗逮尋墨而志於四方貌弗並魁梧而文以擅塲吾黨之良國士之行猗與懋哉學不自蔵日躋髙明吾將瞠乎其若後于飛黄已夫周翁像贊有序予嘗志翁墓已若未盡其平生然翁之孫以翁畫像来於是又為之贊贊曰神化委和山海合氣爰鍾壽穀為人之瑞質茂似學善恥近名儉也敦禮豐而􅘨盈我犯無忤物施不徳長厚風微及見髣髴猗與嗟夫斯其為家之倡宗之亢郷之丈人行已乎説從心説予從弟桓卿少而好文與予遊志大而行自適因自號從心予甚迂之則進之曰昔孔子稱從心所欲不踰矩蓋心有定矩從而不踰也子之志與行得無踰於其矩乎而尚得稱從心也乎若蓋放而為俠者也越之陽明先生今之矩也而盍往質焉桓走師之憮然若遺其初遂飭行䆳學樂義輕財訢訢繩矩中罔或踰也噫蓋善學也矣能勉後以終斯志尋可上希聖矩奚啻吾有光而已耶作從心説雲村集巻十
