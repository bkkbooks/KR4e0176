body:
  text: 雲村集巻十一明許相卿撰碑明少保兵部尚書胡端敏公神道碑銘明興百七十年聖神代作承統致理納海内外於太和以登古初亦惟先正班班多修能傑才宣勞贊理是賴至夫俶儻奮義勤事委命不貳心之臣世尤歎誦不忘云粤若杭産在昔尚書于公乃今尚書胡公斯其人非與雖事變臨値功謀建設幸不幸終始殊途要皆匪躬狥國惟兢社稷之任者矣夫胡公始艱貞而永終譽也固繫其逢哉非然將身之不遑恤而謀伐何以稱焉嘉靖二十六年公葬之十有七年公之子肇慶守純来屬相卿書其隊首之碑曰尚書胡公諱世寧字永清杭仁和横塘里人也大父暠父瑢並贈通議大夫吏部右侍郎大母張氏母馮氏配李氏贈封並淑人李以肇慶貴加贈一品夫人公誕有異表弱齡負巨人之度讀書不治章句惟慕古竒節偉行非常之功嘗數夢與于尚書者議國事于朝家貧大布脱粟弗支卒嵗落落自豪不以動其意也公𢎞治五年舉于郷舉于郷者有司給其道里費人百金公以浙右嵗饑獨受五十金而行明年舉進士歸進士得旌其門時須闗謁鎮守中貴人公重折節棄之去八年補徳安府推官獄之小大必以情幽滯輒從平反決縱郡故徭賦偏苛積為民病日甚屬公覈之承敝通變補貸均節權宜一時後皆可以為經十三年召補南京刑部主事抗厲法守帝城威福罕所撓絀十四年應求言詔陳邉務十事而士風國用武備將權尤切時病間則延集郎署同志講求匡濟之略劑酌俗化之宜以資致用署進員外郎郎中十八年詔復求言公陳六事勤學問慎輔導廣延納重守令公用人汰冗費探本達用識者知其大臣才具矣正徳三年出知廣西太平府治屬州縣盡蠻徼瘴郷以夷官統夷族羈縻叛服不常太平知州李璿久悖亂阻聲教公若不置意中惟推誠羣夷絶贄餽簡禁防布恩信以赤子撫之備恤其私夷衆孚格乃檄其黨有幹略者授計討璿平之㪚其積以紓乏困由是逺近威懐服順如良民則籍治夷十事為代者告未幾以母䘮去官七年服竟補寳慶府府舊糧則繁漫吏縁為姧病民莫可端究公類田均糧而畫一徵之民省嵗供之半闔境盡驩曰胡父除我租矣是嵗遷江西按察副使兵備東鄉東鄉巖谷峭阻羣盜穴之四出抄暴幾五年為饒信患尤劇公諭禁招捕威信明確次第綏靖調征姚源追蹙之窮其往調征毛坊援吳廷舉調征建昌衛益國皆冒晨夜馳坑谷蒙犯矢石咸底克服又城廣昌城新城城南豐以固防禦柄兵及同事者媢閼其勞績公不自白也初寧庶人宸濠志不軌誘受天下亡命日夜扼腕瞋目切齒為竒邪計威脅方面守宰賄結中外諸用事人連固根本牢甚欲以有為在位者畏忌諱諛憚發之口公食息憂慨獨語羣盜疥癬耳是惟國家病心膂繫存亡乃且拱黙觀變尚稱按察臣戴面行耶忿發抗疏曰寜王自得衛兵威謀日横騷擾閭閻鈐束官吏禮樂政令漸不出自朝廷諸臣阿順保身百姓亡逃失業今日江西當憂而亟為之所者顧獨羣盜已乎臣請簡命才節威望臣巡撫方面銷隙寢邪於無形勅王自治其國勿撓有司以防未然時若能用公言廟堂密勿以折亂萌無復事矣而籌國者懵焉漫下其章於是濠恨甚骨仇恤怨賂執法者以危法中公逮捕之公已遷福建按察使過家濠又屬其黨巡浙御史潘鵬發卒簒取公將甘心焉公則間行㑹逮繫詔獄濠又屬用事人計必殺公絶口繫再經冬訊鞫榜掠厯諸刑械公幾瘐死鉗釱間屢矣中外莫不憐其忠給事中御史又皆訟其寃執法者迫人言公得減死論謫戍遼東十有四年六月濠舉兵反都御史孫燧按察副使許逵死之陷南康九江攻安慶將進窺南京王公守仁以都御史倡義兵討反者宸濠檻車傳致京師伏誅人謂是役也惟王公達權戡亂以遏流毒之延亦惟胡公先幾伐謀以折逆形之鷙故殄逆黨於終食猶漂蟻垤以洪流克靖大變若斯之亟也雖天悔禍亦國有人云十五年始直公起徒中為湖廣按察使十六年遷右僉都御史巡撫四川今上更化首奬忠直公遂手疏勸上修徳講學薦魏校何塘邵鋭堪講官林俊劉忠林廷玉堪輔弼備言蜀境久困吐蕃及撫馭松潘生熟畨方畧要在用人才更賞罰增兵將足財用以保障全蜀經畫燦如也嘉靖元年遷吏部右侍郎道聞父䘮去官三年詔議睿皇尊號屬時江淮荐飢廷臣伏闕强諍多被扑除名公免䘮家居上奏曰方今急務孝親為大保民為本乞早定追崇大禮肆赦羣臣小過使之各陳捄荒弭亂保民之䇿而議行之以綿皇祖考萬世之祀則陛下萬世之孝也夫諫者心協忠誠質異强弱或斃雷霆之下遂傷日月之眀大為天地生成之累矣臣願陛下謹其後也夫新進議禮一言適合未必其事事之皆是老誠執禮一言過當未必其事事之皆非臣尤願聖明惟是之從無以新舊先存適莫于中繼復疏舉前古治亂闗於戚宦宰執者以規警當世明盡懇直累千言不果上既有議遷顯陵于燕山者公乞嚴絶憸壬君臣協恭惟任賢保民為務并前疏並進上畢覽深嘉之公自此浸潯大用矣四年以兵部左侍郎召公前謫遼備諳東北兵政弛敝進備邊二十五䇿皆防戍長計復憂時事獻三經講義大學秦誓好惡之章以戒媢嫉尚書惟辟作福之章以重威柄易大傳不出户庭之章以慎幾事而好惡威福辭特諄諄多中時忌皆留中於是言者劾公啓告密導妄殺之漸公引罪乞休上鑒留不許大禮成公與加俸辭以在廷議禮臣時在家欲極言治道於後故僭言大禮於先况屬論定之後不敢祗領又進知人官人二十事言者論列未巳公力求退改南京吏部左侍郎六年五月遷南京工部尚書七月以左都御史召過沛疏治河事宜及瀕河夫役之困道改刑部尚書尋用詹事霍韜言加太子少保左都御史如七月詔公入振舉憲度釐正敝習勉上務執中之學及聴言用人言皆剴切執政請禁私謁公言臣官以察為名人非見其貌聞其言無由知其心識其才若謝絶過從徒采浮言按考語而求激楊舉劾之當難矣上是而從之公之再召也執政有力焉公終不與黨入臺閱月復改刑部尚書公於重辟疑罪研究情法必允雖奏當論定者不避嫌謗執議懇惻弗但已上常感悟納用陳九疇者故以兵備巡撫有事甘肅兩敗土魯畨兵于時總制西事尚書彭澤當軸秉政大學士楊廷和也土魯畨據哈蜜城刼忠順王印以要市中國而再阨於九疇再失利去乃縱反間計傾九疇以行其謀去位大臣有憾於廷和澤隂噈憸人陳邊計祖間説謂畨達冦暴哈蜜淪陷職自九疇啓釁因得連坐廷和澤焉於是下九疇獄擬大辟公昌言于朝曰世寧司刑而殺忠臣寧先殺世寧執政持不可公乃奏述西事詳辯九疇之誣以明其決不然上大悟曰豈我巡撫都御史殺来償囘子命耶九疇由是貸死戍邊廷和澤免于逮七年春公疾作乞骸命公子純入監讀書示慰留也時奏河清甘露降方告謝齋宿忽風霾異常公求黜應變不聴則上勤學恤民任官十事轉兵部尚書加太子太保公辭以甘肅之危可慮川蜀之危可慮中原兵將錢穀無備可慮臣弱才恐負重任再辭不許則陳兵政十事曰定武略崇憲職重將權增武偹更賞罰御土夷足邊儲絶敝源正謬誤惜人才以取進止上許公就職次第議之公乃拜命大臣建議銷兵公證古籌今辯其非是議遂格已而土魯畨合瓦剌入冦我師敗之彼復請釋舊羈畨使下兵部計宜者公言畨人變詐反覆邊臣奏報抵牾再舉陳九疇捍禦始末備述先朝馭邉故實以及今日圖復哈蜜利害審究情勢樹久安之畫柄要喜功者中沮之尚書王瓊遂主通畨復哈蜜為任八年春公申論增武備足邊儲用人才三事薦馬昊陳九疇施儒楊必進才堪統軍禦敵選曹恚公侵官格不用公亟辭疾不許特暫免朝叅公又極言任人圖治今日當務以自盡始終之義然時益多忤公難久容祈請彌懇上慰諭不從疏三上乃許致仕驛歸廪役備如典公歸三月復以南京兵部尚書叅贊機務召公再辭疾篤猶力贊上圖廣嗣續容受直言愛惜人才云九年秋九月丙辰公薨于家年六十三天子聞訃輟朝贈少保諡端敏詔省臣諭祭勅有司治葬事墓在五雲山之陽公貞毅鯁諒臨事强果必行其志厯小官當大任秉義抗節在所鮮諧乃至詆怒嫌忌時時齟齬之而强果狥職不小變故所居官官重云初司郡刑賢聲籍甚使者示將剡薦公公語輒更端識度去人逺矣至於禮匡始國之王力抗中官之横上下多攸賴哉中起躓踣九死之餘才充於積學識博於厯踐節厲於多難故一日立朝正色危辭責難明主劘切嚴貴人曾不以後福隠禍為前却必欲匡贊至理報塞殊遇豪勁邁往之氣不屑茍就隨世功名而已郷非聖明灼知深眷之顧惟孤特獨立而能保其終始榮名輝耀若兹赫赫難哉或者議公任數少容夫濟變安能舍智繄繩矩之間乃有餘地乎公著書蔵于家内行誌于墓世徳譜于族者皆不載刪取其行業之大繫天下國家者序列之亦公之志也與銘曰吳越之交江山萃靈昭代發祥豪賢挺生肅愍允武端敏孔毅百年兩豪帝室梁柱國典異逢血𠂻一天我儀圖之易地同然惟端敏公忠出其性履險蹈夷不易其勁孰為利階弗覬以營孰為禍門弗惕以驚狡童窺鼎機張鍵閉人􅘨頸縮我怒髪豎義形于色灑血蜚詞憎主之盜構我禍羅廷議孔昭輸忠掇禍紓死東市投畀遼左賜環自天長憲湖藩既仆載興其立桓桓都臺撫蜀少宰端揆暨暨諤諤竈炎弗媚中媢外咻迴翔于南不逺而復寵數攸兼内臺巖巖司馬偈偈洊承休命屹秉素節懐貞抱潔夙夜在公不比不同以役帝功盤錯交值公才益展忮嫉孔多公忠彌顯惟公至忠惟天子至明靈承湛恩以鴻厥慶止足柄幾前老投紱完名令終鮮於雙匹穹碑峩峩我顯詩之江山與永烈烈弗渝杭守婁君去思之碑傳曰得民有道得其心斯得民矣信哉至若杭守婁君將今之所謂得民者非耶婁君既代去杭人思之莫釋也大夫士相與議碑而傳之慰羣望昭永勸云嗟夫郡縣長吏承君子民者布海内也至指數得民者累百幾一見爾殆民性古今殊抑吏治非古已乎諺曰善為水導之平善理人撫之静非虚語矣故詩書言治曰阜民安民擾民漢初善治曰安養休息漢稱良吏曰不擾不煩長者甚則禁網疏闊或漏吞舟之魚而吏治未害民且乂安治體固當爾也故曰其政悶悶其民醇醇有以也夫叔世才武之吏興任豪敢右功能務為快意少恩之治而父母師帥之義微最下者稱問遺媚貴勢朴擊囑買請求亡何奏異等據要津而身計獲矣民於何有其極也吏能愈巧民偽愈悍交逞胥殘法日以不振世日以降民日以敝君子所為哀民而疾吏之不古歟婁君貞素敦確任質少文悛悛朴魯人也守杭政尚寛簡吏習怠安而約躬奉職惟民之為周行無束脩之交過賔鮮二簋之饗勢家絶請託之迹公蔵羨餘輒舍以紓民上官論是非持大體聲色誰何屹不為動至與細民言歉然若恐傷之六朞一日贊毁殿最若罔闗于其心也遷福建都轉運使去去装蕭然如始至時介誠苦節較然不欺其志矣予聞之郡人婁君在治闇不省矜時無可稱悶若不快人意逮去之日老穉填道遮畱至不得行久而不忘感歎彌長是豈邂逅以徼一時之譽者等哉彼其子惠之心誠信於士民也昔稱守杭者志籍數千載卓爾才數人皆榮名當年尸祝百祀無絶已時無他得民焉耳婁君方之其庶幾哉其庶幾哉墓表憨齋王先生墓表憨齋王先生卒之二十有一年夫人諸氏亦卒其子科逮祥猶毁既而慨然歎曰維我所生咸有潛懿緒乃在科兹弗克蚤自奮揚以光紹于前休需焉後矣爰樹石墓道来請文以表之曰先生諱子澄字本闕性敦茂簡笑言或目為憨因自號憨齋少貧廢學長更發憤舊業一時經術家共譽歎以為精成化庚子領浙江郷薦再舉進士不第以母老乞恩得天長縣學教諭天長故先士先生蚤夜課督諸生如子自是天長士名甲科於中都為盛母䘮去官服除葉司徒知其賢屬選曹以典郷校於是教諭山陽縣山陽附淮安郡治文廟巋存而俎豆不陳先生白當路上丁具特牲舍菜成禮郡庠樂舞故用黄冠徒并白代以社學生至今並著為法於時巡撫徐中丞才之䟽薦未報而先生不起是為𢎞治年月日年五十又六先生夙秉信義於舊故尤篤嘗試禮部罷歸與郷人周氏子偕周道死則經紀其後事致遺骸餘槖畀其家有故人流寓天長病厲穢不可近先生日臨視滌浣手善藥以進訖不療率諸生䘮之楊生鑾聘妻得痺女娶之弗孕先生義其行進之曰爾厚夫婦可以為難矣如父子何助十金令買妾而生子嗚呼如先生謂之長厚君子非邪俾獲當路周施於人何如哉先生先汴人逺祖宋靖康中判明州家焉遂為明之慈谿人髙祖桓逮國初聘至大本堂與羣臣論治道官國子學正知盧氏縣曾祖伯曛知金谿縣以長子工部尚書来貴贈右都御史兼大理卿祖復刑部主事父鎬早世母李氏以節聞詔旌其里先生配應氏繼諸氏子男長科側出曰稱女二先生孝事李夫人備至諸夫人克相之服食䙝微非夫婦手製口嘗弗敢進李晚風痿方藥百試不瘳先生夫婦更畫夕掖持竟卒諸手且三復唐崔王母之祝云先生晚得子愛之甚然教禁不少假嘗戒科曰舉子學不究本原成若否猶夫人也惟義理養心則可超凡近而進高明遇其杖童奴必訶止之曰過誤人有之是獨非人子乎夫人内教尤備獨以長女失恃稱幼加憐焉四子熙然一天昵見者莫辨其異所出也夫人年六十有四卒卒時正徳年月日越明年某月日葬王庫嶴先生之兆夫人且絶且顧科曰吾弗及抱孫若未取一第即下從而父相慰云何其他戒諸子女若婦答姻族言人人殊不亂嗚呼士類百不一賢矧女徳如夫人者累千萬可一二見邪難矣哉夫婦合徳孰如先生者科與予善業成行修隠有士望来者所就可量哉先生徳善之澤固將在於是雲村集卷十一
