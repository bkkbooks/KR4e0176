body:
  text: 雲村集巻十三明許相卿撰墓誌銘董子壬墓誌銘於呼此董子壬甫之墓也董故饒於貲子壬生而頴異以志自雄猥視家植􅞅然欲自别於富家兒喜賑施慕賢逹其所游知皆海内知名士大夫子壬足不良於行嘗重繭三十舍東見楓山公其敦尚如此茍庸劣雖富貴人奴視之加詬訕焉人咸咎其迂妄子壬弗為變獨時時好讀書世所傳書無不窺尤好先秦古書卑魏晉以下不足學時經義程文行天下子壬居校中一簡不畜也比舍生間示之子壬誦不一再行則大笑棄去曰淺之乎兒侮聖訓壯夫羞稱焉有司課試得子壬文誦不一再行則大笑棄去曰怪哉將安所寘是子壬用是連試輒絀𢎞治中以薦應敷陳王道獻若干萬言闕下天子異之下禮部試㑹要路人子壬故奴視者阻之罷歸子壬自顧生世弗諧愈益放誕為無顧忌大言廣際天地幽極鬼神逺遡皇王近逮古今名逹罔不評刺人聞而迂之知者悼其幽憤也或發之詩大篇短章多奥雅可誦然家日落其好施日甚錢粟在前來求者色辭為可憐状聽持去持去盡則又破産以施若不知有家然其子力諍之自若也其父痛懲之自若也既又大苦之子壬終自若以至䘮明乃後已尸居鷇食守黒閟光沒齒無怨言苐言我固當爾佛氏所謂業障豈適今日事耶因號聽光大師三年而卒卒時年五十六子壬諱淞其先汴人始祖武功大夫諱健南渡居越之新昌三世祖諱潮遷海鹽之澉浦八世祖諱鎮遷海寕之錢山家焉祖慧父謙母陳氏配祝氏子男三觀醫學正科升後其弟湄季益女二長妻浙江都指揮楊輅子和幼妻同里周玠孫男三女二子壬卒以正徳戊寅十一月二十三日𦵏以辛巳正月八日所輯聖學全書真儒藎語紫陽正脈若干巻藏於家予聞子壬客京師倦游困甚或勸之幸途媒進取者子壬詩謝之曰我有腹中書不辦頭上帽浮雲自去來難應鴻都詔衆以為迂於戯其迂也秪迂於時匪迂於道也哉銘曰形易用兮至人事嗟聽光兮謾自戱存弗眡兮歿而視天夢夢兮終古閟内斯文兮誌子瘞光斤斤兮燭九地趻踔來兮閲爾世封奉直大夫南京兵部員外郎徐公墓誌銘嘉靖己丑月正某日封奉直大夫南京兵部員外郎徐公卒越某月某日𦵏於城西某原公三子者斬焉衰絰來曰先公不可作矣維是生有潛懿幸托信傳之譔以休顯於無窮繄子起之長存也且泣言狀曰先公諱某字某其先海鹽北鄉人家右其地即姓其地俗今謂之徐家埭從公先人以為名也公性詳緩言度修慎小大貴賤接之人各意滿尤為方淵張先生所嘉與也予曰嘻清濁罔失矣又曰先公初貧於火業醫代耕晏如也已而泰舉於鄉知光澤縣節任家事咸成進士舉知襄陽府公以咸封一女有家孫男五女七曽孫男二息𦙍熾昌禄養豐備優游二十許年亦未嘗色侈逮夀終八十八云予曰嘻豐悴皆安矣又曰先公蚤䘮父事母曲致其歡母安㷀嫠焉伯兄昌獨而貧公遷共居食沒齒怡怡也吾母王宜人結髪偕老七十年無忿誶語舊所從學醫者安榮氏既死嵗時伏臘徃祠之至老不怠予曰信然哉於戯已矣篤倫紀矣雖有他美蔑以尚矣是在鄉人吾將張之而襄陽吾同舉于鄉兄弟也予其銘予其銘銘曰有原堂堂有坎其藏公安歸止公澤浘浘千萬年假我銘不磨陵谷則那鎮江府學訓導陶君墓誌銘君諱試世用字陶氏家世㑹稽人其先曰義仕元為潞州書院山長義生仲濂有幹局大其家望於越仲濂生仕仕生璇璇生愫是為君考君少雋頴父教之治舉子學長應浙江鄉舉弗利曰有司故遺我哉則閉户發書讀之每舉弗利不懈益力七舉連弗利嘉靖某年貢禮部就學職得訓導鎮江府學某年月之任某月日卒年六十一妻馬氏孫承學以䘮歸嘉靖某年月日𦵏君上竈山之陽皇考墓左若干歩君居家無子弟之過行已信於其鄉嘉靖初君貢及期君後者以賄先君君恬然需次焉㑹稽貢諸生故事同廪食者人贐廩一鍾君度其儔貧有家於廩者盡讓捐之㑹稽諸生貢不廩贐自君始於戱貪競俗成抑君可謂難也已矣君子男廷奎廷圭廷進皆縣學生女一孫男惟學承學幼學廷奎行業修慎人以為君子之子𦵏得卜奎手君世行年來謁且泣曰非子銘沒吾父矣予未嘗知君而君之子知予語曰不知其人視其友况子也哉故論次之而系以銘銘曰仕不諧世生不得年嗟哉天兮𤣥室如錮我辭不泯猗乎君兮太學生朱君墓誌銘朱君卒既久且𦵏其子來請曰吾父今沒於地矣維先生圖之於呼予忍誌銘君邪其子固請曰非先生重圖之吾父永沒於地矣於呼予忍弗誌銘君邪志曰君諱某海寕袁花里人也祖某能詩畫有聲父某通儻大其家朱氏世望袁花於是彌顯母許氏君出自張張氏倅也而嫡許母君少警敏能承迎許意許鍾憐之維許族人亦謂為我自出君雅性輕財喜賔客不為生作顧計時時召客飲歌呼通昔逹旦雜以嘲謔彈棋探鈎六博投壺度曲謎字靡不工絶屈其坐賔白浮觶湎者君自邑諸生例入貲為太學生其舍太學召客張飲益劇館無寒席筵無涸斚然所致客大都六館同舍諸生其中徃徃多江左右淮南北兩浙全楚三吳八閩百粤超特雋竒之選逺賢於君者予是以取君君娶某子男二孫男一君年四十以嘉靖某年月日卒𦵏以某年月日予與君甥舅兄弟也相與少長已相與婚姻又相與肄澤宫游辟廱忽又哭其死志其𦵏人之於世何如也予以是黯然不能昌吾辭銘曰燕埭有封隆乎而燕喜者子宫乎而燕詒似續充乎而徐天澤墓誌銘徐天澤諱霖父延年天澤吃不能言性朴不解承人意状塊然無慧者至其識别聲利要緩所當背向了了白黒如也家入邑治不百武然不一入治廨創堵内屏堵堊漫矣天澤偶從客過望見之曰嚇那遽如許那遽如許始終其身不識縣官縣官嘗褒其善榜之衢以風邑人天澤生成化庚寅卒嘉靖己丑𦵏嘉靖辛夘十月二十又二日壬寅墓城北通浦堰天澤初娶於祝又娶於錢又娶於宋子男鏜鑾鋭孫男五女二鋭博士諸生吾兒遊諸生間於鋭館因來乞銘銘曰衆頟頟嘬於邑獨墨墨錮於室吁嗟適兮大賈顧翁墓誌銘顧翁諱愷字宗和其先長洲陸墓農家長洲吳郡治所東南大都㑹賦重俗奢甲天下民故末業多競本業多病翁父棠念田入不當嵗出則舍農服賈去陸墓家西閶西閶四方水陸逹塗諸商百物輸聚翁承父業事力漸廣心計尤精廢著鬻財於津要之區簡别良苦絶去眩飾以平心不欺聞都市間於是逺近貿易者繦至輻湊矣翁測五行之運酌萬貨之情知所以取知所以與財幣如流水之行徃而不停來而益盈始者贏僅十伯既乃貲儲溢羡累鉅伯數千金於是貪狡悍少年屬目垂涎利其愿易欺幸其寡援無他於是搆令門下生相與比周矯令需重賄大庇爾家否將不克安爾生險阱危機巧蒙而横索之傾其有者三之一翁踖縮不敢誰何時獨仰天一喟而已老氏所謂多藏厚亡信夫翁年八十有九嘉靖某年月日卒卒之又三年某年月日𦵏至徳鄉支硎山之隂配陳氏子男周孫男元卿太學生翁朴敦愿諒不學少文言呐呐不能出口人驟與之語輒面項赤左右視唯唯爾不即酬邂逅莫可物色其為市人云銘曰賈以㢘富惟翁足徴仕以賄逹惟世多能翁業利途士都賢名今也易常淆哉濁清誌銘墓隧於翁亟稱嗟嗟於翁亟稱董先生墓誌銘董先生卒𦵏有日矣其子以先生同社僧法聚状來曰請誌而銘諸則謝曰予罔所知其奚能銘然狀先生者其有以知先生已夫予其終讀讀之曰先生諱澐字復宗别號蘿石其先汴人始祖武功大夫健扈宋南來家於澉浦後仲真者遷海寕之錢山至樂静翁鑑配虞氏先生考妣也先生世澉戎籍兄源長當徃役先生鋭身代之遂復家澉平居樂義與善根器天植兄累於貧則割私産讓之其所知鄔魯以田來質逮魯疾革出劵燬焉卒復經紀其𦵏聞髙世賢逹所在不計逺近寒暑投贄納交見後輩工一辭厲一行亟稱屢歎不但已也人以是多之然先生生不解俗間生作事時時獨好歌吟所遇節序景物離合戚欣憤愕慶悼懐古慨今一寓之詩家徒壁立不以經意一時名能詩者吳下沈周闗西孫一元閩中鄭善夫皆郵寄賡唱遇佳風日放浪湖山流連親知嘯咏忘返好事家徃徃除館以待先生紀之為五館記云晩造陽明夫子聞良知之説憣然改曰不爾得稱人乎悚然就弟子列時年六十七矣故所與游者聲咻色招之先生但曰吾從吾所好已爾更號從吾道人先生末復究心内典忽若有悟喟然歎曰乃今客得歸矣於是援匡廬故事與聚糾諸緇俗同志結蓮社於海門精廬遂又號白塔山人嘉靖甲午某月日卒𦵏以是年某月日配康氏繼莊氏子男榖鄉舉士女二孫男鹿鳴鶴鳴於呼先生我丈人行也忘年友予餘三十年矣吾見先生始専於詩遺其家甚難之晩志於道遺其詩甚愧之終入於佛㗳然自遺也予愈益怪之莫能窺已觀乎聚之言曰先生在先刼中殆業豢龍氣相感召近可逺大可小有可無虛實相因動静相體若有類焉蓋先生學三變歸於空而自所謂吾者且見為妄矣尚安事銘予將安所銘無寕試妄求之亦憗妄應之耶銘曰一顆蓬翳蝶化蟬蜕吁嗟董翁墓於是石洲徐君墓誌銘徐君卒之又明年嘉靖二十一年冬十月庚辰君子造士禾𦵏君㳯江之隂而述行問銘嘻吾病力不任斯勞也禾絶欲得之末之能窮以辭則遂刪次禾語云君諱翰字時舉其先出自偃王海寕有徐代逺莫究其所從徙君九世祖肇家廽塘稱廿七將仕而徐始聞廿七將仕五世曰慶當明興舉按察僉事山西而徐始著慶四世曰佾佾生樂閒翁瑰配倪氏君之考妣也君生有偉幹重容止瞻盼炯然椎魯不文而鬰有茂質君大父喜摩其頂曰兒守家似此洲石不與波下上吾死瞑矣君後故稱石洲云君事親愛壯猶孺子慕不衰季䘮其貲輒睨羡君輒亦分與貲東鄰齒屋鼎鼎或舉榻傍鼾睡語諷君君墨墨退命禾曰先人世鄰習相安已而忽相圖不祥抑人情欲保其家夫庸異我我老屋世守四百年後之人不失舊物又何求里邑相距可十里里族徃徃竄名繇籍供事縣官與厮役伍然得昵顔辭矯威福私苞苴肥其家繇逮君恧然曰吾其忍卑身辱親以徼利及共偫輸將重任遞更直奮承之曰吾物力固當訖不用計嫁旤於中産家然君於是盡瘁矣時時飲嚼嘯呼貌軒然暢也而精殆銷亡一寢疾不復起年五十八耳是故禾以不逮安榮君為終天憾君娶祝氏子男造士禾也方致逺昌其宗庻术女亦微出孫男善𦙍郡文學諸生女三系曰予昔如迴塘及見樂閒翁篤塞淳固若悾悾爾今夫樹敦懐朴之世邈其懸殊絶追逢矣莊生云得其似者而喜翁將無同耶夫徐君以彼其家無資於學而獨率乃考攸行卒能持滿不溢傳其宗嗟夫孔子寕儉而野之從也有以哉㳯流如帶新封若堂叶允矣石洲屹如逝波海國斯風南園祝公墓誌銘邑並海東去可五十里許有竒山谿綰轂左界物力人文袁花最盛袁花擁素封列顯秩者一姓當十之七甲舍名田綿數十里相錯如繡祝最盛祝氏支姓扶疎棼不可緒例古立宗而其宗子曰南園公南園公諱椿字惟喬大父銓父滄早世南園公方弱顧三弟孱如爾南園公則感厲自奮植外理生作内篤恩紀暨其配徐悦其母董姁姁也字其弟甚愛析産曰等遺孤均遺業耳四如一有役曰家督事也獨身任之已又一一經紀其家遂有殖厚貲十故産者南園公子男三人女四人繼昭主簿當陽繼暄娶而夭公左右其孤孫無墜厥遺女家並著姓弟梧晩無子則以季愛子繼時子之繼時生世家世守世宏梧後以繁飭諸孫各事事世臣邑訓科世禄南太學生世匡世巨世匯職生作南園公乃喟然太息曰夫造物者佚我以老吾其後尚平乎則傳家灌園與其繼配姚偫美𤓰果日弄諸曽孫為笑樂嘉靖丙午公年八十八矣某月日卒南園公生而敦愿訥口少言悛悛如鄙人至其勤生嗇用殆天性然田畔屋隟鮮弓地棄童奴及五尺所無浮食者治上趨時具有節法嵗入視鄰收常倍然蓋藏羡盈而供需纎儉服食婚嫁才取給用充禮堇堇等中産家弗少贏若乃創祠薦事豐潔壯整殫隻力靡百金不少顧計於是族長老共譽歎南園公稱祝宗子無一後言夫昔者先王以宗子收族是故仁睦行而民不悖約法省禁有以然也祝之有宗非盡先王之故是蓋先王之遺已乎志化理者自遺逹故以導俗誰不其然吾於是信古之必可復而歎時之安於今也南園公卒之四年嘉靖某年月日世臣諸孫筮𦵏公南陽祖塋之左來以銘屬先是十許年南園公杖䇿奉幣走謁予椿旦夕歸復於土幸子文識我藏則曰諾夫古重心許乃今食吾言乎於是序列其大都而系以銘銘曰知如禹湯不如常耕公老服膺孝弟力田漢秩尊顯公允其選勞避賔筵拘憚冠服率彼民常敦然太樸信已獨行若與俗兩十畝終閒五福備享我最淑行永詔鄉鄰叶尚百千祀曰猗與南園公之阡平齋沈公墓誌銘維嘉靖三十三年十二月二十二日平齋先生沈公卒於嘉禾寓舍年七十二方島夷冦暴三吳公抱宗祏祭器避之郡城居亡幾何公疾病其子壻刑部主事平湖胥峯陸君杲從厥子南禮部主事光祖兩鄉舉士光裕光祚皆公之自出也來候咸集左右公諸子藉顧言治後事所以嚴其終者致情中禮矣公卒之明年嘉靖某年月日某甲子𦵏公於其宅之某方二城圩新阡胥峯状公世行年授公諸子來屬予志之状述公世家土著嘉善麟瑞鄉髙祖恭曽祖璘祖䥔三世輸財助縣官被冠服䥔生南野翁葵娶陸氏公父母也翁籍世貲望好禮尚賢賁飾之沈由是著聞郡中公則翁仲子也諱槩字一之禀頴負竒盛氣濶歩縱睨無前已而師事東溟張先生福友善魏莊渠校邵端峯鋭諸君晩卒業於五清劉夫子瑞徳義漸涵日與之化闇如退如稔識公者失舊觀矣公性簡朴於凡諸玩外飾無所役其志惟親故緩急懇然若當其身至其事南野翁陸孺人也巨細周慎心力懇到事可承歡者靡不畢致候少異常也輒懐隠憂迎醫不逺千里至欬噦溲便亦嘗偵騐物色以為喜懼二親相繼大故苫凷疏水䘮次三年率由禮制而哀敬有加焉時稱善䘮云夫孝先百行公惟篤於親以逹其類故建祠備器祭嚴忌哀以親之所始終也存大宗之祀贍母家之貧恭順姊兄撫教甥姪以親之所尊與其所愛也捐田為鄉義塚垂老而齒讓人貢則親其親以及人之親也若夫修志史才登髙賦咏特公之餘十二試省闈羣八校雋選又公之細耳状曰究公心跡學欲窮天人志欲希賢哲行欲質鬼神又曰公口不非俗而行不染俗允哉斯語為公傳神矣公生平急義輕財贏業晩匱自安無營著布菜翁傳以見志其於豐約盛衰之際蓋有見於易而契於予者比官采士議躋祀公於學宫鄉賢祠信定論云公元配錢氏生女二適國學生陶陞及胥峯君繼張氏生子五爟炯炫燏煓孫男六女八公所著鄉約釋義筆思記時務議詩文集若干巻藏於家皆鄉意風教非漫作者銘曰混混末俗胡丁我躬今見古人差强我衷儵去先我奈何乎公公應貢授都事江西布政司不書非公志也見山孫君墓誌銘監察御史孫君𦵏其父見山徴君於盈山南麓嶽神祠之左述徴君世行年來謁予書其墓石曰徴君諱鸞字鳴逺其先富春人粤自漢季孫氏國吳傳四世厯六十餘年胄裔布於湖南江左根盤蔓延矣富春乃孫氏所肇迹云徴君常自言相傳裔出長沙桓王策之後逺莫究其緒來籍海寕也亦莫記其世其始有徴者曰富一提領春春嘗問學於包心齋氏包選春諸生中以壻其子春生以敬以敬生文逹文逹生裕裕生􅷆􅷆生禋是稱遺安配董氏祝氏徴君父母也徴君而上八世家黄灣黄灣逺都市瀕瀉鹵地亢土瘠無水泉林藪之饒百糓桑麻率仰澤於天以殖農圃盡瘁三時髙秋旬日不雨則嘉種稿無遺穂而艾蕭藜藿芃芃彌望壟畦間以故呰窳偷生鮮積聚而多貧豪有力者居停鹽盬廢著鬻財機巧乾沒以與上争利頑弱無能為計則交通海賈屏匿幽隠為之駔儈以私竒羡官為峻法苛禁姦利相告日聞徴君於是喟然歎曰吾聞本富厚生蠶榖是已將如吾地何乃如鄉習雖子本纎鋭而贏得過當然為姦富抵禁亡命有家如寄謀其左矣孰與教吾子以大吾家乎御史時方嶄然見頭角徴君則為訪明師友市經藝諸籍趣辦資糧裘葛屝屨簦笈及凡裝需縱使游學而時課督淬厲之嵗無幾何御史以嘉靖丁酉名鄉薦戊戌舉進士至今官列侍從司風紀便道過家斾旌騶駟呵呼導從塞途盈門御史豸繡登堂稱觴為父母夀雍容閒雅甚都郷人士以為寵諸父兄乃後漸舍故習而延經師課子弟以徴君父子故徴君晩以子貴益閒無事時出嬉游巷陌讌集里社從故親知農談情話坦坦夷夷不矜重改其舊人多愛譽以為美談徴君年五十九卒以嘉靖某年月日𦵏以某年月日娶許氏子三長御史喬其季髙也女二孫男四状述徴君孝友庸行可稱者不一予特取其卓見不淪於習者著之銘曰帶海負山墓於是間風氣盤旋庇爾子孫於千萬年泉亭吳先生墓誌銘嘉靖二十四年二月乙夘朝列大夫廣西布政司左叅議泉亭先生吳君卒訃予予扶而哭諸門君之子鄉舉士遵晦郡博士諸生遵道書君顧言來曰知我者許子其託之識我藏噫嗟已乎吳君逮死予信忍以疾為解志曰吳君諱鼎字維新錢塘城北隅人也父宗裕封承徳郎刑部主事母陸氏繼母戚氏妻顧氏贈封並安人咸以君故君少慧嗜學父母念獨子重苦之交禁弗為止選錢塘文學弟子員朗秀駿踔氣蓋一時衿佩少年諸司勸學較藝輒皆取君冠其曹君正徳中進士釋褐試吏尹臨淮臨淮帝鄉壮縣民多優復習游惰公私玩敝謾偷政廢不舉糾紛倍十左小邑宿吏側目少君君頴識敏裁便宜張弛更以辦治稱監司使者僉上君治行異等堪風紀選不報毅皇帝南征侍衛中外諸臣騎乘數十百萬所過縣次續食有柄事中貴人道臨淮非分徴索供具無厭横甚君從民吏徃致常饋不贏中貴人大缺望憤詬呼梃君鋭身先民吏當之民吏争前衛君擊傷中貴人中貴人奏逮君繫詔獄一嵗所者廷議白君還治用舉者徴為南京刑部主事轉南京兵部主事以承徳公䘮罷歸除䘮謁告不任者十有五年用舉者補南京兵部員外郎轉南京禮部郎中遷廣西布政司左叅議乞侍養亡何病卒年五十三君方病甚二童奴擁之坐氣漸微而神不亂忽左右視曰爾孰誰耶吾其死於吾兒之手二子舉扶代之若將寐者而絶君起寒約性鯁諒力學自立危行不疑恥媕婀茍同孤立行一意而已俗或病其不諧以哆憎口然居約奉繼母當其心装嫁四女弟甚周與人謀必為之盡當官事闗利病直徃敢任不顧計前却故所至舉職大節齗齗士亦以此多之一時顯望魁人徃徃折輩行慕與之交然仕不充志夀不盡年懐挾其所未究溘然長終已知君者莫不傷懐垂涕云君生好文特甚其為臨淮罷劇猶手一編吾伊空堂中治當南北逹途過客時有中原文獻家博文邃古諸名士大夫君輒委已交驩與相下上其論既謝病屛居愈益専力萃精償其積志六籍而下九流諸子䇿士春秋先秦盛漢之譔古金石竹簡之傳旁逮外家雜説譎誕怪迂之語凡竒古文字罔不雋飫醇酣江左北朝以還唐宋近代諸名家亦皆决藩入奥神詣作者故其文深涵大放贍蔚閎肆能盡逹其意所欲言淵乎蒼然有西京氣骨君率嵗一訪予紫雲山中坐語移日扼腕論文纚纚弗能休予曰雅哉辯然非藝乎末耳吾哀勿事此也久矣君素多病奈何敝精以徇末孰與斂英沃根毓神以貴而生乎君憮然離席曰愛我哉陳義甚髙僕將從子於忘言矣然君文聲藉甚紹介屬筆者彌衆不容自解免焉每一篇出學者争傳諷之郡諸老先生辯博能言者皆自以為弗及也時有紀述莫適自任必推泉亭先生云二子好學世其家女一孫男從周從時女一墓在積慶山南麓𦵏之日是嵗十二月戊申銘曰有崇斯封有坎斯宫有斐君子歸藏于中有氣隆隆湖天亘虹後有王朔氏揚袂障日而望之曰咄咄佳哉其下殆古之人以文雄者乎明故中順大夫江西贑州府知府沈公墓誌銘公沈氏諱南金字子輕家世郡城人公始名芾為錢塘博士諸生御史行學按籍更公名南金公不意慊也子輕蓋公矯辭以見志云髙祖恒負識幹當國初法峻隠而賣卜曽祖晢祖宗夀傳術於世父正術時遂世隂陽家學考俊以公貴贈文林郎南京大理寺右評事妣朱氏魏氏公魏出也贈魏孺人孩幼多竒童丱有志操正徳五年舉浙江鄉試六年會試以乙榜署江西萬載學教諭嘉靖二年舉進士三年授南京大理寺右評事厯寺副寺正正徳十年遷廣東㢘州府知府更賢補江西贑州府既又補雲南鶴慶府移病老於家嘉靖三十一年六月十四日卒年七十九公賦性簡諒操行介特事徇其心不憚違俗所親或規之曰世同混混而子獨以孑孑矯之其的而招射哉公謝曰唯唯否否夫吾信吾心儻庻幾於道或猶十一二已乎嘻俗去道也逺矣焉避矯處家人嗃嗃侍親側更温顔婉辭若兩人然諸弟嚴事之不為降至其婚嫁貲費力補苴之必周教萬載抗顔督厲造就科名士加昔守㢘以誠長者處官民犯盜竊猶覈情時有縱舍不文法顧計也贑當逹塗巨鎮重臣宿兵民脂髓涸供饟矣公身先節約力任興革多方亟圖民望更生而公以杜請托忤時貴排迫左遷罷歸知者哀贑人而惜時舉措之乖歎公不能取容當世殆少激也與公居鄉簡易自便不事矜飾儀觀無故未嘗割鮮兼饌糲糗蔬茹之餐通帛大布之服蕭然故諸生時等耳郡仕而歸者官例供輿𨽻公舍而徒行行未嘗入公府也杭故宋京師江南大都會自昔以繁麗名産豐習侈為天下最公獨嗇陋凉約居其間人以不情猜焉縉紳士則憚屈之然弗甘也或斯靳之曰夫夫也是謂苦節不可貞者耶公為不聞也者矜澹泊為寵榮懸車及就木二十許年一日也蓋其資於世也儉故需於世者㢘古有清白吏今曷愧焉部刺史誄之曰於今伯夷也言少褒矣來者或可取㣲云公方疾甚醫議灼艾曰止生死由天毋重困我疾革諸子問顧言曰更何言更何言無怛意夫觀人至於沒世復安所遁其情公超然若客而歸以語素昧公者將亦信其平生也已公娶陳氏無子繼亦陳氏贈封並孺人子男五希渭太學生例以貲為杭州右衛署指揮僉事希瀧邑學生希淘庻希凖希濟女四長壻邑學生金榜次壻太學生林恩次壻郡學生莫曜庻女幼孫男五女五公卒之三年嘉靖三十三年十二月二十四日庚寅𦵏公靈石山之朝陽五子者聚相泣曰吾父潔修潛懿今隨死而亡後將無復知有吾父者吾曹不子死吾父矣夫先民既沒而徳音猶存者頼之於紀述也孰為言立而傳一二遺行俾書之石耿光於永世以焜燿吾子若孫繄吾父為不亡也五人扙泣相慰曰可可於是希瀧以嘉魚令李君璣衡状來請爰論次之而系以銘銘曰湖水浩汗兮山石巖巉隂林灌木兮偃蹇連蜷莽一丘以薶玉兮穆清風於陵樊天地無窮兮聲休鬯而弗泯長谷逶迤軒騶厯茲兮志士式焉曰猗嗟乎清修獨行之賢許天徳墓誌銘許古太嶽之𦙍有國於許者因以國氏乃後族派流衍天下許在海寕世家袁花里譜可見者宋四九提督四九生千六承事千六生春谷諱嗣榮春谷生盛甫諱茂昌盛甫生同知海州諱懋海州生文英諱橓文英生耕隠諱斌耕隠生守拙諱緍守拙生存誠諱源存誠生乾是為天徳園花許氏天徳蓋大宗世適云初存誠及天徳髫而䘮父天徳幼特孤苦晩更疾廢凡名勢榮利俗所歆艶快適事天徳生不百一遇許族故而敝習挾故而靳下人嵗時燕叙羣從嶄然襃然各矜先物自多天徳貌寢辭訥甚羣居廣坐中状孱如退如鈍弱人也間嗤侮之輒黙不應獨時時承母意得其歡守宗祧罔墜業事諸父無違禮真白敦慎内行可訾殆鮮矣世常外徼而或倖得之以自能然垢心穢行多内疚者而世患亦卒不免焉天徳病痼丈室間無能一逞以適其願欲然因而獲免彼之悔尤殃釁亦多矣其諸所謂世為不祥而逹人以為大祥者與天徳生成化己亥卒嘉靖乙酉年四十七娶俞氏子男三聞善邑博士弟子聞義聞道聞道出後季弟震女一天徳卒之若干年嘉靖十五年正月庚申𦵏洞孔山春谷府君墓右少南若干歩銘曰髙翔鍜翰工謀速患雌伏拙藏以免於今而無忝乎吾先於乎世多天刑而天徳將獨天全者邪雲村老人墓誌銘雲村老人伯台氏名相卿許故族居杭之海寕靈泉里晩徙紫雲自稱雲村老人云老人生世七十九年嘉靖三十六年秋寢疾知不起且慮子若孫徇俗飾終將乞薶文誣我蒙羞入地無絶已時已恐來世有稽無徴也則手書於墓石曰雲村老人平生行業無可紀撰先古系緒載於湛若水志皇考封給事中府君𦵏語中老人以成化十五年九月十六日生於外皇父俞氏三嵗失哺少長善病弱冠始為學甫壮仕於朝給事中嵗餘自免歸久之以中外諸司薦詔補原秩辭疾乞致仕以竄籍鮑郎鹽課司奏聞報可於是結屋紫雲山中水石幽勝處食力詠志讀書彈琴無一跡抵親交城市四十許年而終嘉靖三十四年四月島夷突犯海防老人走折左股一捫之頓踊呼號曰人同有生之樂而吾獨不免殷憂畢此生哉夫天之賦我者學未克見於道父母之生我也老乃更殘其遺忘親不子負天非人奈何尚猶立覆載戴面目名人也乎痛恨不終食輟也老人長子聞過先老人死晩舉少子聞造過子敦儉敦儲儲質美而殤儉子令已令甲令丙嘉靖三十六年八月初九日鷄始號老人夢指畫太極圖動静交處已而吸清露三巨觥昧爽而寤遂病日彌留銘曰嗟夫予乎㝠騖畏途冒襲慚譽一真旋隟衆患攸萃室噆辛螫巷聒羣吠物匪胥戕事有必至聞之先民知我希而我貴吾乃不得與此吾徒生死而已爾兒子聞過薶銘許相卿䘮其子聞過哭之病已乃慨然曰過命在天吾讐天乎悖矣及𦵏復慘爾於邑曰吾誨過學戒衒崇晦晦乃沒世將遂使過懐竒歛英而終古闇然乎忍矣於是反袂雪泣而志之曰聞過相卿長子也母孺人沈氏正徳已巳從予留都太學解装兒生故命曰都小字圻孫予時投檄禮部禮部郎故暴人習陵士遇士輙聲色誰何折使謟承之予長揖見則愈益怒譁徹于門大宗伯召讓郎而名禮官罔知禮士耶諭之交謝俱解或聞諸先諌議先諫議寓書曰兒出門便氣動眉睫間將安所究逺圖予展讀長跪曰兒過矣兒過矣因定都名聞過冠賔查毖齋字之長復云嘉靖初予官諌垣以過徃不二年所䘮吾妻李氏疏乞以過還過資頴日新予適善病因謁告終教之為娶于朱生二男子敦儉敦儲儲甚淳且慧而殤於時過且壮予將傳而過日病益甚弗瘳初患脾肺鬰痰伏火疣潰左股間嘔泄作食飲閟羣工攻之罔功過􅐵噓執予手泣數行下曰兒寕自意止此嚴固詎宜有此恨靡郄書為解嚴其自安其自愛兒去矣不復侍矣傷哉慟乎嘉靖丙申八月二日也年二十八耳嗟乎痛哉予方委過吾妻脱身游汗漫天下名山五嶽間凌雲絶塵縱觀扶輿磅礴之妙予旋復以快吾平生也過乃死棄予予塊守孤山丈室中終吾生生奚以為於戱天䘮予已夫過性强記日數千言六籍黙識成誦尤喜左氏内外傳首尾錯舉不遺予曰韓退之浮誇少之信哉未必仲尼意也則遂輟博綜諸子特喜三閭漆園韓公子列國䇿士至荆聶兩豪事壮之扼腕恍然思起與之遊予曰咄兒所趨愈下矣後弗復爾則又輟成童為進士學出口多老成語嘗羣兩浙諸生試三塲省再連再黜予私怪之間理遺帙得過手草古賦雜文可百首古近體詩歌數百章類皆超逸𢎞肆如生駒未服轡銜而神駿非圉人所馭予彌怪之盡發其藏選苑諸書漫不可手矣則庭責之曰文以載道未知道奚其文立燼之火自是乃専於學嘗曰孰誰賢擬茂叔絶學千載後精詣粹飬殆聖已乎駸駸上逹尋及於患前知過當爾盍憗縱之讀快意書作出格語成一家言鳴於時顧束縛之使不一逞死也於戱天䘮予已夫過少慕任俠喜論文諸凡榮利一不置意中見富勢矜挾者鄙外之若將凂已予急䋲馴養後更慎厚頴鍳故自了了而渾然不見取舍汎接鄉人鄉人樂與之出遊學官諸生間學官諸生樂與之厯謁諸老先生諸老先生樂與之陽明夫子尤亟稱焉雖習交者未嘗聞其言人過家人終不見其誶語頩色也死之日逺近知與不知罔不傷嗟涕洟云予生數竒動與世左望實不遂亢宗忠誠不果徇國行義不及孚於鄉人而丁年税鞅遁跡離羣若與世隔意有待於過償吾負焉爾過乃溘死先予予其永愧忠孝而長為俗之不祥人耶於戯天誠䘮予也已矣憶過童年北遊賦大觀擬封事硯席流聞雋聲隠然起都下過從縉紳交欲識之予堅謝疾辭乃後已夫深蓄期其逺到而竟止是豈生異於常者宜衒其竒予顧抑遏掩藏弗使頴出於囊神故憤奪以還造物者不然有為生之孰亟斃之無為生之孰厚畀之厚畀之而亟斃之如石火電光一過不復遺也何與吾無所致詰也已嗟嗟慟哉過死踰月季秋丙辰舁其柩𦵏几山伏虎岡嘉靖二十八年十二月二十六日改𦵏六十里塘隂挿花山其母沈李二孺人兆左系曰爾來遄徃吾勿獲食爾力予老疇依世安所置長物寸裂予腸咎誰執五氣交運將不齊焉爾是值吾獨且奈何哉百嵗倐忽行從爾地下遊萬千年胡終極雲村集巻十三
