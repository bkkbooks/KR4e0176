body:
  text: 雲村集卷十四明許相卿撰墓志銘太安人鄭氏墓志銘許某曰婦道不亦重哉然教弛俗流士鮮完德而女婦何以稱焉太安人贈刑部主事海鹽吳公諱寬之繼室也嬪吳及紀而稱未亡人方夫隕天泣血手二三孤嬰煢煢焉躬衣食而教之持久靡忒卒就其子以至於有家受封繄吳宗是賴婦道顧不重矣哉顧不難矣哉於戲是宜述以為人婦勸也已於其葬也為志而銘焉志曰太安人鄭氏家世平湖人父諱肅母茹氏敦茂一德是生太安人年十七而嫁年二十八而孀居嘉靖四年二月十八日年七十八而卒以明年正月十九日葬於大易鄉玉壺阡刑部公之兆子男二人伯升仲昂山東按察副使女一人孫男六人綬組紱纓緒維女六人曽孫男十人女一人太安人初歸聽順莫可非儀旋罹家難蹈厄茹辛而志操才識卓然於是乎見攻苦織絍無一時自逸內外費資其手者嵗十二三一布被六十年舉示孫曽曰此吾嫁時物也君子曰善居約也以儉勤先姑氏卒以幼女屬太安人育而嫁之甚恩叔姒韓暴疾死即以已手製衣衾襚焉嵗率按察兄弟上鄭公冡泣下低徊久之及老猶然君子曰善親親也以敦愛按察初為宜城分俸歸養太安人曰嗟輟汝養廉者廉無乃妨後弗復爾正德中例旌孝節有司首議太安人應詔太安人則謂按察曰吾婦道之恆爾業已受封敢徼再命汝其力辭鄉鄰困暴征聞愁歎聲戚然曰飢嵗民貧刺骨忍更涸其髓乎命按察必言之郡郡弛其限君子曰善約已矜物也以仁讓太安人之行多至可稱者如此而丁年遭變初心素守之死不易其常蓋以節始終焉可謂賢也已故時大夫士之文者夀以詩紀以序傳封制有端莊勤儉之辭邑里諷傳欽贊以為允按察與豫善信古篤行君子也及豫序次太安人世行益歎按察之賢有夲哉銘曰猗太安人允女君子懿懿羣行貞以終始惟家實造惟賢實嗣夀有為歌葬有為紀於昭方來以徴女史先孺人遷葬志天乎傷哉痛割終吾生已夫天乎憾哉怨咎終吾生已夫夫有令德者享眉夀受多福常理也人之獲其常也恆十六焉嗟嗟以吾母令德而無一遇痛恨固不可為解也已或少諉者數值則然若夫身後之重厄多難則惟不孝子萬死莫贖之罪何復藉口于數之適然者乎爰舉吾母生前之令德及其沒後之厄難而不孝無所容于覆載矣舊嘗受讀四明耆儒徐恕先志吾母之葬曰許少婦俞氏石泉翁之季女也母城隂故族居氏少婦生而貞肅間靜不輕言笑不妄舉動婢使一一畏順承事無譁者室中穆如也婦性敏慧女紅諸技不習而精顧好讀書幼弟晚孰歸常令指目字義遂通孝經曲禮列女傳歎曰載之書者女婦分內事不爾內無教家曷賴焉及笄而歸許生某適翁喪子幼強許贅生其家則與生協抗家難防禦侵侮調劑糾紛卒完業授其弟無私焉婦生子宅相甫晬言動必示之正三齡呵禁日嚴人曰藐爾孩那遽如許曰聞古賢聖多由教成語云桑從小扼長且不屈矣成化十八年十月二十八日卒年二十二明年十月二十五日葬祔祖姑洞孔山兆志首云云不忍率讀也天乎傷哉痛割終吾生也已夫葬久之水由穴中出遷祔靈泉山祖母徐兆則𢎞治十六年十二月二十二日久之水又出穴中嘉靖八年十二月二十四日又遷唐家灣谷中已而唐灣穴水如靈泉忍痛將事遷南湖之隂几山之陽則嘉靖十二年九月二十二日也唐灣啓遷也相卿痛􅉵而仆馮棺枕肱淚眼甫合若有眤棺而言曰是中水晶骨耶意私占以為祥孰謂妖夢先水孽哉于是怨痛劇而神慮殫嘉靖三十三年十二月十一日肅啓妙果山陽相卿夀藏永奠焉嗟嗟後來百千世信康裕矣奈前去數十年厄難何天乎憾哉怨咎終吾生也已夫吾母令德以古貞淑律其身以賢豪名世望其子而不獲一受諸福乃久困沮洳疊震畚鍤厯諸厄難禍孰致之噫不孝之罪上通於天矣聲竭淚枯更忍興言及此乎去今幾七十餘年相卿有子聞過聞造女四各有歸過沒有子敦儉儉有子令巳令甲令丙後昆禪續往迹湮淪而遺編故在也時一展誦手澤漫如輒長慟欲絶嗚呼天乎相卿胡不先吾母或猶免於厄難而相卿今猶茍活也嗚呼怨已哉人孰不夲於親耶而生事死葬孰不於斯自致其情耶而又亦有因母教以成賢聖者矣不孝惡極禍深天俾不逮慈訓無以成德莫可為力矣而致吾母重厄大難則謀之不臧為之不慎召茲大譴也噫不孝之罪上通于天矣聲竭淚枯更忍興思及此乎况忍自述也乎哉雖然又忍自飾也乎哉忍死志之上俟昭鑒于天誅殛不孝為世為人子者戒下詔後人俟其聚訟不孝為世萬子孫慎終者懲我死無但裸葬為也必甘暴骸中野以俟天人之交責焉耳已矣嘉靖甲寅十二月七日不孝哀子相卿泣血志祝母居氏墓志銘邑故多舊姓遺俗城北居氏尤以篤塞謹信稱與人藹然若恐傷其意而閫閾聲迹肅如也穆如也家教子女咸若成性然孺人處士理之女也歸袁花前廣東石城令祝君繼英孺人卒時年七十五為嘉靖三十四年十月三日後石城死二年一月葬以是年閏十一月二十三日甲甲墓東陳村合石城兆子三世名先孺人夭世言世占皆邑學諸生孫男以順以頥以須以預以思孺人生而溫密靜恭間家教甚夙來嬪于祝祝族方昌尊卑屬甚衆孺人上事旁接下應無不宜者偕石城白首未嘗見誶語頩色也家食僕婢千指而盈孺人斟量衣食拊循曲當以恕掩其過以峻篤其悍以宥寬其不及內諧外附門內裕如也孺人性樂勤尚儉造次生作事不少弛園田沃瘠農蠶盈歉刀布出納字畜息耗貿易良苦皆周諳旁稽不遺暇復紉補饎㸑老矣猶績紡緯絡不怠殆終身矻矻也初石城蚤𨽻宦學晚仕歸休徜徉縱適抹摋世故沈冥酒德誇詡振施一不以家關念而業饒畜裕倍蓰往初以孺人殫力綜理于中也夫孺人歸祝熾豐可豫弗逸已盈不侈而樂盡其職壯老不忒其常此嘗學問之民之所難而以女婦能之是尤難已嗟乎王教熄而士習逺古矣尚何萬一冀淑行于中冓耶雖然徴之孺人求婦順於家教其庶幾哉銘曰東陳之墟水匯土龎夫婦同藏庇爾子孫熾而昌太安人顧氏墓志銘贈刑部主事海鹽鍾君諱海之配封太安人顧氏年八十有一卒是為嘉靖八年九月十二日葬以十年七月二十一日太安人子邑博士弟子員棟中順大夫知南昌府梁銜恤哀痛撰次德履跣二舍而來問銘先以陳翁鑑曰太安人之處也為父母所賢愛其歸於鍾也鍾門內罔不宜主事君初丞懷逺懷逺令躁誕好陵人主事君積不相能也釁日構不解奏與之辨七年太安人攻苦食淡紡績資之時慰以好言曰是固有命存絶不出愠懟語事白復官萬安則曰是果有命存卒未嘗色矜南昌兄弟髫而嬉戲太安人愕曰兒可儒也亟白主事君遣歸就傅衣糧修脯率太安人手具口畫授之遂皆有成伯經術稱髙第弟子仲進士髙等再守劇郡治能稱最一時斯主事君太安人所由貴也太安人老而傳也祿養豐備猶親女紅南昌色勞之輒恚曰而忘懷逺耶抑吾常有味於敬薑之厲文伯也人謂太安人約泰屯亨之際類知學者於戲其信然乎豫讀詩列女傳當時公侯大夫士之家飭行修職相其夫若子而王道賴以成豈其女婦則賢將上之漸導有夲而俗成固當然也今世女子子師絶不聞至夫羣士於學宫而教之纍百不一賢而太安人可稱者如此殆性然哉豫是以訝歎為序而詩之系曰武原有邦叶海潤土厖開濟之阡灌樾秀深叶廓其坎而崇其封於戲是惟鍾子之母之宫聞人母周氏墓志銘鄉貢進士聞人某以嘉靖十一年冬十二月壬寅葬其母及日三舍跣氷重繭來紫雲谷中問銘於其父友許某納狀曰母夫人周氏海寧洛塘人蚤喪母子於繼母能以孝得其憐視後出者埒同産焉周族曰允哉女逮歸先君君姑氏嚴臨諸婦如束濕薪夫人婉承風旨卒宜其順聞人族曰允哉婦夫人生不孝孤若干年而喪先君茹辛銜恤身任家蠱日程不孝孤讀父書窺其奮與怠與其友之賢不肖以喜憂既舉於鄉族姻贊喜夫人愀然命孤曰鄉嘗舉而祖矣鄉嘗舉而父矣用不當才才不逮用命矣夫汝其思紹奕世未償之志毋或以此舉自多內外族咸曰允哉母初先君喪殯于堂比鄰遺火隘㕓委巷烈熖炙天孤狼顧呼號苫由間罔知攸措夫人不顧蓋藏疾呼遷殯獲免孤偷以寬逆天之戾焉又曰夫人生富侈適清約先君宦學隻力事家中罹百憂又屬孤學家無所於委日強事事孀嫠劬瘁餘二十年弗一日弛于其初其心望不孝孤者十半莫晚也而今不待傷哉夀六十又五子男不孝孤一人女二人孫男鶴鳴女二人悲夫非夫信傳之撰永流淑聲不孝孤終天淪心之痛曷為解敢跽聽命進士君器業隱有逺就豫雅信焉爰序次之而志以銘銘曰硤岑雙雙中蜿流虹東椒之隴有坎幽宫伉儷同方庇爾子孫繩繩陳邦亮妻黃氏墓志銘海鹽陳邦亮之妻黃氏歸十二年卒年二十有九矣越若干年嘉靖某年月日邦亮藏其柩於某山而銘屬豫夫女婦之行不越閫吾其奚徴又將奚銘既邦亮自為狀其姻黃倩則狀之其弟邦直又狀之邦亮吾與也繄其姻之言同將無誣黃氏世為邑之海沙里人雄于資性獨不競縟麗恬如也陳及婚將迎黃以愛子逺適難之因壻邦亮其家邦亮年少氣髙時獨墨墨不自意得黃氏迎其意與俱歸既婦于陳則卑卑抑降不敢以富人子自多上承旁接下御罔不得其心女紅饋食具有節法舉室咸宜之邦亮素抱逺志樂友勝已摯交修脯不時趨辦室中往往夙備畢給故其遊知得國士賢豪歡而邦亮遂褒然品于時英黃氏有助焉生一女適海寧查志髙贈給事中繪之孫也夫事忽既往情鍾有涯故先王之敘倫紀為服制重輕久近各殊皆稱情以為差邦亮再婚燕婉舊迹湮淪而於故妻之藏謁豫一言厯四三年申十數請請不怠益強必得乃後已抑可謂厚也已矣不足以厲薄俗乎哉是宜與銘銘曰於淑質嗟短晷婉清揚閟泉下永爾賢聲慰爾賢雄茲石語董母陶氏墓志銘陶氏故嘉禾名家為贈監察御史楷之女歸于海寧錢山董氏為義官讓之婦太學生深之妻學宫諸生樹及材之母成身成章成大之祖母初陶母歸不逮舅子生在抱喪其夫險死餘息咿嚶蘚閾塵幃中擁孱然二𥪡子為命爾於是內隟外侮起乘之悍攘狡竊家蠱絲棼也陶氏不自顧計委身殉家誓完舊物以還二孤調劑諸不諧人若事後先務中急緩母事其姑加婉而慎督其子學肅若嚴父然時時稱舉成立孤遺感厲之故二子蒸蒸克諧遺緒支吾勿終墜姑老嫠獨痛不及傷鄉諸紏紛旋復底定人謂陶氏稱其家子而董有婦云越若干年嘉靖某年月日陶氏卒卒之又明年嘉靖某年月日二子葬諸錢山祖塋合太學生之兆先事樹及材以成身來謁銘豫病不事筆硯辭二子長跪致母顧言未亡人來為汝家婦罹百憂犯諸難所不盡者命耳自意夷險乘除猶當十半桑榆時乃今僅僅五旬病日益殆殆旦夕從爾父矣樹暨材啜其泣下曰止汝悲徒爾乎樹聞今篤古而迂文而不誣者汝許丈耶必得其文殉我白我信傳我斯不朽我已夫毋徒爾悲也樹應曰諾不敢忘夫母生勿善事死重欺之諸孤尚將列于人哉敢固以請乃不果終辭銘曰林水窈如幽扄不晨兮信誓皎如聨璧雙潛叶兮吾詩藻如松聲永言叶兮百代有考蓬顆不湮兮許瞻仲妻董氏墓志銘董故汴徙也至竹居翁慧父子財豪里中里中多憚屈之許亢舊閥弗為下兩家由是有郤浸尋爭端里父兄曰嗟二豪之違言攘攘者我居間幸聽我繄董翁子許之自出釋釁孰如重親乎兩家亦悟曰善善如父兄言董遂女于許是為栻卿瞻仲妻董氏董氏父讓讓父竹居翁慧也董氏性警頴曉數計有大父之風父母愛賢之曰兒顧女爾即男才與弟兩人吾所不足者非財也必厚分女財與男等及歸裝資服從盈庭甚都然能不作富人兒驕溢氣舅大理府君姑周安人咸安之瞻仲木強自用大理安人早沒家多虞殖漸落董氏奮曰語有之健婦兼丈夫吾寧能為石人耶於是攬攝內外諸務耕桑豐歉賦役期會儲費盈縮市易苦良字畜登耗一一目揣心計指課無遺算黠婢狡傭聲氣眉睫輒了情偽故凡任使莫遺餘力瞻仲於是遊戲篆籕展玩圖繪酣詠尊壺間未嘗問家有無以為常董氏嘗謂其子曰禮婦不越閫顧我獨懵於斯主人翁多大言少成事吾為汝家計不得但守書生紙上語耳雖當蓋藏溢羡然常纎嗇錙銖至喪葬舅姑館榖師儒則悉力厚費無靳色蓋嘗三斥私藏以紓家急家卒賴之不傾云子男長聞政郡文學諸生季聞斆女三嘉靖某年月日瞻仲將葬之玄丘山之新塋豫從二子來告曰栻卿獲助於吾妻甚力葬不可以弗之識也敢請噫是宗婦之有勞于吾宗者義宜銘銘曰屏列諸峯席舒重湖室同爾夫地拱爾姑風氣所都百千年庇爾胤其昌乎長女沈婦壙志某長女貞惠歸為德清博士弟子沈朝臣妻生子之望而死之望長娶於談遊學宫則惠死二十又五年乃始克葬復謀銘以徇諸幽豫曰無庸夫石志不出禮經然中世以來未之有改也抑皆論撰其先之有德善功烈勳勞慶賞聲名列於天下而銘之者也惠孱如女子爾矧其歸不逮姑亡幾何喪其舅左右就養滫瀡旨甘莫效也子生晬而棄之逝愛而勞以成之末由也歸沈未浹四期杼軸井臼之勞幾何哉又奚庸銘豫尚憶惠童而喪其母贈孺人沈豫時有四方之役則繼封孺人李母而教之惠祗承無違字其弟過甚愛率諸妹甚嚴刀尺組絍之習蚤夜有程毋敢少舍以嬉曰作而作曰息而息曰毋妄言笑則毋一或妄言笑咸目屬其色辭罔有差池者李以是教逸而恩浹豫以是紓兒女子內顧之懷且意其可朂以修內範成其為良婦已而卒早夭無成銘果奚庸也然豫因而自傷焉吾生舉子未言而殤者未髫而殤者指六七舉褓而殤者勿計也婚及笄而夭者五人焉而惠實始禍天乎豫之無罪也豫於是興思戚戚矣豫又奚忍銘其夫若子請弗置姑為之記其出及其死若葬云惠家世杭之海寧袁花里人逺近習稱袁花許氏惠之生𢎞治辛酉某月日其歸正德庚辰某月日其死嘉靖甲申某月日其葬于栗溪南戊申年某月日於乎有生之類古孰今存兮假合歸盡一氣孔神兮若水而漚聚散沄沄兮終委于江長逝渾渾兮嗟夫兒亟反其真而我猶為人兮中女朱婦墓志銘許氏名金字貞柔海寧靈泉里人也父相卿金生十許嵗喪其母沈長於繼母李李倣古女師訓以婦職金性溫惠靜訥未嘗妄語笑輕喜恚年十八歸河口朱應期生二男懋學念學而夭是為嘉靖十五年秋七月丙寅年三十五視其母年加四年耳於戲痛哉金父起諸生嗜學績文日尸坐吾伊不為兒女子謀故金歸裝不充父迂泥古恆以禮繩閨閾諸女子時能拜起則錮之內室課以女紅屬其母申警肅間之金及歸不省名父家臧獲故金不習外務於是歸而姑及夫不善是也常陵藉之金一切安忍面無忤背罔後言獨墨墨不得志時會弟若妹啜啜下泣也問終不答見父更整容如平時父捐戅不事事俗鮮或諧家復多故布菽蕭然金數來寧不及嵗時閔勞其父甚至時時為父泣曰人只有身身外邊那一物是人長有者爺爺作麼甘受苦惱來咽且語不了父憐傷其意焉方恃以老繄溘然喪雖金數特短乃其父固厄運竒人與於戲痛哉金死五閲月冬十二月丁酉將葬之胡橋西祖塋下方其父輟泣志而銘之銘曰夫爾葬子爾祀夭而全瞑以逝父爾銘志厥悲矢白日無誣辭徐仲年妻許氏墓志銘許氏諱淑貞小字阿男其母六産女絶欲得男名蓋祓咎兆祥云淑年十五嬪于徐越若干年嘉靖年月日疾卒又若干年嘉靖年月日其夫始克葬淑郡西湖之南之甘露山嗚呼哀哉有形歸盡物理固然吾如天何婉孌膝下奄閟土中吾如情何嗚呼哀哉淑之生也豫有行役及髫其母沈暴死豫役未息肩也憗舍以行如鷇墜巢啞啞索哺意慘程嚴倣徨即路含凄盼閔憐之淑父故貧母多女淑殿末行裝垂橐矣繼母李拮據荆布備結縭焉約泰不倫蒙訕受侮掩泣向隅孰誰苦豫心搖搖懸旌然尤切夢想閔憐之淑既抱子戚欣代禪冀償嵗晏而丁年永逝豫曷姑閔憐之痛屠吾肉血刳裂豫肺腸者耶嗚呼痛哉淑邑東鄙靈泉里人今徙嘉興南海上相卿其父徐禾仲年其夫仲年留闈舉士志業雄其曹博士諸生善胤其男子歸濮其女子娶于查其子婦夀朋萬朋其孫男淑之歸徐也二親強庶務集一不事事非儀無所於見然其性辟棘在室約侍婢如束濕薪逮事姑祝祝信佛崇慈子視家衆外內喣如也淑觀而化來寧從諸婢使面肆跛倚譁笑絶殊故常矣姊弟若婦目屬心異之嗟夫摧剛為柔古壯士為能是以名顧淑能爾耶而豫婞婞多忤不能自克宜於時嘻尚論古人哉吾慙兒女子也夫系曰旻天疾威霜殞弱枝形聲歇滅山谷逶迤魂氣悠揚罔閡修塗壤夏繄藏黃壚密而甘露主拱覆釡賓趨彌歷千祀胤裔蒙慶尚徴術於堪輿雲村集卷十四
