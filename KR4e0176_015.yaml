body:
  text: 雲村集後序先君平生所著詩文甚富晚嵗去取而存之重繕而藏去焉先君既沒之四年聞造敬陳而覽之恍若過庭時舉古聖賢豪傑之論議而耳提面命也泫然泣數行下曰噫吾父不可作矣繄起之長存者梓是集矣乎然於彌留之際傳寫差謬不及校閲勘正魚豕尚多於是奉集走而謀諸學於先君者董君吳君曰先君晚仕早歸不獲垂勳竹素泯焉無傳造弗忍也造聞文章者經國之大業不朽之盛事梓是集以永先君可乎二君僉曰宜子能然其不沒吾師矣受而終讀釐其訛而歸其書於豫豫遂梓之而傳其書於世詩賦如干首文如干篇卷類為十四俟識者覽云男聞造百拜謹識
