body:
  text: 雲邨文集别集類五明提要臣等謹案雲邨文集十巻明許相卿撰相卿有史漢方駕已著錄是集為相卿所自定簡擇頗精自序謂棄其脫遺不可讀者存其餘可讀者其自題絶句有曰雲村病老語多嚨造次詩成絶宋腔還溯闗元論風格拾遺壇上樹旌幢盖自以所學為未足欲進而求之唐人也今觀其詩大抵近體居多五言有大厯之調七言出入於陳師道陳與義間可謂自知之審矣章疏切實文體裁雅潔亦多有道之言無明季士大夫求名若渴之習殆篤實君子歟其歸田後與王子揚書稱時慮更切不敢以歸為幸乃今傳聞日駭事勢日危旦夕念北如昔之思南其惓惓君國之意視所謂去國一身輕似葉高名千古重于山者相去盖不啻倍蓰也乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f45b34441412e5036ec8b84b9ec8a5d872a56070235b56a656bf548dfa42a84a
