body:
  text: 雲村集卷五明許相卿撰書簡與端峰邵思抑九首郡城草遇驩洽昆弟語深及出處事宜類以僕為有知者自惟空疎何以當此豈足下謙德之恒固爾耶抑真有取於僕也伏惟足下盛年重望名位未涯而明哲幾先收身青紫紛華中使廟堂知區區之不足驕士為吾道増氣甚盛僕安所容喙念勤問不可虚辱乃輒左獻其愚嘗聞告君之言要在委曲詳明達下意悟上心而不以簡嚴為工宗賢之議嫌涉矯亢來諭當甚僕意則謂足下業已引罪而祗以病乞致仕若豫自規便取必於上亦似未安或云伏乞明正罪罰放臣歸田為民以為惕威昧義者之戒若憫其孤寒迫脅得從末減與以相應降調職銜致仕以冒餘榮以理病軀陛下踰常謬恩非臣所敢望也如此庶足下謙畏自居而吾君得處其厚似兩得耳萬一不然執事雅尚不妨自遂而天下公是固在於令德奚損乎野夫商略宦情如山谷中人浪傳都邑事漫無足憑惟髙明采詧之僕有友沈槩嘉善人也自童丱時夙以文章名節自厲逮今凡七困塲屋其卓然自信者屹不為動也為文祖先秦兩漢翩翩有逸氣辭賦詩歌亦徃徃奥雅可誦事親孝與人信輕財好義有國士之風故憲長半江趙公大參莆田陳公今方伯陳公五清劉公督學時並加甄賞而劉公知之譽之尤深計兄亦嘗聞之矣日者學政𨽻人賄敗欲汙名士以自解而槩與焉謂嘗納賂以求援例此蓋當時劉公惜槩久滯之厚意而非槩夙負自處之本心也槩曽面辭人多聞且見之劉公既遷槩又呈縣繳文以辭司府縣有吏司之蹤跡明甚顧恐崑岡烈焰玉石不能自别耳僕病耗巖栖少且賤未嘗望見諸公之旄節哀憤不能自達而兄晝繡道杭周旋諸公間為深况兄之知僕猶僕之知槩得槩之平生於僕可以知其不誣矣伏惟諸公與兄志存當世哀窮悼屈體士惜才固其分也抑其責也願借一言轉布之諸公面試之又加察焉不如僕言甘伏欺罔或因是而槩獲伸於知己出之塗泥收其尺寸槩之幸也諸公之功也僕出位之言之罪不敢辭也惟兄垂察焉入郡㑹諸同志聞兄所造益邃而真廼知身心樹立者作用自别更望精察力行以希徃哲甚盛僕困於家蠱去住不能自主逐逐行隊知己者將何以進之亟欲造叙闊懷而事故相左美之諒能述拳拳之忱也枉教誠篤别去悵如有失疎劣所恃二三良友惟兄差近時得求助承諭洗除舊習玩味義理須從身心着實體究真某對病良藥感刻感刻約訪子才盛意欲䇿蹇劣同入君子之域至願至願但上下左右士論躋祀先髙祖於鄉賢過此敬從後乘郭令政益明審僕何能少助似剛敏上稍宜加意兄再契勘試為言之去歲奉教周旋遂克茍完病軀端居深念古所謂異姓骨肉吾兄愛僕者似之感刻感刻寓武丘時子才來㑹數日夕受益良多大約謂疎謬者須痛加持志之功以勝氣習或有所得必作用體驗斯益自信有進步處耳荒懶尚多愧於其言歲月忽不待人奈何惟兄幸終相之夏中因風寓書徹從史不閣下今日所莅士之冀北倡明斯道以興起同志舊學恐不為小試矣是以僕於知己有厚望焉僕日逺教督退鈍弗前千萬不惜時惠䇿厲使承下風日枉使教逺慰摧殘無任感泣惟兄旬宣之澤與江漢永甚盛舍弟檣少孤而愿先君命某句讀督之頃獲旅進試吏武昌備屬吏下陳學晩而政未達某不幸其得位幸其得師也惟兄視之猶弟惠教俾免顛仆獲成先君字孤之志某旦夕且死有以復於地下矣臨紙哀隕大拜過家惡服不得走敘闊私甚恨兄屏翰南服責委甚隆柄用非久繼至願益宏逺猷以副久要之雅某殷憂積疢形神銷亡志業頺廢將負襟期安得執手永歎為别書使召見憊伏不任趨走只尺相望彌深悵徃某自罹百憂病侵老迫坐負清時徒竊寤歎兄知愛弗忍遐棄何以畀之使自力於夕死可矣之訓尚免沒世不稱以為兄羞江湖日逺晤語未涯時因風翮遺之好音與泉亭吳維新少參三首再貶墨諭病不時報少間倩筆以塞下問夫史莫難於志來諭立例簡嚴無所容議僕所為父兄致私禱者歲徴賦役覈實大書人可稽籍坐見而猾胥不敢大肆巧誣是兄筆端之口流惠無窮矣然須嚴候審覆關報為據亦不消多著語也風俗之敝僕久痛心憶自兒時見曽大父行多朴野真率今諸後進文采軒然將鄙故老為長物而敦篤浹孚之意殆鮮雖大地皆然亦須慨歎數言賢傑有作或縁而力矯丕變志之助也幸毋小奬郁郁以長此風况今所謂文不過排比爛腐修飾儀觀外矜辭貌而内無忠信如優人習禮正不堪著眼者耳於文何有詞賦恐不必載但時挂一二精語參差隠映其餘似不勝録為難測若一一舉之敝邑之陋反更索露矣何如何如兄又欲僕分勞著名其間如唐宋人修晉唐書例僕意二史列著史官姓名殆簡袠重大分曹置局以君命臨之今此數簡小試發硎固以迎刃恐不必為此彌文也竊意志無定式因地為體因事為用難主故常要在言約事該如老吏斷案鑿鑿可以信傳斯不刋矣諸如郡邑志之不能久存無亦循襲多而猥雜可厭邪殆不啻張先生所謂言無體要而已至夫否臧去取則我嚴侯明見之審執事直筆之任僕邑人也恂恂似不能言守此律令焉耳憊甚縷縷幽屏名跡薦論偶陳吾兄又峻督之臣子大義敢弗輿疾周行而所欲懷安一丘自為名髙者有如日但積疢殷憂之後吾精已銷亡矣性復疎戅乖時恐一出䘮其平生重負恩私遺辱知已何以見吾黨之士是以將終混迹樵牧俟命首邱倘愚計之或未逺失者耳志事易草文獻有徴良為邦君邦人士謝不宣賢郎遵晦髙舉兄積慶善教胥見之通家喜躍寜直恒情但少年髙科徃哲亦所慎持惟顧諟吾兄命名之義以紹世德僕切私禱過庭諒已素講矣穡事收拾蝗餘山傭冗劇稽賀千萬照察與白浦朱守中三首雨中邂逅遂弗成賀再訊候人使車已移轍矣伏惟名邦司理舊學展布想當沛然一郡生靈司命願無易視也弟欲僭端其愚喜諛而愛太泛自廣而事多忽尤當屏絶異色疎逺羣小使耳目蕩然無所偏寄甚善弟逺教寡與便風時惠鐫切使得勉䇿駑駘不貽初盟之羞無任傾佇子揚北去附致區區徹從史否比想體力佳勝弟病鄉恃藥耳恭惟太夫人多福賢兄弟無恙兄得專意體國甚盛某孱軀俗累舊殖就荒恐負愛望奈何風便布此千萬審時厚自愛以慰傾戀閱歲不聞京洛之耗時聞宅中平安報為慰弟獲弛於負擔料理病軀以與老親弱弟相周旋繄誰力耶骨肉之愛何以逾此遥聞墜馬移疾久望杳然想非久事事意急賢之日自不可無兄耳與李白夫州牧三首别逺萬里時更十年交游聚散更十伯千人心目中常有吾白夫也徃歲書與二綾自髙汝白至今春書與象梳自進士葉應期至及秋詩啓筯笏自舍人馮立至故人之意戀戀如此自愧何以承之恭惟再牧逺郡力追古人為吾黨光甚慰言忠信行篤敬蠻貊之邦行矣蓋己可徴願益自信俾政孚教洽後稱南鄙聲教進於中州自吾兄始僕日望之平明之朝當必有知之者僕德業不修殃咎類至九年之間再䘮其偶初冬又將攜稚子南還劍州學記非久作畀蜀省令紀嘉績送行敘未暇追補應期近宰鄰邑誠亦易達也萬里緘書神與俱去京邸眷存道義之愛侔於骨肉以言為别心許久矣僕不幸途次幾死於盜家食仍困於病山妻近棄諸雛嗷嗷膝下惡抱如酲未嘗有佳思到筆硯間負約知罪伏承守劍專城師帥委寄甚重劒民即杭民也兄能以教杭者治之而居之以恒持之以斷不惕於勢不遷就於俗不顧計於升沈則古之循良將可馴致僕即有言何以易此相見未涯延望豈勝凄斷徃歲傾蓋之逢已知執事志行當屈古人與相上下西南竒秀鍾于山川廼今不敢盡信昔人之言手諭石刻之惠益見盛心尋常交際必以逺大相期某敢惟迂放自諉以負執事與我齋蔡希淵督學四首某疎淺迂戅寡偶少徒執事要以同志進以務實向上之學皆向來交游中所未嘗聞幸甚幸甚顧某積累工夫甚淺撓於外汨於中者日復相尋力與之戰而進寸退尺不能自持奈何伏惟時賜教切使恒顧諟至望承教所處詳甚非疎謬所及弟意今日當途所以待兄非徒私之蓋將作士氣直公論以風厲一時在兄非直為貧亦事道也顧兄有以崇正學淑人心丕變一方以及海内答國士之知者力行何如耳炎暑共承道候百福弟病息如綫山中過從樵夫牧豎時共盤桓水石間耳徃嘗再寓只尺曽徹覽否恒念昔聞誨論不間旬月今直計歲年尚未可萬一冀豈巖谷太阻鱗羽少便抑某罪過自疏不復可援耶兄無寜姑教督之而遽屏外之也某病甚幸不死逺枉書問感激不遺比稍行歌山澤間蕭然攜隻影耳意將茍完形骸獲免戮辱於此世以下見先人不知未死之前當果何如耳與桂洲夏公言宗伯二首徃歲大斾經霅貶遺雅什憂病屏居久稽報謝比聞制下遂正台司昌期闊遇千載僅見某憂病相仍僵仆牀蓐有年矣竊惟舊辱游從之雅今無干進之嫌安忍恝然不為世道致深望耶方今元聖有作輔以英才凡有血氣孰不企踵延頸以望至治然凋瘵未蘇守宰數易雖屢聞申勅竟昵奉行害於致理患誠不細矣執事亦嘗畫周審之䇿展𢎞久之猷得其人恒其官復如漢人増秩賜金者可乎否也小人跧伏巖穴昧于逺圖慮患目睫然覩一郡邑而天下或可槩見故冒昧陳之以効其愚某積痾殘息僵卧萬山中過從殆絶逺近親知己忽忘如隔世仰惟執事顧獨不遺沈淪時加誨飭念故下賤光於昔賢某自惟屏逖疎野十數年間竿牘之問罔克一通於京洛薦紳知舊已闕然久不報矣謹馳記上白與雙江聶文蔚尚書二首闊遠儀範多歴嵗年聲氣之感通於寤寐比歲聞兄按閩風裁守蘇惠政與俗自别徃來陽明門下又得淑緒論窺精詣異姓兄弟之許若無待於接膝抵掌歴寫肝臆為快也僕早志此學晩猶夫人幸獲從兄下風謬塵省闥妄意建白萬分一庶幾昔賢已而意不自得病復交攻不二年所竟自免歸削迹周行逺影空谷邇來竊比古人優游卒歲之知樵牧自營與世隔絶者今二十四年徃歲華亭冠服之貺所以惠待僕者不終負矣但溫繹舊學疑滯紛如無由就正有道獨抱憤懣耳風波渺爾晤語無涯願崇令德永以為好别逺懷企殊渴顧舟卿來辱冠履雲布之惠此野人初服也知已逺惠重侔麗錦矣奔騖塵坌三物在笥三載於兹林壑興懷愧汗屢浹去冬先妻不幸歸骨故丘兹行及期而病留之乃始圖拜嘉賜溪山猿鶴共相欣戴也希淵行便匆遽裁報未申千萬厚自愛以佇驛召與彭山季明德太守二首都下邂逅遂沐知愛勉以古人向上之學君子與人為善固不逆謂無似非其人耶繼辱墨教拳拳以心學相鐫切殆真謂某可進於斯矣某從前積累既淺麤心客氣卒未能自克外物紛至不免與之俱驅耳先正謂培擁根本然後可立趨向所以培根本立趨向實用功處便風弗吝一一不敢忘自力也病耗巖栖百事漠然于懷惟道義交游時存夢想恭惟邃學堅志敏手通才所向無前深以閱歴更當何如僕迂懶頽惰瞠乎其若後矣兄將何以畀之德翊先生去便布此風波如許邂逅未涯千萬順時强食自愛與磨溪熊以仁憲副某曩殿班行執事特以年愛過私歸更憂患跧伏十年猶耿耿夢想風采也伏承按節南省彌劇傾遡病不任衣冠望燕己申積懷為罪顧辱手教臨存嘉果牢醴副之登拜感怍浙河民性馴畏比歲小康兄才望德威自足坐鎮願勿擾也與横山徐曰仁侍御邂逅扳聯知愛隆篤侔于兄弟中間去住相失而英風雅度膠於吾心猶一日也祈州政績偉然度越流輩上追循良於此見曰仁素學有用同志者亦自増氣夏初聞南都陟命晝錦歸寜年勞故常不以是為曰仁多惟高堂夀祉令子岐嶷僕為喜而不寐耳暑毒殊酷惟為國加飯自愛與棟塘陳忠夫伏惟晉陟方岳善人之澤殊為湖南數千里賀某多病放廢壯心蕭然霜葉矣故人志義久要能不亟訝絶之否與勿齋婁存仁太守二首伏聞親舉玉趾以勤疲民復條捍海事宜下問某病伏九年若與世隔寜有長計可備采擇耶今患固亦天數譬之父母於子豈忍以其病在必死而不求所以生之秋成近睫海波及田勢甚惶急當堰瀕海内河為先海塘用石如海鹽固善特恐仁人不忍疲民任此勞費但當深基密築一倣昔日故堤㕘以近日治河之法更須博擇三五精悍辦事僚吏闔郡不足檄訪他郡必務得人如漢議河防又必分地程功實舉懲勸似或有濟况漸次講驗又必有經久良便之䇿出於其間以超始議者伏惟精誠動天寛博酌民顧此何足采擇瞻遡光儀無由趨炙曷任悚懼某山澤淪廢懷企聲猷不能自達惟兄誼舊愛私時抱傾渴實倍恒情非敢為佞也某本戶稅糧徃承惠念批從鄉宦自運例甚便甚厚但瀕海旱蝗已三浹歲民力竭矣某坐食如蠧又奪民便義何能安伏乞改批兊運與里父兄均勞獲釋罪媿蒙被君子之愛良雅瑣瑣伏惟貸察與筆峰王應時憲副某惡鍾竒禍天不速之死而奪其所以生慈嚴相繼背殞不孝未得相從地下纍然茍存殘息於苫􅤓間安復知有人世事故人枉書讓其疎問罪戾餘生益用隕絶不能卒讀矣周生以其父臣貴屬校官力請報書中及之某識周生自兄書郵始逺道寒氊使有溫意何如諸所欲言或未即死圖更布之荒迷不次與白山倫彦式司成春和伏惟台候百福某違逺德範幾二十年比嘗卒業南畿試録序淵乎藹如也竊窺德業逺詣鄉徃益勤執事方以此學教天下行以此學相天下其將挽澆浮而還敦慤甚盛某積疢殷憂日夕鄰死殘形餘息偷延空谷中分無復僭望於世惟英賢入當台鼎隆世道幸斯民者日勤望之與潘薦叔憲副某待盡空谷世縁如掃髙賢志義獨膠於心時牽夢想阻越無由一布之只尺耳伏承信使多儀逺逮深谷感惕何堪僕病伏不關時論奉諭閔俗仰窺當世之慮夫俗漸以下勢也頃乃頓改競趨可駭厥或有開其先者執事日夕入秉樞筦諒當植本握機以拯之猶可障其潰决此真執事事也僕方將藉焉優游聊以卒歲矣與梓溪舒國裳修撰兄危言大計天下知之僕則以兄占世有隱憂焉不知涕之既隕也履變孔多閱理彌熟今來所造詣所謂將䧏大任焉者天意有在私望甚侈吳德翊先生去便勒手狀布區區宣公奏議奉為忠讜助風波如許邂逅未涯南望曷任凄斷與海州廖師賢冀都邂逅等萍水耳伏承抗章引疾獨心異之别去四易歲此懷耿耿常有師賢也近冬蔡希淵寄惠教凾詩翰廼師賢於僕亦爾懇懇良極感歎伏諗嘉遯静脩舊學諒加邃密僕病耗巖栖塊然蒲團睡漢爾吳德翊先生去便勒狀區區德翊善信君子僕之益友兄試契勘何如時不待人願益强飯力學自愛與頴谷陳遂初三首章江事變甚駭私心劇于燔灼執事義均王臣諒同此懷宗社有靈非久當靖顧恐吾土歲饑民貧或有狗䑕輩乘時竊發奈何奈何幸為寄民社者力贊一畫固不得避出位之嫌也艱虞之㑹惟國士為時益自愛僕知海内有鄭少谷己十年餘寤寐恍然幾見風采來約及少谷佳製并辱三復之餘神魂飄飄凌南北兩峯之巔矣屬有寒疾方汗君能為我少挽行李敬執鞭弭以從春和侍奉多福病夫怯風猶未春服也悵望風度徒切夢想耳未間千萬自愛吳汝瑩參政恩舊違闊思即晤教恨不傅翼以風病縳如尸江城徒切悵望奈何乃勤信使諄諄久要髙誼感刻無量重以幣物牢醴之縟悚惕殊不能堪惟兄賢勞中外某濩落淪廢分終為溝中之瘠耳伏惟不遂遐棄便風時惠督之俾不辱林壑以為兄羞至願雲塗逈爾瞻奉未涯千萬為明時厚自愛與儼山陸子淵司成二首某私淑餘論越自諸生時頃歲奔騖未能通謁逺枉誨函無任慚感伏惟髙居靜養台鼎䇿勲中外僉屬某病廢跧伏拭目以俟唐君便扶憊裁報貸察不宣某稔惡及親圖嚴其終而信其善於永永以少寛不孝之譴惟名言是賴日蒙惠諾曷惟不孝沒世感泣而子若孫將永憑藉以光寵於無窮矣襄事期迫不得違次以領伏惟矜而畀之與虞山陳原習中丞某病廢空谷分不齒於周行乃厪執事餘論亹亹惠問繼之得非或有妄譽某以欺執事者風裁之地微寓捐金駿骨之意耶伏承總憲三河某病力不任道周羈絏之役苐日洗耳巖栖伏聽詔追老成亟登政府以福天下冒昧悚仄與汪德聲亷憲溽暑台候多福伏承總憲大藩風裁凜如而敦雅溫博寓於其中甚盛某不天烈禍積痾為世不祥人屏淪荒谷眇接親知十四三年矣大人君子之光儀徒切向徃安敢輒以漫刺溷閽吏伏辱教函書錦之及俛屈崇嚴先於萎廢殆執事者微示延攬不已之盛心風動南土耶與應原忠太史闊違道範積有歲年伏惟齒德彌崇屹樹斯道之榦尤日瞻企承再道杭輒遺俯問殊感勤愛某多病殷憂學殖惰曠仰負奬援多矣自分迂戅應俗多忤日惟屏迹保身課孫延祀優游卒歲為期耳執事不終遺外仰祈教督至望風便謹勒手狀布區區未間千萬為道崇䕶與東圩錢公良太守谿翁來諗尊候嘉適甚慰承屬老夫人幽宫之文伏惟愛舊義豈敢辭南溪東濱西臯下委皆嘗副命執事惠顧尤厚僕豈懵然苐齒増十年精耗大半病復侵尋知舊報書經旬滯閣如斯紀述量力經歲猶不能就緒也學殖蕪廢又未暇支離自解耳與任闕亷憲枉䙝崇嚴惠存萎廢下士曠舉薄古厲今矣顧某闇劣無所敢當慚懼千萬登領朋尊酣咏巖扉以醉嘉賜果牢敢辭野人之固伏惟惠寛其誅與蕭子雝御史違遠顔辭無任瞻企恭惟執事遵晦養望茂膺多福方今渴賢之日執事志存當世宜重為當世慮恐不得如僕賤劣者之偷便其私也風便列狀布區區千萬為國加愛與南溪張鵠舉大尹二首某舊齒過從頃歲守冡移家受㕓封内姓名凶穢尚稽内謁顧辱騶從儼然先之繼承信使多儀之及感怍何可當附狀敬致謝私病力未能走煩閽人伏惟貸察不次頃聞陟郡殊為邑人惜復為湖人賀執事雅望方當入贊臺省出典方嶽尚爾迴翔師帥之地固造命者欲使老練民事以為受大任重之基耶卧病不能徃助攀轅奉晤未涯千萬為國加愛與平齋沈一之二首冬寒體力健勝僕時時隨病支吾耳使惠逺將良荷勤督勸之應詔臣子大戒義當委躬竊伏自量病力迂才出將有負無補死等溝壑徒辱知已計必茍完此身下見先人為得張静峰寶婺貽書亦是此意甚感其善處僕也但貧家歉歲欲上疏未能遣發奈何兄家務殷重似宜輟一曉事郎君代勞蓋學者必須静專方見得力况衰年强為浮世所役却與僕昧幾强出者相去恐非尋丈之懸也使至不得手諭兄豈忘僕耶適偶倦耶僕多病且䘮㓜孫老懷惡甚舊疾殊劇時時以不可奈何自寛耳兄傳家謝事甚適但僕僭議在數年前今特差晩也教子儉退固善似須先革其富貴氣習則儉退自若固然矣否恐或不免終扞格也僕空山日與耕樵伍歉歲日甘藜莧食甚習兄或命舟一來共此風味乎與西村朱元素二首某獨學迂誕與公等儀觀未相覿觴酒豆殽未嘗接殷勤勸氣勢無所倚依某之屈伸榮辱安足與公等戚欣而動其心耶頃歲抱藝弗售宜黜宜陟之在某與不公不明之在有司與否未白也非直交親者之無介然於其懷而某且以斯文之興䘮有命自寛焉公等顧忿然不直有司形於咏什慰諭勞苦若平生歡殆不虞浮實之聲過聽於素而有司一時陵厲頓挫之已甚者驟激其哀憤耶憐才悼屈公等無所為某則不敢忘也日偕計吏再比禮闈野性彌自安恬更不假命以自寛矣公等無重為我戚戚也養髙巖穴咏歌太平實惟其時公等慎自愛過可材訊公眠食多適良慰山人病力事百不堪一切世緣久絶夢想獨未能忘情山水間耳公能時來溫舊約不與孟涓郭一丈觸暑臨存已拜勤注侑以儀物沃以清談經歲黄埃倥偬中人灑然毛骨俱爽弧帆西引神飄飄與畫鷁偕逝矣與勾溪陳用明曠接笑言欲見殊渴率爾鼓枻遡秦谿冀良覿晏溫被葛登舟薄午北風頓厲便蕭然有山廬挾纊之想縱帆飽風而南矣造物限人非剡客例公也與胡静菴少宰三首比辱大斾左臨甚寵前騶遄發弗得久侍誨論極悵惋冬寒伏惟尊候萬福時方急賢執事志存當世而身繫其安危春和已近庶幾勉從簡書以慰天下之望昔拜枉教兹荷惠存與進盛意何以仰承日惟自䇿疎劣期不辱髙義以為報耳當軸簡命中外倚望已久曷惟某得快瞻侍傾否之㑹方須舊德望實如執事恐義不容以私為解也聞教有期彌切向徃伏承誨函三復卒業竊窺仁人憂天下之心甚大且逺亟欲身承指畫只尺郡城多病限阻徒切神徃伏惟執事俯制禫吉將正台司以福天下某哀病未能䇿孱軀負羈絏以從猶當拭目為天下蒼生日望之與董子濤丈卧病苫塊忽承厚奠髙文之辱蹶起感泣為先君稽顙卜鄰初約孤雖不肖公或屑就尚勉欽承曷敢越先志與樂有祝思允太守三首驅馳勞瘁不得過從慰苦悵望何如枉問䘮禮夫俗安久習驟欲反古多口固宜但吾所守或過於中所執或非其大似當避夫矯俗干譽之嫌以近人情若其大者知之真操之力生死不易而况於浮言哉於此惴惴或恐見不定内不足耳要當勉求諸已可也大戚中有此逺役伏枕徒爾神徃伻來墨諭陳義甚髙似於知我未盡故再布區區僕行慚諧俗比得吾弟意氣相知輒爾受惠自附於孺子為季偉飲食之義今之人沾沾自好矯竊古人之似者有之矣實何有哉而弟槩以僕為徇世且鄙其學魯獨居之男子似太隆末俗蔑古人而淺我也夫僕昔匱而受今足而歸我弟知其不足而予於其足而取是之謂直是之謂義必欲辭之以為髙是不免以僕身為溝壑其為愛我耶原封繳納願益力古道追古人翼蹇鈍以達於髙明則相知出於尋常受愛更不可涯矣令弟來言買山事聞之茫然豈傳言者誤兩曽參耶不爾知我太淺矣唐人詩曰無心與物競鷹隼莫相猜為兄誦之與萬鹿園都督二首某病廢空谷十年餘不知有人間事矣獨於吾兄逺心勝韻時時悵爾神徃伏聞大故抗制用情良為道義増氣憊伏弗遂把手慰苦為恨疆事孔亟世祿之英想亟搤腕諭及出世之㫖見解益𤣥起而作用當與時流自别風波未涯千萬為時强飯加愛僕屏跡巖栖二十許年疎懶自外於達黨以公之超俗逸羣素所向徃不能尺牘自達其區區曷任内愧伏惟𤣥探妙解試之功業作用必大有得力處非稿寂所能窺矣與僧石門秀公四首敬問石門山人無恙走養拙山中眠食粗遣頃為國事抱漆室之憂山人慈悲當亦為衆生煩惱耶遲一雨後載月徑造東林也今日訪公五畆山房公卧雨北窗曽栩栩得信息否分付白足亟下一榻於東林深處病謝過從齋居如僧一切事都不關念獨泉石舊遊時栩栩入夢耳清香近作聊致我私山房守歲談詩一爇而詠之若與病夫相對也某問石門山人無恙頃得哭太白山人近製知山人果爾蛻去傷哉傷哉追念舊遊夢乎非耶渠忘情去來者猶有鬼神得無笑我與公尚爾鍾情耶王通守某憂病沈淪多歴年所飫聞執事抱經世之猷布宜民之政千里屬心周行馳譽甚盛病骨不任衣冠阻望屏舄僅嘗一修咫尺為邑父兄謝恤災之惠耳某自慚行義未崇鮮孚於俗而來誣罔敢謁執事者白之白之非硜硜自好而亟自明也為士風計為民習計爾士風民習抑又執事師帥一郡者之責某安得詭徼長者之譽但已而不一陳於執事耶縣市民楊坡者某素不識其人作何狀不知何由挂賤姓名於訟牒牒中諸人與事某一不曉其誰何自不必論但某嘉靖癸未乞恩歸遭多難入山杜門如蟄十有四年一日也曷惟滅跡城市蓋已却保社於鄰曲絶慶弔於親黨此邦人士以及四逺有識所共明知不寜是耳某自弱冠為學官諸生公㑹庭叅之外絶未嘗持一謁候縣門邑中吏民之所睹記可徴也今一妄男子無端以偏辭冒加之而莫之究則邑人將皆曰許某守身如斯蒙垢如斯斯時白黒混混無良之民日罔忌憚且復何以勸士吾恐貞亷之風自此日益不競而黠桀無賴之姦鱗集蠭擁巧詆厚誣彌尚彌工四百里間刀筆利於戈鋋以衊善類而海寜猝難政教理矣其漸將不自某今日之不白而加熾乎愚為此懼伏聞棨㦸行部追呼聽理以竟此詞為便輒一牘少布腹心萬惟執事留神窮治之審其與某毫毛何所關涉務見根柢片言立折之不但某獲雪垢汙且使士勸民懲而成善俗矣與顧近泉秀才某學負先訓老無聞知憗不但已强令兒子從事舊業少償積志訪求矩正伏飫德音大業兹敢卜日戒舟奉迓行李儼然臨辱抗顔作模寜惟小子詠游教澤稿廢亦將與霑餘潤矣雲村集巻五
