body:
  text: 雲村集卷九明許相卿撰傳死事傳有序語曰天下之偽不可行於死誠然乎哉然臨難稱命之臣或以賞勸或以刑威君子猶未列之誠臣焉明興百四十餘年方宇晏然恃安狎法百務懈弛而兵政尤甚是故姚源之冦釁起不圖師行無律往往望風乞命偷旦夕活於狗鼠間餌盜辱國為甚蓋知方之教不閑而軍法隳紊亦非一日矣復何賞刑之足顧忌也乎於是乃有迫艱危捐要領而伸大義者倉遑危迫將無身矣尚暇為身外謀豈人情哉烏乎烈矣於是傳死事呂忠字守誠其先某革除末靖難師有官勲世副千户守禦海寧幾傳至忠忠少美風儀善諧謔業毛氏學為博士弟子已而承世官雍容故諸生也時嘗大閱忠馳射雄雋意氣自得甚故硯席生靳之曰守誠秖今稱雄兒戯塲中猝遇黠冦将棄鼔旗北走汗僵喘踣矣忠正色曰君詎宜品士忽猝間何言之易耶姑著冷眼異日遭變有亡命呂忠耶正徳中姚源盜起攻郷聚撼城邑三衢饒信千里繹騷聲焰張甚撫臣奏徴諸道兵征之檄下海寧忠黨汗駭心掉不自禁多病辭或賂免忠獨奮曰國家祿養累世用需一朝人私其身國何賴焉奮行至開化統兵主帥以賄調諸将迂左不當賊地壁調忠華埠當賊衝壁忠曰擐甲執兵殪賊是求不當賊非夫也陣未集賊奄至忠挺身出戰發三矢殪二賊賊悉衆搏忠躍馬力戰陷溪淖中漩不能出日暮援絶賊叢矟亟刺忠忠比死怒罵不絶事聞贈忠正千户世其官林文貴故天台人從戍海寧守禦正徳中姚源盜起剽攻城野衢信騷然撫臣檄千户呂忠統其屬徃㑹師征之文貴以騎士從時海内久安人不識兵亂起猝遽逺近譁駭當行者號慟振野畱連踰期或逃亡自賊殺文貴獨慨然長歌䇿馬就隊一軍氣為之振至衢之開化壁華埠當賊衝賊據複嶺阻大溪叢薄彌望棘篠連雲虜陣隠然九地中我軍逺赴新集錯列民兵士志不齊地利異便賊氣吞焉陣未集賊擁衆至呂忠戰死衆且奔潰文貴厲聲曰將不負國吾屬其忍負將况進退等死耶衆義其言止戰者八十餘人文貴奮鎗洞賊胷賊憑怒戮力聚攻衆多戰死存者俘係賊徐引問多伏泣祈生文貴僵立瞠視賊咤曰何物尚爾文貴發怒罵曰賊我官軍𠞰賊力不敵為禽耳賊犯國法戕民命不旋踵虀粉矣賊怒甚則其足詈不已拔其舌猶噞喁奮張作詈狀賊至剖其腹刳其心快忿乃已尸暴戰地有過之而失聲慟曰嗚呼此林文貴也好男子好男子云贊曰人有恒言子死孝臣死忠予聞甚習見何罕也死誠不易哉故古者以死勤事則祀之若呂忠之死綏林文貴之死烈何及今見之彼特賤臣微卒名位黯然槩其義于賢豪烈丈夫何愧焉烏可泯哉烏可泯哉節婦虞氏傳節婦虞氏錢山董湄之妻也少慧知書年十六歸董歸董及兩月湄暴得惑疾强死節婦褫魄驚慟一日三四絶復蘇痛且自念從一大義也同穴信誓也殉義成信計莫如死潛治後事以身殉家衆覺共防之節婦不獲逞則長慟曰吾即不死終不能與生人事耳於是盡屏常所服用髽免麻枲以居哀哭無間晨夕姊姒弗叅語笑丈室重扃攻苦食淡時董方饒樂獨瘁瘠如枯禪苾蒭尼人為弗堪顧甚安之間詠菊云移揷春苗愛䕶周柴桑無主為誰秋寒芳甘抱枯枝萎羞墜飄風逐水流詠竹云一片貞心古井泉清寒徹骨自堪憐相看嵗暮青青色厯盡冰霜戴一天節婦死計不遂終怨無已曰我不得從官人死得復見官人如生者快長瞑乎乃自貌其夫額凖眉目耳輪郭倩輔兩顴重頥粲齒絳脣晳肌黝鬢如其平生募工刻畫而私潤飾之然工得形似耳意態風度溢於雕繪粉墨之表則節婦情屬神解㑹手應心得十五焉既成大哭曰官人今果如生矣具酒炙饗之自是日必薦語必告事必禱盥櫛湯沐昏旦寢興裘葛更襲無異生人之奉十五年一日也夫感通之實精誠之極也節婦於夫誠積而思專夢耶寤耶而目若見之而耳或聞之家衆老穉駭而走相告曰木官人汗簌簌下矣又相告曰木官人舉褏指揮矣兒婦人口語張甚舅謙木强人也恚曰兒乃馮為厲耶亟取火之節婦無可奈何大慟曰吾長已矣由是食則祈死泣必淚血黯爾鬱悒以終節婦死時年五十一以伯氏淞子升嗣淞好文與予善故為序列之著于篇論曰婦以節事夫義也然時遇邅迍全於堅忍機来𦕈忽貴於決從決從俄頃而堅忍將終身焉故節一也惟時與機而難易懸矣是故江漲待符貞姜溺旅舍斷臂王婦決惡疾偕老宋女貞早寡終養孝婦義自刑全節梁行髙浴室畢命隂妻壯殘形顯操魏婦激投崖軿死二竇勇血書清風王婦烈禮殿血象譚婦靈是其節何可軒輊而難易自非一律也故仲由結纓王蠋伏劒概之虜庭十九年不屈之臣同一節爾而子卿險艱倍十百矣節婦亦云悲夫居貞娥傳夫書呂詢妻而復曰居貞娥何有家妻道也有家猶終處室焉娥之貞云爾娥故邑耆舊正之女笄而字詢詢幼䘮母及父病風癎絶不省識生人事娥歸亡何詢死後姑自念我子當有完業嫠也奈何尸適名與家事蚤夜氣陵語激之計其迫且他圖娥不為慟乃分出之北郷田舎娥獨奉詢柩如田舎間手織自營恒病廢織家殖屢空則貸諸里母里母竊悼憐之為娥泣曰婦人倚夫與子而今孰恃生計藉衣與食而今安給嗟夫天地許大少年幾何何徒寒餓槁死荒野泬寥無人知之地誰為也娥失聲泣數行下曰吾命則然吾義不踏第二條路母言如吾義命何吾終下殉呂君矣願母勿復再言自是單約困悴幾三十年死於乎娥孱如女子耳抗烈丈夫底死不奪之志難矣哉非夫教之閑將賦之天者獨貞純也與娥死年五十三矣予既葬娥合詢城北二里横塘之原越二十三年嘉靖甲辰予行娥墓寖湮蕪矣復為封樹題名墓石論次苦節鑴石之隂屹樹周行觀聴炳燐貞聞流聞與石硜硜風動女婦尚勸而興已夫黄太淑人傳封太淑人鮑氏今禮部尚書黄公之母也世溫之樂清楊川里人父恩潁州守母趙氏太淑人蚤慧知書讀女孝經小學諸内職撫然曰善哉女婦當如此矣少長荘慎警敏潁州賢愛之嘗曰吾女必光鮑宗有及婣議輒曰勿亟當惟其人既潁州需選都下尚書大父文毅公官工曹尚書父詹事公從旦趨學舍經潁州寓見揖甚肅已常見如始見潁州目屬心異焉知其必貴慨然謂文毅公以太淑人歸詹事未幾来嬪黄故秀才素業耳文毅公時為天官大夫典選矣太淑人念黄氏世仕于朝舅復柄任凉約乃爾即惟仕者不家於官無亦居者不力於家已乎已而詹事厯官復典選部太淑人留攝家政于凡生作因地任時具有節法命諸紀綱僕分責稱能計功授事職務井井以家食仰於田收也鬻裝殖貲以市田以日息可裨嵗計也藝圃字畜以資費以儉汰勤怠家由豐耗也身恒攻苦食啖約縮經用時非賓祭家人未嘗見其被文綺啜肉羮華飾厚味絶不及諸幼而族婣慶吊䘏睦無或遺也劬力疲神早作夜息身率家衆以為常嘗曰人言月得四十五日者我之謂也夫故詹事恒業才中人産太淑人經紀撙節二十許年拓田千畝建宅數十百楹列授尚書兄弟並為巨室而詹事若無與然平居尤嚴閫閾之限中閨重扄繫扄以繩於引繩竅三縈之而内維其端啓闔必請室中垂簾障牖破竹約簾加丁固之而紙封其簾及顙家衆傳餐唱呼集散秩若公庭矩閑尺檢毋敢越日訓尚書兄弟造次必舉古人厚徳髙義三復誨厲之文毅詹事時時遺書戒督子姓太淑人每揭坐壁丁寧申飭焉諸子小愆軌度輒呼之長跪書所誦訖曰爾祖若父為教云何敢尚爾耶則頓首謝不敢乃罷故諸後昆訢訢繩檢中與寒素等尚書特以行能至大官持國論正軍律以結主知傑然為廟堂碩輔魁人人謂陶範由於家學抑亦太淑人慈訓弼成云詹事晚休多居外寢時至内室太淑人見必起立坐必旁侍逮老猶然凛無謔辭䙝貌也於戯梁妻之饋食郄婦之饁耨何以尚兹兹太淑人所以最羣行造大家備諸福者殆有本哉殆有本哉太淑人年八十又五嘉靖乙未三月十七日卒尚書服䘮歸上軫念勞績施及其親遣官葬祭榮恩備及一時子男五人長紹鑄印局儒士次繹次尚書綰次約次紒繹紒皆博士弟子孫男十七人女九人曾孫男九人孫曾為學官諸生者多駿發抱國器論曰夫君子脩能逺器非獨成於父師也蓋亦有母教之懿焉予讀易家人父母並稱嚴君有以也夫及攬載籍先王盛時公卿大夫士之家端操飭躬動止以禮卒能勉其夫淑其子而至道賴以成可按而徵也往予國子諸生時接尚書知其賢復觀黄氏祖徳録知其世比讀葬太淑人志乃知尚書篤生訓養者固有自耶然則太淑人存被榮施没耀寵光也殆亦宜哉志列諸懿行不一書抑太淑人婦順之恒不盡紀取夫壼儀母道世宜訓者著于篇雲村集卷九
