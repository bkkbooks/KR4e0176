body:
  text: 雲村集巻十二明許相卿撰雜著宗考按炎帝之後伯夷佐唐虞有大功賜姜姓周之諸侯齊許吕申皆姜姓國也其後子孫各以國氏斯有許之始與世傳堯讓天下於許由許由不受逃之箕山箕山上蓋有許由塚云而由與伯夷所祖同不同不可攷已漢興許氏盛昌邑别著汝南多聞人已乃徃徃出髙陽三國司馬晉許代有顯聞人而詢獨超逸髙一世梁隋間篤孝文史歸許氏唐有許氏兄弟並死封疆逮安史亂逺死忠尤烈唐亡逺之後不義朱梁自雍入江南於是江南許氏根蟠蔓延矣宋初池陽許氏稱長者其後奕世以孝讓文章顯丹陽晉陵閩越東甌並有許氏背項彬彬多知名士而江州許氏特以雍睦旌婺許氏晩以道學望夫許自爵邑於周子孫綿衍遷寓布海内可紀者代不乏賢乃宋叔葉不知何自有提督公者家於靈泉蓋越世久經亂多故老遺編無所可徴然意提督公南産也故於近代江以南許氏憗致意焉而或者又曰宋之南也許氏自汴從遷於杭將或然與吾安適從耶孔子曰吾猶及史之闕文也蓋言慎也况於其先乎然則吾寕闕之而自夫可徴者托始焉耳矣恭識先藏洪武户帖先海州所受國初户帖今藏於吾弟栻卿所間共把玩相與感歎今日身際太平夫豈偶然哉惟昔髙皇應運拔興提三尺薙羣雄兵無留行威讋宇内不十數年勳集鼎奠臣民勸進中外翼戴而窮障逺徼創殘之遺黎深懲過懼屏息重足凛如也睿思先覺户曉海内諭以休息與之為始於是日月出沒咸孚徳意晏然有更生之圖民志底定神器孔安而有明萬世之業等泰山而四維之矣於乎取以武畧定以文告盈尺之札功與百萬師等偉哉抑聖諭好百姓無亦古所謂愿民良農與筦敬仲曰農之子恒為農其秀民之能為士者足頼也吾先自是似續遺緒農耕士學以世游太平膏澤中而是帖若所馮焉乃今楮漫墨渝又復裝潢表章之如丹書大訓然於乎帝力𢎞先澤逺矣敬志於左方并列海州所自出以及吾世俾後來者徳䋲罔替為江南故家猗與休哉恭題學圃巻後皇明建國求世家遺才於天下於是我五世祖起倅海州其從子淳為蕭山尉蕭山到官亡何去歸自號學圃其所與游者詩以道其志遺墨藏吾宗裕齋翁所翁所與游者又詩以侈其澤日序子姓陳而觀之屬某志於左方以詔後昆俾無忘先烈則卒業而歎曰於戯休哉許宗攸頼其在是與其在是與夫人思遺其子若孫自非天下必不可致之物殫心力於無庸不但已也然盈且速傾弗能一姓再世者比然爾斯所謂遺之危者非邪吾蕭山先幾藏用泰能約暇能勤詒謀易述今圃猶故畦焉後之人由是道也可百世守也羣季竊言曰圃專業也専則狹狹則小小或可觀而不可致逺已乎曰固哉物以形滯理無間然故書籍或以䘮志梓人乃存相天下法抑善學圃者存乎人衆咸喟然太息曰雅哉辯陳義甚髙先蕭山所佑啟諸老先生所詠歎將於是乎在請敬書之老圃流風跋右近體七言詩二十篇為一巻吾從髙祖學圃公及國初諸人各賦以贈行者行者莫攷其誰何矣書出桐江俞子中一手詩蓋當時體習語穏律切無大髙下題分吾鄉古蹟尚用唐人舊例前輩風流猶可想見嘗憶長老為我言吾家遭亂中落文籍散亡僅存學圃一巻藏於公之六世孫教文辭爛然可睹也今復得此殆猶薤書竹簡忽遇於荒郵穨墓間摩娑詠歎者良久爰重裝而特署之曰老圃流風云夫世之名畫法書人多寳愛不啻兼金尺璧孰與詞翰出於先人世傳人守將油然生孝敬之念而興起夫文獻似續之心不尤為可寳耶山林壯觀巻是巻吾友秦人孫太初作也始予知有太初繇蘿石翁太初則故知有予矣邂逅林處士故宅把手論詩相得驩甚自是太初詩徃徃藁視予正徳中予舉進士京師太初寓予詩云落日射江江氣深微雲泊樹生秋隂青山白日足幽事要我長吟萬木林及予引疾歸太初隴草再宿矣嗟夫惜哉閒檢故簏得太初雜體詩如干首聲格稱時作者何議而其勝情逺韻超然塵􅅽之表者那復可見耶三復咏嘆序次之而書其端曰山林壯觀云題婦姑絡緯圖錢舜舉絡緯圖内弟沈巖贈予者渠家名畫頗多顧予平生不妄取人尺楮獨此尚有樸雅儉勤之意似可存為子孫訓是以藏之非真愛其貌物之工也讀孝節傳孔子稱史以文勝質史信文哉凡史載節義多詭行竒事而敦常守中者或鮮焉意故藉其詭竒以張其文邪夫節義存乎人竒與常繫於遇遇不一其為節一也予又謂憤激抗一時之節易閲厯險夷之死靡他以必完其節難甘泉先生傳夏節婦年甫二十六而䘮所天忍死終事其姑督成其子劬躬畢志六十年猶一日也有司欲以其節聞輒命子辭之曰吾義則然吾知不負吾心吾何求哉於戯以節婦苦志設遇不幸有甚焉者赴淵投崖截髪斷鼻尚有難色乎而得以庸行易之又若干年節婦有後也乃甘泉子誠知言已夫懐節巻跋予誦朱氏懐節之詩而歎婦道之繫於家也重矣哉朱之曽祖妣吳方盛年䘮其夫提㓜孺承耄姑外訌内顧勢無可依計未知所出如既欹將墜之器岌岌乎危甚也已乃能定其心固其守養老長㓜卒完故業以傳之子若孫逮今𦙍嗣日繁家日振而元素復以善詩聞邑中昔者欹器今猶奠於邃堂重坫之上而四維之繄一婦之節是頼重何如邪向使急不知擇謬計成於浮言節於何有况能有其予孫又能有其家以名於今也元素沐浴膏澤而詠歌其勞苦乞予識之以告其後人無忘始造歎息書其末簡云識夢仙册逺游之亂晦翁歎其數語得長生要訣予直謂為養生家常談獨悲原之遇壯其辭而狹其識也既讀孟子書至夭夀不貳脩身以俟之歎曰此吾人處死生律令也繄世有足恃而不朽者豈必長生徃古聖賢徳業炳炳巍巍今永長存曰仙可也末俗淪昏利欲中人道垂䘮奄奄鬼蜮之鄉其與幾何汪徳卿氏生時承平非原窮抑憤悼者比而寓名於夢仙何與將無閔世日降思自拔於流俗以萬古其身於宇宙間耶否或心誠求之精神自相發耳謂真夢有得於仙則吾不能知已書周氏先徃草本周時孚手其世系圖來為我言斯諌髙大父手授大父巖翁者也翁少從髙大父嬉游語次問先徃諸老人曰吾曷敢忘吾先吾指數之而覩弗詳吾口陳之而記弗强吾筆列之而將弗忘以成昭穆世次井如爾秩如爾翁老而傳又手授諌云予展玩久之喟然歎曰於戲斯可以見世運之泰焉可以見舊始之厚焉可以見故老之慎焉夫元季俶擾六合如焚人將身之不遑恤而遑究夫身所自來逮我熈宣間泰矣人樂更生爰思遡其先以傳之後然人之情茍詳其所自出已爾乃茲由本及支聨絡扶疎若弗忍遺也不已厚乎雖於歐蘇諸義例概未有聞然生卒娶嫁絶續畧偹使傳者不慎述者何稽耶是故一物而三善具焉周之子孫有欲沿流以求源將於是乎指諸掌矣祭文賜歸祭先孺人文二首兒不天不自殞殤吾母棄兒襁褓中吾父劬勞盡瘁鞠且教之以逮成長方知感返哺酬罔極而吾母去兒已三十又五年矣娶婦再生子五而不得繞膝一侍舉於鄉仕於朝而不及牽裾一語嗚呼痛哉父母一堂固有愛日承顔之樂而吾母九原實銜終天徹髓之悲是以人皆以為喜而兒獨戚焉不能自已也人皆以為幸而兒竊拊心自悼其薄命也嗚呼痛哉又於戱天乎寃哉人莫不有所恃以生某生三年而䘮所恃于今四十有九年孱然遺形雖食且視也天綱地維崩摧闕䧟而不獲蒙覆載之全凛焉朝不能以夕闇然昏不復可旦者未始一日不然而悼我何生生奚以為也黙焉語焉嘯歌焉夢寤焉行焉住焉坐卧焉端居焉逺游焉諷詠焉紀述焉不覺忽焉而思從之思一於是而淚從之淚不已而慟哭從之而呌號而摧踊而欲狂籲乎髙天而欲力蹴乎厚地而尚未但已也而况於見其神所主魄所瘞者乎於戱寃哉竭天下之辭無以書其酷矣窮天下之聲無以宣其痛矣幽宫再晨白骨再肉而酷始平痛始定耳於戱此理之必無而吾之寃且痛者終天何以自弭也於戱祭東山季父文嗚呼吾叔父警敏無前塲屋之英也而十舉無成超邁不羈湖海之豪也而所如弗遭俊姿逸態飄飄乎軒軒乎赤霄碧漢三千九萬雲翥風摶而蜚不盡翰胡氣之雄數之窮邪抑才之異物之忌邪吾猶妄意造物乘除屯則有裕東山北渚逍遥晚嵗杖屨釣游一水一石皆適意處曷為奄然一瞑而萬世不視也嗚呼哀哉某束髪傳經字指句釋伊誰之力詵詵羣季亦藉指南以承先澤而今已矣哀哉哀哉有肉如坻有醪如水拊棺呌號魂來嘗只祭天濟兄文嗚呼我兄尚忍言哉我曽大父有孫十人兄長而賢倡羣弟振吾宗以光昭我皇祖别駕公之烈恢張我大父一樗翁之聲實諸父屬望於兄率先巻巻焉况我仲大父芸翁英偉蚤世伯父力善承之而未顯也衰盛循環宗祊遺慶如久蟄欲振久鬱欲宣而有孫如兄亨屯傾否直在夫少假之年又况夀骨隠顴有遐福之象孝友慈良有承藉之基名不後人而志不敢先人才不下人而氣不敢髙人恂恂朴茂有逺到之器而今止是也仁不必夀善不必祥尚忍言哉計偕北上銛鋒無前方期捷報倐以訃聞白首號咷黄口啾喧孀嫠慟絶視息僅延路行鄰舂感惻鼻酸而我同堂九人能不裂胷而摧肝某於兄句讀同業篋笥同游由七齡以至於今未嘗半嵗相離也頃客長安兄歸我先上東門登車數語孰意其遂為永訣之言破窓孤檠故几寒氊在邪亡邪醉邪夢邪欲見杳然已而已而無從籲天尚忍言哉遷𦵏二内祭文故兆之惡予惑彼狂新宅允臧厥土燥剛爾永奠于茲封庇爾子孫世彌大而昌過忌日祭文爾一去不返我百憂交集以終我生矣爾亦其將奈何惟佑啟爾二子克承我教以底成人以守爾家以昌爾世則爾死猶生我憂其弭耳祭朱氏女文生女而嫁父事云訖爾歸死𦵏我痛彌結嗚呼傷哉爾室蕩廢遺墟茂草爾子罪餘亡囚餓殍爾藏荒丘崩壓孰保憶廿載前朱氏侈樂金革日考伊誰為之忽猝數期傾墜如埽凡家興廢靡不有因爾家至此果何人耶或謂爾死朱氏完業時得不與亡家之辱為幸我則謂爾曷若死在室時猶得享祀兄弟子孫之身乃今永為袁花之餒鬼𣺌𣺌游魂終天沉痛而莫之申也興言及此我腸寸裂麥飯澆土爾勉來食不知爾能輟悲下咽而偷一飽乎吾末如之何也已矣祭徐氏女文嗚呼人生子女望以送死汝先我逝生汝徒爾人作爺孃鞠子壯强汝遺孺蒙撫育誰望人為夫婦翁嫗白首汝盟中負夫且别偶憶汝晬齡擕徃金陵霜騎伶仃臂汝欲氷汝嵗周七而母捐室歩禁閾迹笑戒哂噱迂固則然意成汝賢汝天不年是亦空焉汝笄于邁歸装弗汰清約我甘遺汝憤銜而又早殱命孰𡨕探興言始末一語三咽老腸寸裂我血汝啜嗚呼永訣又於呼嗟夫吾兒今果長辭徐氏之室已夫汝世清約汝質脆薄汝笄于邁受侮蒙嘬何嗟及矣差自慰意婿汝者賢有待異日也而壻登賢書而汝入鬼録斯誠汝命吾末之與力已矣壻屬吾文以殉汝薶我病垂死力弗克也抑吾聞區區身後名不如即時一杯酒而况兒女子又安事張皇誇詡於草根片石耶汝歸九原見汝二母死而有知愛猶餂犢之溺也執手連袂述所遭慰所苦一傾夙昔憤懣之懐縷縷吃吃焉耳矣傷哉父子至愛永訣今夕於呼吾兒嗟来食也祭郭杏莊先生文嗚呼某何以交於公年徳耆邵吾視猶大父行也一見吾文而遂忘年以就乎蒙童曰吾多閲人不敢弱子觀子才志將尚友千古而奚齒讓乎羸翁自是相與無間二十又四五年每嵗必至吾里每至必過吾廬髙談竟日夕猶不自意滿謂安得旦旦而過從嗚呼今則已矣吾鄉長老愛我非無人而知我以斯文者真灑泣夫郢技之成風體儒用醫公今之太倉公也重繭百舍敝屣千金呌號望延須㬰於趙郭里者户外之屨常滿公固家於醫耳而獨於某推及其親暨其妻孥病以公起危以公活以不受直為恒而我遂忘報公不言功嗚呼方今凋瘵徧海内安得如公起我活我者活之起之而使免夫疲癃嗚呼感公恩之未報而私自愧悼民病之不藥而重有感於公也祭董蘿石文於戱公其亡矣予淚綆縻於呼公直歸耳予為徒悲公壯癖詩登壇建旗公老知學歛袵講帷宗事陽明嵗晏忘罷良知用别於佛得師悟竗入𤣥安事拘拘二氏異同世學聚疑公徑良捷予路何迂果哉予乎宜公鄙夷已矣公乎䘮予師資公所脱落俗所沉迷起滅萬變生死榮衰造物許大玩以兒嬉我則公哀公適我􅅓來舉此觴予復何辭祭雪江禪師文過從卉年今别良永念故傷懐戚焉耿耿悵望孤標病跡深迸天只雲根低徊清影祭邵康僖公文嗚呼世運既漓公昔何來道意方屬公今遽踣明爽之資邁徃之氣貞介之操恬穆之味信道之學經世之志與善之量篤友之誼海内英賢如公比者能幾何人異姓兄弟淪謝忽諸天其何意我䘮吾資時殞國器慟哭一觴寫我心髓公神若存蠁㫚歆只祭吳南溪方伯文嗟嗟傷哉生之有死也物理固然蒙莊氏玩以為嬉鳳衰麟踣哲人乃獨齎咨而涕洟蓋惜夫世道所闗者大而非邂逅徇意以茍為竒也惟公學本誠身行敦忠信之素仕期澤物志存康濟之規敭厯周行通不易介沉浮末俗和不至隨丞轄望近台司而懇疏脱屣以勇退康强夀踰七秩而晚節如山之不移是故處為善士出為賢逹老為耆徳而所謂金玉君子者舍公其誰耶予夙欽道義於盟交晚從杖屨於海涯方頼夫誦抑以交儆而公倐其云亡人百身而難贖痛典刑之莫追曷惟孱昧者痛失助於傾蓋而後生遑遑交相弔夫䘮其師資斯予之所以深惜於公耳死生常理豈固懵焉而為此婦人之悲抱痛卧榻已廿年餘恭命穉孫酹此一巵固非不誠於吾伯髙也公其格思祭吳泉亭少參文嗟嗟傷哉夫人之一旦猝然而不可諱也事所必至乃子之志行天之報施而遽及此也予特驚嘑痛咽思所以為解而莫之能喻客嵗之杪訪我星石笑言晏晏厯吐衷臆爾來僅踰百日耳庸詎知夫一聚散之間遂永為死生之隔耶惟予畸人生世寡偶子獨何取心親匪口異姓昆弟夫誰曰否修途末光方以幼孤相托胡然一瞑而見不可復悼今感昔哀塞瞀亂長慟彼蒼之殱我良友而于何以善吾後嗟嗟傷哉以子用世果毅之才績學邁徃之氣逼古雄深之辭取友敦篤之誼一時交游寕可多遇而今已矣吾意山川氣澆才髙福尠傑特如子年不待老繄庸劣胡耇其紛如夫造化孰詰其顛倒抑吾人固有亘終古而長存者而不與罔生徒老者論夀夭耶芝焚蕙歎怛焉傷懐目注心存恍惚低徊病僵一榻緘辭寓哀二孤徃將身伏神馳嗟嗟傷哉祭徐明陽揮使文嗚呼傷哉子即死矣夫咄嗟壯哉子必死矣夫子昔嘗以死誓吾特訝焉未之許也今果然耶蓋子志前定而予懵於觀士矣聞子挺身赴敵殫竭果毅奮戈死鼓以償積志精祲日昏猛氣川沸慷慨殺身烈烈英偉固非邂逅逼迫俯就殱殪者比真得死所稱男子也將復誰訾乎猗與嗟夫赫赫隆隆名成國士魂為鬼雄予交一臂増氣如虹病縶於榻享子安從吾兒將事吾神與東祭東隅張表叔文惟吾許自唐有家入我明熈宣而中微也公之先人吾祖中表懿親寔相與協心同力必復其始以至於今繄公先人之功是頼載諸遺令藏在宗子誓同休焉天不人謀公屢播遷晩益𤨏尾許凡子孫有餘愧矣况予曷其為懐奈何天植戅迂屣脱世榮而勢不足庇公躬耕食力而財不足濟公使公至於此極也命矣夫昔田為贍公僅歆其始今墓已擇公尚安其終則見予之力所不及而心末之忍忽也已公其以復兩家之先人予死亦將有辭於吾祖雲村集巻十二
